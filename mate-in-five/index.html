<!DOCTYPE html>
<html lang="en">
<head>
<script src="../auth.js"></script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Mate in Five</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --display:'Cinzel',serif; --num:'Archivo',sans-serif;
    --gold:#b98f3e; --gold2:#e6c67c; --goldhi:#f7e3ae;
    --ink:#2c241d; --ink2:#5c4f40;
    --cream:#f5ecdc; --cream2:#eee0c6;
    --red:#c8352b; --blue:#2f8fe8;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{height:100%;overflow:hidden;background:#9cb98a;touch-action:none;}
  body{font-family:var(--num);color:var(--ink);}
  #app{position:fixed;inset:0;overflow:hidden;}
  canvas{display:block;position:absolute;inset:0;}
  #gl{z-index:0;}
  #tap{position:fixed;inset:0;z-index:4;}
  .ui{position:fixed;inset:0;z-index:10;pointer-events:none;}

  /* ---------- marble panel ---------- */
  .marble{position:relative;
    background:
      radial-gradient(130% 150% at 18% -10%, rgba(255,255,255,.85), rgba(255,255,255,0) 55%),
      repeating-linear-gradient(104deg, rgba(186,164,120,.13) 0 2px, rgba(186,164,120,0) 2px 13px),
      repeating-linear-gradient(64deg, rgba(170,150,112,.09) 0 1.5px, rgba(170,150,112,0) 1.5px 17px),
      linear-gradient(180deg,#faf3e6,#ecdfc5);
    border-radius:12px;
    box-shadow:0 0 0 1.5px var(--gold), inset 0 0 0 1px rgba(255,255,255,.7),
      inset 0 0 0 3.5px rgba(185,143,62,.28), 0 6px 16px rgba(40,30,10,.35);}
  .cut{border-radius:4px;
    clip-path:polygon(11px 0,calc(100% - 11px) 0,100% 11px,100% calc(100% - 11px),calc(100% - 11px) 100%,11px 100%,0 calc(100% - 11px),0 11px);
    box-shadow:inset 0 0 0 2px var(--gold), inset 0 0 0 3px rgba(255,255,255,.75), inset 0 0 0 6px rgba(185,143,62,.22);}

  /* ---------- top HUD ---------- */
  #hud{position:absolute;top:0;left:0;right:0;padding:max(10px,env(safe-area-inset-top)) 10px 0;
    display:none;flex-direction:column;gap:7px;align-items:center;}
  #topRow{display:flex;gap:8px;width:100%;max-width:520px;align-items:stretch;}
  .tp{flex:1;position:relative;text-align:center;}
  .tp .val{position:absolute;display:flex;align-items:center;justify-content:center;
    font-weight:900;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1;}
  #scoreP{background:url(ui/score_panel.webp) center/100% 100% no-repeat;aspect-ratio:235/195;}
  #scoreP .val{left:9%;right:9%;top:56%;bottom:11%;font-size:clamp(17px,5.4vw,28px);}
  #timerP{flex:1.3;background:url(ui/timer_panel.webp) center/100% 100% no-repeat;aspect-ratio:311/218;}
  #timerP .val{left:7%;right:7%;top:40%;bottom:9%;font-size:clamp(30px,9.4vw,50px);color:var(--red);letter-spacing:1px;}
  #timerP.low .val{animation:tpulse .5s ease infinite alternate;}
  @keyframes tpulse{from{transform:scale(1);}to{transform:scale(1.07);}}
  #multP{background:url(ui/mult_panel.webp) center/100% 100% no-repeat;aspect-ratio:235/194;}
  #multP .val{left:9%;right:9%;top:42%;bottom:12%;color:var(--red);font-size:clamp(26px,8.2vw,44px);}

  #statusRow{background:url(ui/status_banner.webp) center/100% 100% no-repeat;aspect-ratio:523/70;
    width:min(94vw,500px);display:flex;align-items:center;justify-content:center;padding:0 11% .6% 11%;
    font-family:var(--num);font-weight:800;color:var(--ink);
    font-size:clamp(11px,3.3vw,16px);letter-spacing:.8px;white-space:nowrap;}

  #moveRow{background:url(ui/move_panel.webp) center/100% 100% no-repeat;aspect-ratio:395/90;
    width:min(76vw,360px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 6% 1.5%;}
  #moveLbl{font-family:var(--num);font-weight:800;font-size:clamp(11px,3.2vw,15px);letter-spacing:1.4px;color:var(--ink);}
  #moveLbl b{color:var(--red);}
  #pips{display:flex;gap:10px;}
  .pip{width:clamp(15px,4.6vw,21px);height:clamp(15px,4.6vw,21px);
    background:url(ui/15_empty_move_pip.webp) center/contain no-repeat;}
  .pip.done{background-image:url(ui/13_completed_move_pip.webp);}
  .pip.cur{background-image:url(ui/14_current_move_pip.webp);animation:pippulse .8s ease infinite alternate;}
  @keyframes pippulse{from{transform:scale(1);}to{transform:scale(1.18);}}

  /* ---------- bottom controls ---------- */
  #botBar{position:absolute;left:0;right:0;bottom:max(12px,env(safe-area-inset-bottom));
    display:none;justify-content:center;gap:14px;padding:0 12px;}
  .cbtn{pointer-events:auto;width:clamp(64px,17.5vw,80px);border:none;cursor:pointer;position:relative;
    background:none;padding:0;margin:0;transition:transform .1s;
    -webkit-appearance:none;appearance:none;overflow:visible;border-radius:0;}
  .cbtn:active{transform:scale(.93);}
  .cbtn svg,.cbtn .cl{display:none;}  /* icons + labels are baked into the art */
  .cbtn img{display:block;width:100%;height:auto;pointer-events:none;}
  .cbtn:disabled{opacity:.7;filter:grayscale(.75) brightness(.82);}
  #btnMute.muted::after{content:'';position:absolute;top:7%;right:11%;width:20%;aspect-ratio:1;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#e8584d,#b02318);box-shadow:0 0 0 1.5px #fff,0 2px 4px rgba(0,0,0,.35);}
  #hintBadge{position:absolute;top:-7%;right:-9%;min-width:46%;background:radial-gradient(circle at 35% 30%,#e8584d,#b02318);
    color:#fff;font-weight:800;font-size:clamp(8px,2.3vw,11px);padding:4px 6px;border-radius:20px;letter-spacing:.2px;
    box-shadow:0 0 0 1.5px #fff, 0 2px 5px rgba(0,0,0,.4);font-variant-numeric:tabular-nums;}

  /* ---------- banners ---------- */
  #banner{position:absolute;left:0;right:0;top:34%;display:flex;justify-content:center;pointer-events:none;z-index:20;}
  #banner span{font-family:var(--display);font-weight:900;letter-spacing:3px;font-size:clamp(30px,10vw,58px);
    color:var(--goldhi);opacity:0;transform:scale(.6);
    text-shadow:0 2px 0 #8a6318,0 4px 14px rgba(50,30,0,.6),0 0 34px rgba(255,214,120,.65);}
  #banner.on span{animation:bpop 1.35s cubic-bezier(.2,1.4,.4,1) forwards;}
  #banner.red span{color:#ffd9d4;text-shadow:0 2px 0 #7e1a12,0 4px 14px rgba(60,0,0,.6),0 0 34px rgba(255,90,70,.6);}
  @keyframes bpop{0%{opacity:0;transform:scale(.6);}12%{opacity:1;transform:scale(1.08);}22%{transform:scale(1);}78%{opacity:1;}100%{opacity:0;transform:scale(1.04) translateY(-10px);}}

  /* ---------- overlays ---------- */
  .overlay{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;flex-direction:column;
    pointer-events:auto;padding:20px;}
  .card{width:min(88vw,400px);padding:26px 22px 22px;text-align:center;}
  .gbtn{pointer-events:auto;display:inline-block;border:none;cursor:pointer;font-family:var(--display);font-weight:900;
    letter-spacing:2.5px;color:#3a2a08;font-size:clamp(15px,4.6vw,20px);padding:14px 40px;border-radius:14px;
    background:radial-gradient(120% 170% at 50% 0%, #f9e7b0, #ddb054 55%, #b8862e);
    box-shadow:0 0 0 2px rgba(255,255,255,.65), 0 0 22px rgba(230,198,124,.5), 0 7px 18px rgba(40,25,5,.45), inset 0 1px 0 rgba(255,255,255,.7);
    transition:transform .1s;}
  .gbtn:active{transform:scale(.95);}
  .sbtn{pointer-events:auto;border:none;cursor:pointer;font-family:var(--display);font-weight:700;letter-spacing:1.5px;
    color:#6b5836;font-size:clamp(11px,3.2vw,13px);padding:10px 20px;border-radius:11px;background:rgba(250,243,230,.9);
    box-shadow:0 0 0 1.5px var(--gold), 0 3px 9px rgba(40,30,10,.3);}
  .sbtn:active{transform:scale(.95);}

  /* menu */
  #menu.overlay{justify-content:flex-end;padding-bottom:max(34px,env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(20,14,4,.18),rgba(20,14,4,0) 30%);}
  #title{margin-bottom:10px;text-align:center;}
  #title .t1{font-family:var(--display);font-weight:900;font-size:clamp(44px,15vw,84px);line-height:.95;letter-spacing:4px;
    background:linear-gradient(180deg,#fdf0c0 8%,#e9c266 38%,#b9862c 62%,#f3daa0 82%,#93641c);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 0 rgba(90,60,10,.85)) drop-shadow(0 5px 12px rgba(40,25,0,.55));}
  #title .t2{font-family:var(--display);font-weight:900;font-size:clamp(26px,8.6vw,48px);letter-spacing:8px;color:#2f2a24;
    text-shadow:0 1px 0 rgba(255,248,230,.8),0 3px 8px rgba(40,30,10,.35);}
  #title .crown{font-size:clamp(20px,6vw,30px);color:var(--gold2);filter:drop-shadow(0 2px 4px rgba(60,40,0,.5));}
  #menuCard{display:flex;flex-direction:column;align-items:center;gap:13px;padding:20px 26px 16px;width:min(86vw,360px);}
  #tagline{font-family:var(--display);font-weight:700;font-size:clamp(10px,3vw,13px);letter-spacing:1.6px;color:var(--ink2);}
  #best{font-weight:800;font-size:clamp(12px,3.4vw,15px);color:var(--ink);letter-spacing:.5px;}
  #best b{color:#9a7420;}
  #brand{margin-top:12px;font-size:9px;letter-spacing:1.6px;color:rgba(80,60,20,.85);font-weight:700;
    text-shadow:0 1px 2px rgba(255,255,255,.5);}
  #arcadeLink{margin-top:8px;}

  /* result */
  #result{display:none;background:rgba(24,17,6,.35);}
  #resTitle{font-family:var(--display);font-weight:900;font-size:clamp(26px,8.5vw,40px);letter-spacing:2.5px;margin-bottom:4px;}
  #resTitle.win{color:#9a7420;text-shadow:0 1px 0 rgba(255,250,235,.9);}
  #resTitle.lose{color:var(--red);}
  #resSub{font-family:var(--display);font-weight:700;font-size:clamp(11px,3.2vw,14px);letter-spacing:1.5px;color:var(--ink2);margin-bottom:14px;}
  .brk{display:flex;justify-content:space-between;font-weight:700;font-size:clamp(12px,3.6vw,15px);color:var(--ink2);
    padding:5px 4px;border-bottom:1px solid rgba(185,143,62,.28);font-variant-numeric:tabular-nums;}
  .brk b{color:var(--ink);font-weight:900;}
  .brk.neg b{color:var(--red);}
  #resLine{display:none;margin:2px 0 10px;padding:9px 10px;border-radius:9px;
    background:rgba(185,143,62,.10);box-shadow:inset 0 0 0 1px rgba(185,143,62,.35);}
  #resLineLbl{font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:2px;color:#9a7420;margin-bottom:5px;}
  #resLineMoves{font-weight:800;font-size:clamp(13px,3.9vw,16px);line-height:1.55;color:var(--ink);letter-spacing:.3px;}
  #resLineMoves b{color:#9a7420;font-weight:900;margin-right:1px;}
  #resPot{display:none;font-family:var(--display);font-weight:700;letter-spacing:1.6px;font-size:clamp(10px,2.8vw,12px);color:#9a7420;margin-top:8px;}
  #resPot.lost{color:var(--red);}
  #cashIco{position:absolute;left:0;right:0;top:22%;text-align:center;font-size:clamp(24px,7vw,32px);font-weight:900;
    color:#a97f2c;text-shadow:0 1px 0 rgba(255,255,255,.85),0 2px 4px rgba(90,60,10,.3);pointer-events:none;line-height:1;}
  #cashTxt{position:absolute;left:0;right:0;top:64%;white-space:nowrap;text-align:center;font-weight:800;font-size:clamp(7.5px,2.1vw,10px);
    letter-spacing:.4px;color:#3f3428;pointer-events:none;}
  #resTotal{font-weight:900;font-size:clamp(30px,10vw,46px);color:var(--ink);margin:12px 0 4px;font-variant-numeric:tabular-nums;}
  #resBest{font-family:var(--display);font-weight:700;font-size:11px;letter-spacing:2px;color:#9a7420;height:16px;margin-bottom:10px;}
  #resBtns{display:flex;gap:12px;justify-content:center;margin-top:6px;}

  /* promotion picker */
  #promo{display:none;background:rgba(24,17,6,.35);}
  #promo .card{width:min(80vw,330px);padding:18px;}
  #promo h3{font-family:var(--display);font-weight:700;letter-spacing:2px;font-size:14px;color:var(--ink2);margin-bottom:12px;}
  #promoBtns{display:flex;gap:10px;justify-content:center;}
  .pbtn{pointer-events:auto;width:62px;height:62px;border-radius:13px;border:none;cursor:pointer;font-size:36px;line-height:1;
    color:var(--ink);background:linear-gradient(180deg,#faf3e6,#e9dbbe);
    box-shadow:0 0 0 2px var(--gold), inset 0 1px 0 rgba(255,255,255,.8), 0 4px 10px rgba(40,30,10,.35);}
  .pbtn:active{transform:scale(.93);}
</style>
</head>
<body>
<div id="app">
  <canvas id="gl"></canvas>
  <div id="tap"></div>

  <div class="ui">
    <div id="hud">
      <div id="topRow">
        <div class="tp" id="scoreP"><div class="val" id="scoreV">0</div></div>
        <div class="tp" id="timerP"><div class="val" id="timerV">2:00</div></div>
        <div class="tp" id="multP"><div class="val" id="multV">×5</div></div>
      </div>
      <div id="statusRow"><span id="statusT">WHITE TO MOVE — MATE WITHIN 5</span></div>
      <div id="moveRow">
        <div id="moveLbl">MOVE <b id="moveN">1</b> OF 5</div>
        <div id="pips"><div class="pip cur"></div><div class="pip"></div><div class="pip"></div><div class="pip"></div><div class="pip"></div></div>
      </div>
    </div>

    <div id="banner"><span id="bannerT"></span></div>

    <div id="botBar">
      <button class="cbtn" id="btnCash"><img src="ui/cash_button.webp" alt="Cash out"><span id="cashIco">$</span><span id="cashTxt">CASH OUT</span></button>
      <button class="cbtn" id="btnUndo"><img src="ui/08_undo_button.webp" alt="Undo"></button>
      <button class="cbtn" id="btnHint"><img src="ui/hint_button.webp" alt="Hint"><span id="hintBadge">−1,000</span></button>
      <button class="cbtn" id="btnMute"><img src="ui/10_mute_button.webp" alt="Mute"></button>
    </div>
  </div>

  <div id="menu" class="overlay">
    <div id="title">
      <div class="crown">♛</div>
      <div class="t1">MATE</div>
      <div class="t2">IN FIVE</div>
    </div>
    <div id="menuCard" class="marble cut">
      <div id="tagline">✦ FIVE MOVES · ANY CHECKMATE WINS ✦</div>
      <button class="gbtn" id="btnPlay">PLAY</button>
      <div id="best">BEST <b id="bestV">0</b></div>
      <button class="sbtn" id="btnArcade">← ARCADE</button>
      <div id="brand">CRASHARCADE · MATE IN FIVE v0.3.1</div>
    </div>
  </div>

  <div id="result" class="overlay">
    <div class="card marble cut">
      <div id="resTitle" class="win">CHECKMATE!</div>
      <div id="resSub">MATE ON MOVE 2</div>
      <div id="resLine">
        <div id="resLineLbl">✦ POSSIBLE WINNING LINE ✦</div>
        <div id="resLineMoves"></div>
      </div>
      <div id="resBrk">
        <div class="brk"><span>BASE × MULTIPLIER</span><b id="brkBase">2,000 × 4</b></div>
        <div class="brk"><span>TIME BONUS</span><b id="brkTime">+7,300</b></div>
        <div class="brk neg" id="brkHintRow"><span>HINT</span><b id="brkHint">−1,000</b></div>
      </div>
      <div id="resPot"></div>
      <div id="resTotal">0</div>
      <div id="resBest">NEW BEST!</div>
      <div id="resBtns">
        <button class="sbtn" id="btnMenu">MENU</button>
        <button class="sbtn" id="btnResUndo">↩ UNDO</button>
        <button class="gbtn" id="btnCashRes" style="padding:12px 24px;font-size:15px;">CASH OUT</button>
        <button class="gbtn" id="btnNext" style="padding:12px 24px;font-size:15px;">NEXT PUZZLE</button>
      </div>
    </div>
  </div>

  <div id="promo" class="overlay">
    <div class="card marble cut">
      <h3>PROMOTE TO</h3>
      <div id="promoBtns">
        <button class="pbtn" data-p="q">♕</button>
        <button class="pbtn" data-p="r">♖</button>
        <button class="pbtn" data-p="b">♗</button>
        <button class="pbtn" data-p="n">♘</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from './lib/three.module.js';
window.THREE=THREE; // console diagnostics

/* =========================================================================
   CFG — all balance values
   ========================================================================= */
const VERSION='0.3.1';
const CFG={
  roundTime:120,          // seconds
  maxMoves:5,
  basePoints:2000,        // × multiplier on mate
  perSecond:100,          // × remaining whole seconds on mate
  hintPenalty:1000,
  multByMove:[5,4,3,2,1], // multiplier if mate lands on player move 1..5
  aiThinkMs:380,          // search time budget for the defender
  aiDelayMs:420,          // pause before the reply starts (feels considered)
  aiDepth:7,
  hintSearchMs:750,
  hintShowSec:3.0,
  moveDur:0.42,           // slide animation seconds
  hopDur:0.55,            // knight hop
  cam:{fov:40, el:0.85, azWobble:0.05, topNdc:0.40, botNdc:-0.82, selPush:0.94,
       checkDist:0.62, checkSec:1.05, mateDist:0.5, mateEl:0.62},
  lowTime:15,             // red pulse threshold
  tickTime:10,            // tick sfx threshold
};
const store={get(k){try{return localStorage.getItem(k);}catch(e){return null;}},set(k,v){try{localStorage.setItem(k,v);}catch(e){}}};

/* =========================================================================
   AUDIO — WebAudio SFX + iOS silent-mode unlock
   ========================================================================= */
let actx=null;
const ac=()=>{ if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} return actx; };
let muted=store.get('m5_mute')==='1';
function tone(type,f0,f1,vol,dur,delay=0){
  const c=ac(); if(!c||muted)return;
  const t0=c.currentTime+delay;
  const o=c.createOscillator(),g=c.createGain();
  o.type=type;o.frequency.setValueAtTime(f0,t0);o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),t0+dur);
  g.gain.setValueAtTime(0.0001,t0);g.gain.exponentialRampToValueAtTime(vol,t0+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g);g.connect(c.destination);o.start(t0);o.stop(t0+dur+0.05);
}
function knock(vol,pitch,delay=0){ // marble-on-marble tap: filtered noise burst
  const c=ac(); if(!c||muted)return;
  const t0=c.currentTime+delay, n=c.sampleRate*0.09|0;
  const buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2.6);
  const src=c.createBufferSource();src.buffer=buf;
  const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=pitch;f.Q.value=1.4;
  const g=c.createGain();g.gain.value=vol;
  src.connect(f);f.connect(g);g.connect(c.destination);src.start(t0);
}
function sfx(k){
  if(k==='select'){knock(0.5,2600);}
  else if(k==='move'){knock(0.85,1500);tone('sine',180,120,0.05,0.09);}
  else if(k==='capture'){knock(1.0,900);knock(0.7,1800,0.03);tone('triangle',320,140,0.08,0.16);}
  else if(k==='illegal'){tone('sine',220,160,0.06,0.12);}
  else if(k==='check'){tone('sawtooth',740,720,0.06,0.28);tone('sawtooth',555,540,0.05,0.28,0.02);}
  else if(k==='mate'){[523,659,784,1047].forEach((f,i)=>tone('triangle',f,f,0.09,0.5,i*0.11));knock(1,700,0.05);}
  else if(k==='fail'){tone('sawtooth',300,120,0.09,0.7);tone('sine',150,60,0.08,0.8,0.05);}
  else if(k==='hint'){tone('triangle',880,1320,0.06,0.3);tone('triangle',1100,1650,0.05,0.3,0.09);}
  else if(k==='tick'){knock(0.35,3200);}
  else if(k==='ui'){knock(0.4,2200);}
  else if(k==='crown'){[784,988,1175].forEach((f,i)=>tone('sine',f,f,0.05,0.35,i*0.07));}
}
const silent=document.getElementById('silent');
let audioUnlocked=false;
function unlockAudio(){ if(audioUnlocked)return; audioUnlocked=true;
  try{navigator.audioSession.type='playback';}catch(e){}
  try{silent.play().catch(()=>{});}catch(e){}
  const c=ac(); if(c&&c.state!=='running')c.resume().catch(()=>{});
}

let _mseed=7;
const mrnd=()=>{_mseed=(_mseed*1103515245+12345)&0x7fffffff;return _mseed/0x7fffffff;};
function marbleTex(base,veins,goldVein){
  const cv=document.createElement('canvas');cv.width=cv.height=256;
  const g=cv.getContext('2d');
  g.fillStyle=base;g.fillRect(0,0,256,256);
  // cloudy tone variation
  for(let i=0;i<26;i++){
    const x=mrnd()*256,y=mrnd()*256,r=30+mrnd()*80;
    const gr=g.createRadialGradient(x,y,0,x,y,r);
    const a=0.05+mrnd()*0.06;
    gr.addColorStop(0,`rgba(255,255,255,${a})`);gr.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle=gr;g.fillRect(0,0,256,256);
  }
  // veins: meandering polylines
  const drawVein=(col,alpha,w)=>{
    g.strokeStyle=col;g.globalAlpha=alpha;g.lineWidth=w;g.beginPath();
    let x=mrnd()*256,y=mrnd()*256,ang=mrnd()*Math.PI*2;
    g.moveTo(x,y);
    for(let s=0;s<26;s++){
      ang+=(mrnd()-0.5)*1.1;
      x+=Math.cos(ang)*(6+mrnd()*12);y+=Math.sin(ang)*(6+mrnd()*12);
      g.lineTo(x,y);
    }
    g.stroke();g.globalAlpha=1;
  };
  for(let i=0;i<10;i++)drawVein(veins,0.14+mrnd()*0.16,0.7+mrnd()*1.8);
  for(let i=0;i<3;i++)drawVein(goldVein,0.10+mrnd()*0.10,0.5+mrnd()*0.9);
  // fine grain
  const id=g.getImageData(0,0,256,256),px=id.data;
  for(let i=0;i<px.length;i+=4){const n=(mrnd()-0.5)*10;px[i]+=n;px[i+1]+=n;px[i+2]+=n;}
  g.putImageData(id,0,0);
  const t=new THREE.CanvasTexture(cv);
  t.colorSpace=THREE.SRGBColorSpace;t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}

      new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.4,blending:THREE.AdditiveBlending,depthWrite:false}));
    halo.renderOrder=6;halo.userData.baseOp=0.4;fxG.add(halo);atkLines.push(halo);
  }
}
function clearAttackLines(){for(const l of atkLines){fxG.remove(l);l.geometry.dispose();l.material.dispose();}atkLines.length=0;}
// squares of `byColor` pieces that attack sq (mirrors engine attack logic)
function attackersOf(g,sq){
  const out=[],bd=g.bd,king=bd[sq],by=(CH.C(king)===CH.W)?CH.B:CH.W;
  const NOF=[31,33,14,18,-31,-33,-14,-18],KOF=[1,-1,16,-16,15,17,-15,-17],BOF=[15,17,-15,-17],ROF=[1,-1,16,-16];
  const pd=by===CH.W?-16:16;
  for(const d of [pd-1,pd+1]){const t=sq+d;if(CH.okSq(t)&&bd[t]===(CH.PAWN|by))out.push(t);}
  for(const d of NOF){const t=sq+d;if(CH.okSq(t)&&bd[t]===(CH.KNIGHT|by))out.push(t);}
  for(const d of KOF){const t=sq+d;if(CH.okSq(t)&&bd[t]===(CH.KING|by))out.push(t);}
  for(const d of BOF){let t=sq+d;while(CH.okSq(t)){const p=bd[t];if(p){if(CH.C(p)===by&&(CH.T(p)===CH.BISHOP||CH.T(p)===CH.QUEEN))out.push(t);break;}t+=d;}}
  for(const d of ROF){let t=sq+d;while(CH.okSq(t)){const p=bd[t];if(p){if(CH.C(p)===by&&(CH.T(p)===CH.ROOK||CH.T(p)===CH.QUEEN))out.push(t);break;}t+=d;}}
  return out;
}

// particles (capture puffs, mate sparkles)
const parts=[];
const partGeo=new THREE.SphereGeometry(0.035,6,5);
function burst(x,y,z,color,n=14,speed=1.6,up=2.2){
  for(let i=0;i<n;i++){
    const m=new THREE.Mesh(partGeo,new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.95,blending:THREE.AdditiveBlending,depthWrite:false}));
    m.position.set(x,y,z);
    const a=Math.random()*Math.PI*2,r=Math.random()*speed;
    parts.push({m,vx:Math.cos(a)*r,vy:up*(0.5+Math.random()*0.8),vz:Math.sin(a)*r,life:0.7+Math.random()*0.5,t:0});
    fxG.add(m);
  }
}
function tickParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.t+=dt;
    if(p.t>=p.life){fxG.remove(p.m);p.m.material.dispose();parts.splice(i,1);continue;}
    p.vy-=6.5*dt;
    p.m.position.x+=p.vx*dt;p.m.position.y+=p.vy*dt;p.m.position.z+=p.vz*dt;
    if(p.m.position.y<0.03){p.m.position.y=0.03;p.vy*=-0.3;}
    p.m.material.opacity=0.95*(1-p.t/p.life);
    p.m.scale.setScalar(1+p.t*1.6);
  }
}

/* =========================================================================
   CAMERA DIRECTOR — no player camera control, ever
   ========================================================================= */
const cam={az:0,el:CFG.cam.el,dist:16,look:new THREE.Vector3(0,0,0)};
let camFrom=null,camTo=null,camT=0,camDur=0;
let planDist=16;
const easeIO=t=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
function applyCam(c){
  camera.position.set(
    c.look.x+Math.sin(c.az)*Math.cos(c.el)*c.dist,
    c.look.y+Math.sin(c.el)*c.dist,
    c.look.z+Math.cos(c.az)*Math.cos(c.el)*c.dist);
  camera.lookAt(c.look);
}
function poseFits(d){ // all four board corners inside the readable window?
  const test={az:0,el:CFG.cam.el,dist:d,look:new THREE.Vector3(0,0.05,-0.3)};
  applyCam(test);camera.updateMatrixWorld();
  const v=new THREE.Vector3();
  for(const [cx,cz] of [[-4.75,-4.75],[4.75,-4.75],[-4.75,4.75],[4.75,4.75]]){
    v.set(cx,0.15,cz).project(camera);
    if(Math.abs(v.x)>0.94||v.y>CFG.cam.topNdc||v.y<CFG.cam.botNdc)return false;
  }
  return true;
}
function computePlanDist(){
  let lo=7,hi=60;
  for(let i=0;i<28;i++){const mid=(lo+hi)/2;if(poseFits(mid))hi=mid;else lo=mid;}
  planDist=hi;
}
function planPose(){return {az:0,el:CFG.cam.el,dist:planDist,look:new THREE.Vector3(0,0.05,-0.3)};}
function camGo(pose,dur){
  camFrom={az:cam.az,el:cam.el,dist:cam.dist,look:cam.look.clone()};
  camTo={az:pose.az,el:pose.el,dist:pose.dist,look:pose.look.clone()};
  camT=0;camDur=Math.max(0.001,dur);
}
function camTick(dt){
  if(camTo){
    camT+=dt;
    const t=easeIO(Math.min(1,camT/camDur));
    cam.az=camFrom.az+(camTo.az-camFrom.az)*t;
    cam.el=camFrom.el+(camTo.el-camFrom.el)*t;
    cam.dist=camFrom.dist+(camTo.dist-camFrom.dist)*t;
    cam.look.lerpVectors(camFrom.look,camTo.look,t);
    if(camT>=camDur){camTo=null;}
  }
  applyCam(cam);
}
function sqPos(s,y=0){return new THREE.Vector3(fx(CH.fileOf(s)),y,fz(CH.rankOf(s)));}
function poseToward(s,distMul,elMul=1,azOff=0){
  const p=planPose();
  p.look.lerp(sqPos(s,0.3),0.55);
  p.dist*=distMul;p.el*=elMul;p.az+=azOff;
  return p;
}

/* =========================================================================
   PIECE MESH MANAGEMENT + MOVE ANIMATION
   ========================================================================= */
const pieces=new Map(); // 0x88 square -> mesh group
const pieceLayer=new THREE.Group();scene.add(pieceLayer);
function clearPieces(){for(const [,m] of pieces)pieceLayer.remove(m);pieces.clear();}
function spawnPieces(g){
  clearPieces();
  for(let s=0;s<128;s++){
    if(!CH.okSq(s))continue;
    const p=g.bd[s];if(!p)continue;
    const m=buildPiece(CH.T(p),CH.C(p));
    m.position.copy(sqPos(s));
    pieceLayer.add(m);pieces.set(s,m);
  }
}
const timers=[]; // sim-time scheduler — deterministic under __game.step(), immune to tab throttling
function after(sec,fn){timers.push({t:sec,fn});}
function tickTimers(dt){
  for(let i=timers.length-1;i>=0;i--){
    timers[i].t-=dt;
    if(timers[i].t<=0){const f=timers[i].fn;timers.splice(i,1);f();}
  }
}
const anims=[]; // {t,dur,fn(k),done()}
function addAnim(dur,fn,done){anims.push({t:0,dur,fn,done});}
function tickAnims(dt){
  for(let i=anims.length-1;i>=0;i--){
    const a=anims[i];a.t+=dt;
    const k=Math.min(1,a.t/a.dur);
    a.fn(k);
    if(k>=1){anims.splice(i,1);if(a.done)a.done();}
  }
}
let fastMode=false; // harness: skip animation time
// animate a committed move; game state g has ALREADY made the move
function animateMove(g,m,cb){
  const isKnight=CH.T(m.piece)===CH.KNIGHT;
  const dur=fastMode?0.01:(isKnight?CFG.hopDur:CFG.moveDur);
  const mesh=pieces.get(m.from);
  const from=sqPos(m.from),to=sqPos(m.to);
  const capSq=m.ep?(m.to+(CH.C(m.piece)===CH.W?-16:16)):m.to;
  const capMesh=m.capt?pieces.get(capSq):null;
  pieces.delete(m.from);
  if(m.capt)pieces.delete(capSq);
  pieces.set(m.to,mesh);
  // castle rook
  let rookMesh=null,rFrom=null,rTo=null;
  if(m.castle){
    [rFrom,rTo]=m.castle==='k'?[m.to+1,m.to-1]:[m.to-2,m.to+1];
    rookMesh=pieces.get(rFrom);pieces.delete(rFrom);pieces.set(rTo,rookMesh);
  }
  const lift=isKnight?0.65:0.22;
  addAnim(dur,k=>{
    if(!mesh)return;
    mesh.position.lerpVectors(from,to,easeIO(k));
    mesh.position.y=Math.sin(Math.PI*k)*lift;
    if(rookMesh)rookMesh.position.lerpVectors(sqPos(rFrom),sqPos(rTo),easeIO(k));
    if(capMesh&&k>0.5){
      const kk=(k-0.5)*2;
      capMesh.scale.setScalar(Math.max(0.001,1-kk));
      capMesh.position.y=-kk*0.3;
    }
  },()=>{
    if(mesh){mesh.position.copy(to);mesh.rotation.set(0,0,0);}
    if(capMesh){
      pieceLayer.remove(capMesh);
      burst(to.x,0.4,to.z,0xffd27a,16,1.8,2.4);
    }
    if(m.promo&&mesh){ // swap in the promoted piece
      pieceLayer.remove(mesh);
      const np=buildPiece(CH.T(m.promo),CH.C(m.promo));
      np.position.copy(to);pieceLayer.add(np);pieces.set(m.to,np);
      burst(to.x,0.7,to.z,0xffe9b0,18,1.4,2.6);sfx('crown');
    }
    if(cb)cb();
  });
  if(m.capt)sfx('capture');else sfx('move');
}
// mated king topples
function kingFall(kingSq,cb){
  const mesh=pieces.get(kingSq);
  if(!mesh){if(cb)cb();return;}
  const dir=Math.random()<0.5?1:-1;
  const dur=fastMode?0.01:0.9;
  addAnim(dur,k=>{
    const e=k*k;
    mesh.rotation.z=dir*e*(Math.PI/2-0.12);
    mesh.position.y=Math.sin(Math.PI*Math.min(1,k*1.15))*0.12-e*0.02;
  },()=>{
    const p=mesh.position;
    burst(p.x,0.25,p.z,0xffd27a,20,2.2,2.2);
    burst(p.x,0.25,p.z,0xff6a55,12,1.6,1.8);
    if(cb)cb();
  });
}

/* ---------------- SAN (for the winning-line readout) ---------------- */
const PL={[CH.KING]:'K',[CH.QUEEN]:'Q',[CH.ROOK]:'R',[CH.BISHOP]:'B',[CH.KNIGHT]:'N',[CH.PAWN]:''};
function sanLine(fen,ucis){
  const t=new CH.Game();t.loadFEN(fen);
  const out=[];
  for(const u of ucis){
    const ms=t.legal();
    const m=ms.find(x=>t.uci(x)===u);
    if(!m)break;
    let str;
    if(m.castle)str=m.castle==='k'?'O-O':'O-O-O';
    else{
      const pt=CH.T(m.piece);
      let dis='';
      if(pt!==CH.PAWN){
        const twins=ms.filter(x=>x!==m&&CH.T(x.piece)===pt&&x.to===m.to&&x.from!==m.from);
        if(twins.length){
          const sameFile=twins.some(x=>CH.fileOf(x.from)===CH.fileOf(m.from));
          const sameRank=twins.some(x=>CH.rankOf(x.from)===CH.rankOf(m.from));
          if(!sameFile)dis='abcdefgh'[CH.fileOf(m.from)];
          else if(!sameRank)dis=''+(CH.rankOf(m.from)+1);
          else dis=CH.ALG(m.from);
        }
      }
      str=PL[pt]+dis
        +(m.capt?((pt===CH.PAWN?'abcdefgh'[CH.fileOf(m.from)]:'')+'x'):'')
        +CH.ALG(m.to)
        +(m.promo?'='+PL[CH.T(m.promo)]:'');
    }
    t.make(m);
    const st=t.legal().length===0&&t.inCheck()?'#':(t.inCheck()?'+':'');
    out.push(str+st);
  }
  return out;
}

function figurine(san,isWhite){

}

  ui.btnCashRes.style.display='none';
  ui.btnNext.textContent='NEW RUN';
  countTo(banked,900);
}
function cashOut(){
  if(state==='menu'||state==='mateCine')return false;
  if(state==='end'&&pot<=0)return false;
  if(pot<=0){toMenu();return true;}          // nothing staked yet — just leave the table
  banked=pot;pot=0;scoreFrozen=banked;
  roundActive=false;
  clearSelection();clearAttackLines();dangerRing.visible=false;
  hintRingA.visible=hintRingB.visible=false;hintT=0;
  ui.promo.style.display='none';pendingPromo=null;
  sfx('cash');
  banner('CASHED OUT');
  showCashed();
  return true;
}
function winRound(){
  roundActive=false;lastWin=true;
  mateMove=movesMade+1;
  finalScore=Math.max(0,CFG.basePoints*CFG.multByMove[mateMove-1]+Math.floor(Math.max(0,timeLeft)*10)*(CFG.perSecond/10)-(hintUsed?CFG.hintPenalty:0));
  pot+=finalScore;scoreFrozen=pot;
  movesMade=mateMove;
  state='mateCine';
  updatePips(mateMove);updateHUD();
  banner('CHECKMATE!');sfx('mate');
  setStatus('CHECKMATE');
  const ks=g.kings[1]; // black king falls
  updateDangerRing();
  camGo(poseToward(ks,CFG.cam.mateDist,CFG.cam.mateEl,0.4),fastMode?0.01:1.15);
  after(fastMode?0.001:0.75,()=>kingFall(ks));
  after(fastMode?0.002:2.1,()=>camGo(poseToward(ks,1.02,1,-0.12),0.85));
  after(fastMode?0.003:2.95,()=>showResult(true));
}
function failRound(reason,mated){
  roundActive=false;lastWin=false;finalScore=0;
  potLost=pot;pot=0;scoreFrozen=0;
  clearSelection();
  state='mateCine';
  sfx('fail');
  setStatus(reason);
  if(mated){
    banner('CHECKMATED',true);
    const ks=g.kings[0];
    updateDangerRing();
    camGo(poseToward(ks,CFG.cam.mateDist,CFG.cam.mateEl,-0.4),fastMode?0.01:1.15);
    after(fastMode?0.001:0.75,()=>kingFall(ks));
    after(fastMode?0.002:2.6,()=>showResult(false,reason));
  }else{
    banner(reason,true);
    after(fastMode?0.002:1.5,()=>showResult(false,reason));
  }
}

/* ---------------- committing moves ---------------- */
function commitPlayerMove(m){
  clearSelection();
  state='anim';
  g.make(m);
  const st=g.status();
  updateHUD();
  animateMove(g,m,()=>{
    if(state==='end'||state==='menu')return;   // cashed out / left mid-animation
    updateDangerRing();
    if(st==='mate'){winRound();return;}
    movesMade++;
    updatePips();updateHUD();
    if(st==='stalemate'){failRound('STALEMATE');return;}
    if(st==='draw'){failRound('DRAW');return;}
    if(movesMade>=CFG.maxMoves){failRound('OUT OF MOVES');return;}
    if(g.inCheck(CH.B)){
      banner('CHECK!');sfx('check');
      state='checkCine';
      camGo(poseToward(g.kings[1],CFG.cam.checkDist,0.92,0.18),fastMode?0.01:0.5);
      after(fastMode?0.001:CFG.cam.checkSec,()=>{camGo(planPose(),0.55);aiTurn();});
    }else{
      aiTurn();
    }
  });
}
function aiTurn(){
  state='aiThink';
  setStatus('BLACK RESPONDS…');
  after(fastMode?0.001:CFG.aiDelayMs/1000,()=>{
    if(state!=='aiThink')return;
    const r=g.search({timeMs:CFG.aiThinkMs,depth:CFG.aiDepth});
    if(!r.move){ // no legal reply should have been caught as mate/stalemate already
      failRound('DRAW');return;
    }
    g.make(r.move);
    const st=g.status();
    state='aiAnim';
    animateMove(g,r.move,()=>{
      if(state==='end'||state==='menu')return; // cashed out / left mid-animation
      updateDangerRing();
      if(st==='mate'){failRound('CHECKMATED',true);return;}
      if(st==='stalemate'){failRound('STALEMATE');return;}
      if(st==='draw'){failRound('DRAW');return;}
      if(g.inCheck(CH.W)){
        banner('CHECK!',true);sfx('check');
        state='checkCine';
        camGo(poseToward(g.kings[0],CFG.cam.checkDist,0.92,-0.18),fastMode?0.01:0.5);
        after(fastMode?0.001:CFG.cam.checkSec,()=>{
          camGo(planPose(),0.55);
          state='play';roundActive=true;statusForPlay();updatePips();
        });
      }else{
        camGo(planPose(),0.5);
        state='play';statusForPlay();updatePips();
      }
    });
  });
}
function tryCommit(from,to){
  const cands=selMoves.filter(m=>m.from===from&&m.to===to);
  if(!cands.length)return false;
  if(cands.length>1){ // promotion — ask which piece
    pendingPromo=cands;
    state='promo';
    ui.promo.style.display='flex';
    return true;
  }
  commitPlayerMove(cands[0]);
  return true;
}
for(const b of document.querySelectorAll('.pbtn')){
  b.addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(!pendingPromo)return;
    const t={q:CH.QUEEN,r:CH.ROOK,b:CH.BISHOP,n:CH.KNIGHT}[b.dataset.p];
    const m=pendingPromo.find(x=>CH.T(x.promo)===t);
    pendingPromo=null;
    ui.promo.style.display='none';
    sfx('ui');
    if(m){state='play';commitPlayerMove(m);}
  });
}

/* =========================================================================
   INPUT — tap + drag on the board
   ========================================================================= */
const ray=new THREE.Raycaster();
const boardPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const tap=document.getElementById('tap');
let dragArm=false,dragging=false,dragStart={x:0,y:0},pendingDeselect=false;
function eventSquare(e,y=0){
  const r=canvas.getBoundingClientRect();
  const nx=((e.clientX-r.left)/r.width)*2-1,ny=-((e.clientY-r.top)/r.height)*2+1;
  ray.setFromCamera({x:nx,y:ny},camera);
  boardPlane.constant=-y;
  const hit=new THREE.Vector3();
  if(!ray.ray.intersectPlane(boardPlane,hit))return {sq:-1,hit:null};
  const f=Math.round(hit.x/S+3.5),rk=Math.round(3.5-hit.z/S);
  return {sq:(f>=0&&f<8&&rk>=0&&rk<8)?CH.sqOf(f,rk):-1,hit};
}
tap.addEventListener('pointerdown',e=>{
  if(state!=='play')return;
  const {sq}=eventSquare(e);
  if(sq<0){return;}
  pendingDeselect=false;dragArm=false;dragging=false;
  if(selected>=0&&sq===selected){pendingDeselect=true;dragArm=true;dragStart={x:e.clientX,y:e.clientY};tap.setPointerCapture(e.pointerId);return;}
  if(selected>=0&&tryCommit(selected,sq))return;
  const p=g.bd[sq];
  if(p&&CH.C(p)===CH.W){
    select(sq);
    dragArm=true;dragStart={x:e.clientX,y:e.clientY};
    tap.setPointerCapture(e.pointerId);
  }else if(selected>=0){
    sfx('illegal');
  }
});
tap.addEventListener('pointermove',e=>{
  if(!dragArm||state!=='play'||selected<0)return;
  if(!dragging){
    const dx=e.clientX-dragStart.x,dy=e.clientY-dragStart.y;
    if(dx*dx+dy*dy<180)return;
    dragging=true;pendingDeselect=false;
  }
  const {sq,hit}=eventSquare(e,0.45);
  const mesh=pieces.get(selected);
  if(mesh&&hit){mesh.position.set(hit.x,0.5,hit.z);}
  // illuminate the legal square under the piece
  const legalHere=sq>=0&&selMoves.some(m=>m.to===sq);
  if(legalHere){
    hoverSq.position.set(fx(CH.fileOf(sq)),0.028,fz(CH.rankOf(sq)));
    hoverSq.material.opacity=0.65;
  }else hoverSq.material.opacity=0;
});
tap.addEventListener('pointerup',e=>{
  if(state!=='play'){dragArm=dragging=false;return;}
  if(dragging){
    const {sq}=eventSquare(e,0.45);
    const mesh=pieces.get(selected);
    hoverSq.material.opacity=0;
    if(sq>=0&&tryCommit(selected,sq)){/* committed (or promo pending) */}
    else{
      // return to origin, keep selection
      if(mesh){
        const home=sqPos(selected);
        const from=mesh.position.clone();
        addAnim(0.16,k=>{mesh.position.lerpVectors(from,home,easeIO(k));mesh.position.y=(1-k)*from.y*0.4+k*0.14;});
      }
      if(sq!==selected)sfx('illegal');
    }
  }else if(pendingDeselect){
    clearSelection();sfx('ui');
  }
  dragArm=dragging=false;pendingDeselect=false;
});

/* =========================================================================
   HINT
   ========================================================================= */
function doHint(){
  if(hintUsed||state!=='play')return null;
  hintUsed=true;
  ui.btnHint.disabled=true;ui.hintBadge.style.opacity='.45';
  sfx('hint');
  const r=g.search({timeMs:CFG.hintSearchMs,depth:9});
  if(r.move){
    hintRingA.position.set(fx(CH.fileOf(r.move.from)),0.035,fz(CH.rankOf(r.move.from)));
    hintRingB.position.set(fx(CH.fileOf(r.move.to)),0.035,fz(CH.rankOf(r.move.to)));
    hintRingA.visible=hintRingB.visible=true;
    hintT=CFG.hintShowSec;
  }
  updateHUD();
  return r.move?g.uci(r.move):null;
}

/* =========================================================================
   BUTTONS (pointerdown — iOS drops click for second-finger taps)
   ========================================================================= */
ui.btnPlay.addEventListener('pointerdown',e=>{e.preventDefault();sfx('ui');pot=0;scoreFrozen=0;startRound();});
ui.btnArcade.addEventListener('pointerdown',e=>{e.preventDefault();location.href='../index.html';});
ui.btnMenu.addEventListener('pointerdown',e=>{e.preventDefault();sfx('ui');toMenu();});
ui.btnResUndo.addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(lastWin||movesMade<1||timeLeft<=1||g.hist.length<1)return;
  pot=potLost;potLost=0;                     // the pot comes back with the position
  ui.result.style.display='none';
  g.unmake();
  if((g.hist.length%2)===1)g.unmake();   // odd remainder = an AI reply is still on top; take it too
  movesMade--;
  finalScore=0;
  spawnPieces(g);
  clearSelection();updateDangerRing();
  hintRingA.visible=hintRingB.visible=false;hintT=0;
  state='play';roundActive=true;lastTickSec=-1;
  updatePips();updateHUD();statusForPlay();
  camGo(planPose(),0.5);
  sfx('capture');
});
ui.btnNext.addEventListener('pointerdown',e=>{e.preventDefault();sfx('ui');startRound();});
ui.btnCash.addEventListener('pointerdown',e=>{e.preventDefault();sfx('ui');cashOut();});
ui.btnCashRes.addEventListener('pointerdown',e=>{e.preventDefault();cashOut();});
function undoMove(){
  if(state==='aiThink'&&movesMade>0&&(g.hist.length%2)===1){
    g.unmake();                                             // retract before Black replies
    movesMade--;
    state='play';                                           // pending aiTurn callback sees state!=='aiThink' and aborts
    spawnPieces(g);
    clearSelection();updateDangerRing();
    updatePips();updateHUD();statusForPlay();
    camGo(planPose(),0.4);
    sfx('capture');
    return true;
  }
  if(state!=='play')return false;
  if(selected>=0){clearSelection();sfx('ui');return true;}  // first press cancels an active selection
  if(movesMade<1||g.hist.length<2)return false;
  g.unmake();g.unmake();                                    // AI reply + player move
  movesMade--;
  spawnPieces(g);
  clearSelection();updateDangerRing();
  hintRingA.visible=hintRingB.visible=false;hintT=0;
  updatePips();updateHUD();statusForPlay();
  camGo(planPose(),0.4);
  sfx('capture');
  return true;
}
ui.btnUndo.addEventListener('pointerdown',e=>{e.preventDefault();undoMove();});
ui.btnHint.addEventListener('pointerdown',e=>{e.preventDefault();doHint();});
function muteIcon(){ui.btnMute.classList.toggle('muted',muted);}
ui.btnMute.addEventListener('pointerdown',e=>{
  e.preventDefault();
  muted=!muted;store.set('m5_mute',muted?'1':'0');muteIcon();
  if(!muted)sfx('ui');
});
muteIcon();

/* =========================================================================
   MAIN LOOP
   ========================================================================= */
function resize(){
  const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h); // updates canvas CSS too — inset:0 alone doesn't size a replaced element
  camera.aspect=w/h;camera.updateProjectionMatrix();
  computePlanDist();
  if(state==='play'||state==='anim'||state==='aiThink'||state==='aiAnim')camGo(planPose(),0.4);
  if(state==='menu')camGo({az:-0.35,el:0.52,dist:planDist*1.15,look:new THREE.Vector3(0,0.5,-2)},0.4);
}
window.addEventListener('resize',resize);

let lastNow=performance.now();
function stepSim(dt){
  simT+=dt;
  tickTimers(dt);
  tickAnims(dt);
  tickParts(dt);
  camTick(dt);
  // menu drift
  if(state==='menu'){cam.az=-0.35+Math.sin(simT*0.14)*CFG.cam.azWobble*2;applyCam(cam);}
  // marker pulses
  const pu=1+Math.sin(simT*5)*0.07;
  legalMarkers.forEach(mk=>{if(mk.visible)mk.scale.setScalar(pu);});
  selRing.scale.setScalar(1+Math.sin(simT*4.4)*0.05);
  dangerRing.scale.setScalar(1+Math.sin(simT*7)*0.08);
  for(const l of atkLines)l.material.opacity=l.userData.baseOp*(0.75+0.25*Math.sin(simT*9));
  if(hintT>0){
    hintT-=dt;
    const hp=1+Math.sin(simT*8)*0.12;
    hintRingA.scale.setScalar(hp);hintRingB.scale.setScalar(hp);
    if(hintT<=0)hintRingA.visible=hintRingB.visible=false;
  }
  // timer
  if(roundActive&&(state==='play'||state==='anim'||state==='promo'||state==='checkCine'||state==='aiThink'||state==='aiAnim')){
    timeLeft-=dt;
    const s=Math.ceil(timeLeft);
    if(timeLeft<=CFG.tickTime&&s!==lastTickSec&&timeLeft>0){lastTickSec=s;sfx('tick');}
    if(timeLeft<=0){timeLeft=0;updateHUD();failRound("TIME'S UP");}
    updateHUD();
  }
}
renderer.setAnimationLoop(()=>{
  const now=performance.now();
  let dt=Math.min(0.1,(now-lastNow)/1000);lastNow=now;
  stepSim(dt);
  renderer.render(scene,camera);
});

/* =========================================================================
   HEADLESS HARNESS
   ========================================================================= */
window.__game={
  get s(){return {state,idx:curIdx,id:curPuzzle?curPuzzle.id:null,mateIn:curPuzzle?curPuzzle.mateIn:0,
    fen:g.fen(),movesMade,mult:curMult(),timeLeft:+timeLeft.toFixed(1),hintUsed,potential:potential(),pot,banked,
    final:finalScore,best,check:{w:g.inCheck(CH.W),b:g.inCheck(CH.B)},status:g.status(),
    pieces:pieces.size,draws:renderer.info.render.calls};},
  load:i=>{startRound(i);return curPuzzle.id;},
  toMenu,
  legal:()=>g.legal().map(m=>g.uci(m)),
  move:u=>{
    if(state!=='play')return 'not-your-turn:'+state;
    const m=g.legal().find(x=>g.uci(x)===u);
    if(!m)return 'illegal';
    selMoves=[m];
    commitPlayerMove(m);
    return 'ok';
  },
  setT:t=>{timeLeft=t;updateHUD();return timeLeft;},
  hintNow:()=>doHint(),
  undo:()=>undoMove(),
  cashNow:()=>cashOut(),
  fast:v=>{fastMode=v!==false;return fastMode;},
  step:d=>{stepSim(d||0.016);renderer.render(scene,camera);},
  refLine:()=>curPuzzle?curPuzzle.line.slice():[],
  bestMove:(ms)=>{const r=g.search({timeMs:ms||1000,depth:10});return r.move?g.uci(r.move):null;},
  three:()=>({scene,camera,renderer,sun}),
};

/* boot */
computePlanDist();
resize();
toMenu();
</script>
