/* ==================================================== camera */
const camS={x:0,v:0,lookX:0,lookV:0,init:false};
function updateCamera(dt){
  let tx,ty,tz,lx,ly,lz;
  if(S.state==='menu'){
    const a=S.t*0.18;
    tx=veh.x+Math.sin(a)*7.5; ty=3.6; tz=veh.z+Math.cos(a)*7.5;
    lx=veh.x; ly=1.2; lz=veh.z;
  } else {
    // orbit the camera around the hero toward the right side (where the targets are), hero stays centered
    // n: 0 at iPad portrait (3:4) and wider, 1 on narrow phones — pull back, rise, cheat left so the houses stay visible
    const n=clamp((0.75-camera.aspect)/0.25,0,1);
    const yaw=CFG.camYawDeg*Math.PI/180, camD=9.0+CFG.camNarrowBack*n;
    tx=veh.x-Math.sin(yaw)*camD-CFG.camNarrowLeft*n;
    ty=7.2+CFG.camNarrowUp*n+veh.y*0.6; tz=veh.z+Math.cos(yaw)*camD;
    lx=veh.x+veh.vx*0.35+CFG.camNarrowLook*n;             // frame centers between hero and the delivery side
    ly=0.9+veh.y*0.4; lz=veh.z-1;
  }
  if(S.state==='menu'){
    const k=Math.min(1,6*dt);
    camera.position.x=lerp(camera.position.x,tx,k);
    camera.position.y=lerp(camera.position.y,ty,k);
    camera.position.z=lerp(camera.position.z,tz,k);
    camS.init=false;
  } else {
    // critically-damped spring on the lateral follow — accelerates into the move instead of snapping
    if(!camS.init){ camS.x=tx; camS.v=0; camS.lookX=lx; camS.lookV=0; camS.init=true; }
    camS.v+=((tx-camS.x)*CFG.camSpring-camS.v*CFG.camDamp)*dt;  camS.x+=camS.v*dt;
    camS.lookV+=((lx-camS.lookX)*CFG.camSpring-camS.lookV*CFG.camDamp)*dt;  camS.lookX+=camS.lookV*dt;
    camera.position.x=camS.x;
    camera.position.y=lerp(camera.position.y,ty,Math.min(1,6*dt));
    camera.position.z=tz;
    lx=camS.lookX;
  }
  if(S.shake>0.01){
    camera.position.x+=rnd(-1,1)*S.shake*0.18;
    camera.position.y+=rnd(-1,1)*S.shake*0.14;
    S.shake*=Math.max(0,1-CFG.shakeDecay*dt);
  }
  camera.lookAt(lx,ly,lz);
  // sun + sky follow the action
  sun.position.set(veh.x-14,32,veh.z+12); sun.target.position.set(veh.x,0,veh.z);
  skyGrp.position.z=veh.z;
  for(const c of skyGrp.children){
    if(c.userData.vx!==undefined){ c.position.x+=c.userData.vx*dt; if(c.position.x>75) c.position.x=-75; }
  }
}

const prevScene=new THREE.Scene();
const prevCam=new THREE.PerspectiveCamera(38,1,0.1,20);
prevCam.position.set(0,0.7,3.4); prevCam.lookAt(0,0.38,0);
prevScene.add(new THREE.HemisphereLight(0xffffff,0x8a7a5a,1.25));
{ const dl=new THREE.DirectionalLight(0xfff2d8,1.1); dl.position.set(2,3,2); prevScene.add(dl); }
const prevGrp=new THREE.Group(); prevScene.add(prevGrp);
function setPreview(){
  while(prevGrp.children.length) prevGrp.remove(prevGrp.children[0]);
  let mesh=null,hh=0.5;
  if(pickups.length){
    const it=pickups[0];
    mesh=it.mesh.clone();
    mesh.position.set(0,0,0); mesh.rotation.set(0,0,0);
    hh=Math.max(it.h*it.scl,0.2);
  } else if(S.boxes>0){
    const tt=CFG.tiers[veh.tier];
    mesh=buildPackageMesh(veh.tier);
    mesh.position.y=tt.h/2;                                // package meshes are center-origin
    hh=Math.max(tt.h,0.3);
  }
  if(!mesh){ prevGrp.visible=false; return; }
  prevGrp.visible=true;
  prevGrp.add(mesh);
  prevGrp.scale.setScalar(clamp(0.68/hh,0.25,2.6));
}

const KIND_ICON={package:'📦',can:'🗑️',bin:'♻️',news:'📰',toy:'🧸',cone:'🚧',gnome:'🧝',flamingo:'🦩',
  birdbath:'⛲',bike:'🚲',mailbox:'📮',hedge:'🌳',fence:'🪵',sign:'🪧',sprinkler:'💦',barrier:'🚧',
  bench:'🪑',doghouse:'🏠',ped:'🧍',dog:'🐶',special:'⭐'};

  if(pickups.length){
    const it=pickups[0];
    icon=KIND_ICON[it.kind]||'❔';
    txt=(it.kind==='special'?it.specialName:it.kind.toUpperCase())+(pickups.length>1?' +'+(pickups.length-1):'');

/* ==================================================== states */
function startRun(){
  clearWorld();
  Object.assign(S,{state:'run',pot:0,deliveryScore:0,destroyScore:0,combo:0,comboT:0,comboMult:1,bestCombo:1,
    perfects:0,deliveries:0,biggestTier:-1,dist:0,banked:0,timeScale:1,slowT:0,shake:0,runT:0,
    boosts:0,specialRoll:0,legends:0,boxes:CFG.startBoxes,
    mailboxInCombo:false,decorInCombo:0,lastDestroyT:-9});
  Object.assign(veh,{x:0,y:0,z:0,vx:0,vy:0,speed:CFG.baseSpeed,air:false,wheel:0,cd:0,tier:0,
    stuckT:0,airT:0,dead:false,prevGy:0,prevSlope:0,crashT:0});
  veh.grp.rotation.set(0,Math.PI,0);
  input.forceWheel=null; input.wheelVal=0;
  clearPopups(); clearStack(); camS.init=false; _nextUpCache='';
  setRackPackage(0);
  ensureChunks(); updateTargets();
  camera.position.set(1.1,6.4,8.6);
  bgmPlay();
  $('menu').style.display='none'; $('over').classList.remove('show'); $('hud').style.display='';
}
function endRun(cashed){
  S.state='over'; bgmStop();
  S.banked=cashed?S.pot:0;
  const best=Math.max(Number(localStorage.ed_best||0),S.banked);
  localStorage.ed_best=best;
  $('overTitle').textContent=cashed?'CASHED OUT!':'TOTALED!';
  $('overTitle').className=cashed?'cash':'crash';
  $('overBank').textContent=fmt(S.banked)+' pts';
  $('overSub').textContent=cashed?'Route complete — pot banked. 💰':'The pot was lost in the wreck. Cash out next time!';
  const rows=[
    ['Pot built',fmt(S.pot)],
    ['Delivery points',fmt(S.deliveryScore)],
    ['Destruction points',fmt(S.destroyScore)],
    ['Best combo','×'+S.bestCombo],
    ['Door hits',S.perfects],
    ['Walls threaded',S.boosts],
    ['Legends found',S.legends],
    ['Biggest delivery',S.biggestTier>=0?CFG.tiers[S.biggestTier].name:'—'],
    ['Distance',Math.round(S.dist)+'m'],
    ['Best banked',fmt(best)],
  ];
  $('statGrid').innerHTML=rows.map(r=>'<div class="k">'+r[0]+'</div><div class="v">'+r[1]+'</div>').join('');

}
function toMenu(){
  S.state='menu'; clearPopups(); bgmStop();
  $('over').classList.remove('show'); $('hud').style.display='none'; $('menu').style.display='';
  $('menuBest').textContent=Number(localStorage.ed_best||0)>0?'BEST BANKED: '+fmt(localStorage.ed_best):'';
  Object.assign(veh,{x:0,y:0,z:veh.z,vx:0,vy:0,dead:false,air:false});
  veh.grp.rotation.set(0,Math.PI,0);
  veh.grp.position.set(veh.x,0,veh.z);
  if(!veh.rackMesh||!veh.rackMesh.parent) setRackPackage(veh.tier);
  if(veh.rackMesh) veh.rackMesh.scale.setScalar(veh.rackScale);
}

/* ==================================================== main loop */
let paused=false;
function update(dt){
  S.t+=dt;
  if(S.state==='run'){
    keyWheel(dt);
    updateVehicle(dt);
    updateStack(dt);
    ensureChunks();
    updateTargets();
    updatePackages(dt);
    updateFlying(dt);
    updatePeds(dt);
    updateDogs(dt);
    updateSprinklers(dt);
    updateSpecials(dt);
    // legendary spawn roll: after 30s, every 5s there's a 1-in-20 chance
    if(S.runT>CFG.specialAfter&&!veh.dead){
      S.specialRoll+=dt;
      if(S.specialRoll>=CFG.specialEvery){
        S.specialRoll=0;
        if(Math.random()<CFG.specialOdds) spawnSpecial();
      }
    }
    // combo drain
    if(S.comboT>0){ S.comboT-=dt; if(S.comboT<=0) comboBreak(); }
  } else {
    updatePeds(dt); updateFlying(dt);
  }
  updateCamera(dt);
  updatePopups(dt);
  updateMarker();
  updateHUD();
}
let last=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  let raw=Math.min((now-last)/1000,0.04); last=now;
  // slow-mo envelope
  if(S.slowT>0){ S.slowT-=raw; if(S.slowT<=0) S.timeScale=1; }
  else S.timeScale=lerp(S.timeScale,1,Math.min(1,8*raw));
  if(!paused) update(raw*S.timeScale);
  renderer.render(scene,camera);
  // spinning-statue preview of the next throwable, drawn in its own corner viewport
  if(S.state==='run'&&prevGrp.visible){
    prevGrp.rotation.y+=raw*2.2;
    const r=$('prev3d').getBoundingClientRect();
    if(r.width>4){
      renderer.autoClear=false;
      renderer.clearDepth();
      renderer.setScissorTest(true);
      renderer.setViewport(r.left,innerHeight-r.bottom,r.width,r.height);
      renderer.setScissor(r.left,innerHeight-r.bottom,r.width,r.height);
      renderer.render(prevScene,prevCam);
      renderer.setScissorTest(false);
      renderer.setViewport(0,0,innerWidth,innerHeight);
      renderer.autoClear=true;
    }
  }
}

function resize(){
  renderer.setSize(innerWidth,innerHeight);   // let three set the canvas CSS size too — inset:0 alone doesn't stretch a canvas
  camera.aspect=innerWidth/innerHeight;
  camera.fov=innerWidth>innerHeight?52:62;                  // keep the street readable in landscape too
  camera.updateProjectionMatrix();
}
addEventListener('resize',resize); resize();
ensureChunks(); updateTargets(); setRackPackage(0); toMenu();
requestAnimationFrame(frame);

window.__game={
  get s(){ return {state:S.state,pot:S.pot,delivery:S.deliveryScore,destroy:S.destroyScore,
    combo:S.combo,comboMult:S.comboMult,tier:veh.tier,speed:veh.speed,dist:S.dist,
    x:veh.x,y:veh.y,z:veh.z,air:veh.air,cd:veh.cd,dead:veh.dead,
    pickups:pickups.length,boxes:S.boxes,
    packages:world.packages.length,props:world.props.length,peds:world.peds.length,
    dogs:world.dogs.length,ramps:world.ramps.length,pits:world.pits.length,
    specials:world.specials.length,tboards:world.tboards.length,walls:world.walls.length,boosts:S.boosts,
    section:(world.chunks.get(Math.max(0,Math.floor(-veh.z/CFG.CH)))||{}).section,
    target:world.curTarget?{hz:world.curTarget.hz,scored:world.curTarget.scored}:null}; },
  step(dt=0.016){ update(dt); },
  pause(v=true){ paused=v; },
  startRun, toMenu,
  toss,
  steer(v){ input.forceWheel=v===null?null:clamp(v,-1,1); },
  tp(z,x){ veh.z=z; if(x!==undefined) veh.x=x; ensureChunks(); },
  setSpeed(v){ veh.speed=v; S.runT=(v-CFG.baseSpeed)/CFG.speedGrowth; },
  give(t){ veh.tier=clamp(t,0,CFG.tiers.length-1); setRackPackage(veh.tier); veh.cd=0; },
  cashNow(){ if(S.state==='run'){ endRun(true); } },
  crashNow(){ doCrash(); },
  target(){ return world.curTarget; },
  spawnSpecial,
  bgm:BGM,
  ents(){ return {props:world.props,peds:world.peds,dogs:world.dogs,solids:world.solids,ramps:world.ramps,pits:world.pits,
    specials:world.specials,tboards:world.tboards,walls:world.walls,packages:world.packages,houses:world.houses}; },
  zones(){ return world.curTarget?world.curTarget.zones:null; },
  cfg:CFG,
  input:()=>({active:input.wheelActive,val:input.wheelVal,wheel:veh.wheel}),
  three:()=>({scene,renderer,camera,veh}),
};
</script>
</body>
</html>
