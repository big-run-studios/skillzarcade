<!DOCTYPE html>
<html lang="en">
<head>
<script src="../auth.js"></script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Stack Monkey — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Orbitron:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --display:'Orbitron',sans-serif;
    --body:'Fredoka',sans-serif;
    --bg:#0c0a20;
    --txt:#eaf7ff; --dim:#8fb8dc;
    --panel:rgba(10,26,54,.82); --panel-bd:2px solid #34e1ff; --panel-glow:0 0 20px rgba(52,225,255,.45),inset 0 0 14px rgba(52,225,255,.12);
    --cyan:#34e1ff; --gold:#ffc233; --magenta:#ff4fd8; --green:#39ffa0; --red:#ff5a6e; --violet:#8b6bff;
    --btn:linear-gradient(180deg,#6ff0ff,#12b7e6); --btn-ink:#04283a; --btn-glow:0 0 24px rgba(52,225,255,.6),inset 0 0 0 2px rgba(255,255,255,.55);
    --title:#ffffff; --title-glow:0 0 12px #34e1ff,0 0 30px rgba(52,225,255,.85);
    --crash:#ff4f6e; --crash-glow:0 0 12px #ff4f6e,0 0 30px rgba(255,79,110,.7);
    --gold-glow:0 0 12px #ffc233,0 0 30px rgba(255,194,51,.8);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--display);color:var(--txt);}
  #app{position:fixed;inset:0;height:100%;width:100%;overflow:hidden;background:var(--bg);touch-action:none;}
  canvas{display:block;position:absolute;inset:0;}
  .ui{position:absolute;inset:0;pointer-events:none;}
  .ui *{pointer-events:auto;}

  /* round corner buttons (arcade house style) */
  #backArcade,#muteBtn{position:absolute;top:max(12px,env(safe-area-inset-top));z-index:25;width:42px;height:42px;border-radius:50%;
    border:var(--panel-bd);background:var(--panel);color:#fff;font-size:19px;line-height:1;cursor:pointer;backdrop-filter:blur(6px);
    box-shadow:var(--panel-glow);display:flex;align-items:center;justify-content:center;text-decoration:none;}
  #backArcade{left:12px;font-size:24px;font-weight:700;padding-bottom:3px;}
  #muteBtn{right:12px;}

  /* persistent cash-out (house convention: gold pulse button under mute) */
  #cashBtn{position:absolute;top:calc(max(12px,env(safe-area-inset-top)) + 52px);right:12px;z-index:24;width:60px;height:60px;border-radius:50%;
    cursor:pointer;border:2px solid rgba(255,255,255,.6);display:none;flex-direction:column;align-items:center;justify-content:center;line-height:1.05;
    font-family:var(--display);font-weight:900;letter-spacing:.5px;font-size:11px;color:#2a1c04;
    background:radial-gradient(100% 100% at 50% 28%, #ffe9a8, #ffc233 55%, #d9941e);
    box-shadow:0 0 16px rgba(255,194,51,.6),0 4px 12px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.3);
    animation:cashpulse 1.5s ease-in-out infinite;}
  #cashBtn.on{display:flex;}
  #cashBtn:active{transform:scale(.92);}
  #cashBtn small{font-size:8px;font-weight:700;color:#5a3a06;letter-spacing:0;margin-top:1px;}
  @keyframes cashpulse{0%,100%{box-shadow:0 0 10px rgba(255,194,51,.45),0 4px 12px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.3);}
    50%{box-shadow:0 0 22px rgba(255,194,51,.9),0 4px 12px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.4);}}

  /* HUD */
  #hud{position:absolute;left:0;right:0;top:max(12px,env(safe-area-inset-top));display:none;pointer-events:none;z-index:20;}
  #hud.on{display:block;}
  #hud *{pointer-events:none;}
  #scoreBox{position:absolute;left:62px;top:0;background:var(--panel);border:var(--panel-bd);box-shadow:var(--panel-glow);
    backdrop-filter:blur(6px);border-radius:14px;padding:5px 12px 6px;min-width:96px;}
  #scoreBox small{display:block;font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--dim);}
  #scoreVal{font-size:20px;font-weight:800;line-height:1;color:#fff;text-shadow:0 0 10px #34e1ff,0 0 24px rgba(52,225,255,.7);}
  #multBox{position:absolute;left:50%;transform:translateX(-50%);top:46px;background:var(--panel);border:var(--panel-bd);
    box-shadow:var(--panel-glow);backdrop-filter:blur(6px);border-radius:999px;padding:5px 16px;text-align:center;transition:border-color .3s;}
  #multVal{font-size:18px;font-weight:800;color:var(--gold);line-height:1;text-shadow:0 0 8px rgba(255,194,51,.7);}
  #multBox.hot{border-color:var(--gold);box-shadow:0 0 20px rgba(255,194,51,.5),inset 0 0 14px rgba(255,194,51,.12);}
  #streakVal{font-size:9px;font-weight:600;color:var(--dim);letter-spacing:.5px;}
  #streakVal.on{color:var(--green);text-shadow:0 0 8px rgba(57,255,160,.7);}
  /* spirit-level balance gauge */
  #lvlBox{position:absolute;right:62px;top:0;width:96px;height:34px;background:var(--panel);border:var(--panel-bd);
    box-shadow:var(--panel-glow);backdrop-filter:blur(6px);border-radius:999px;display:flex;align-items:center;justify-content:center;transition:border-color .2s;}
  #lvlBox.warn{border-color:#ffab4a;} #lvlBox.crit{border-color:var(--red);box-shadow:0 0 20px rgba(255,90,110,.55);}
  #lvlTrack{position:relative;width:74px;height:12px;border-radius:999px;background:#0e1c3c;box-shadow:inset 0 1px 4px rgba(0,0,0,.6);overflow:hidden;}
  #lvlTrack:before{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;margin-left:-1px;background:rgba(255,255,255,.22);}
  #lvlBub{position:absolute;top:1px;left:50%;width:16px;height:10px;margin-left:-8px;border-radius:999px;
    background:radial-gradient(60% 60% at 40% 35%,#c9ffe4,#39ffa0);box-shadow:0 0 8px rgba(57,255,160,.8);transition:background .2s;}
  #lvlBub.warn{background:radial-gradient(60% 60% at 40% 35%,#ffedcf,#ffab4a);box-shadow:0 0 8px rgba(255,171,74,.8);}
  #lvlBub.crit{background:radial-gradient(60% 60% at 40% 35%,#ffd9d9,#ff5a6e);box-shadow:0 0 10px rgba(255,90,110,.9);}

  /* bottom controls */
  .cbtn{position:absolute;bottom:calc(18px + env(safe-area-inset-bottom));z-index:22;border:none;cursor:pointer;border-radius:50%;
    font-family:var(--display);font-weight:800;color:#04283a;display:none;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 0 18px rgba(52,225,255,.4),0 6px 14px rgba(0,0,0,.5),inset 0 0 0 2px rgba(255,255,255,.4);transition:transform .06s;}
  .cbtn:active{transform:scale(.93);}
  .cbtn.on{display:flex;}
  .cbtn small{font-size:8px;font-weight:700;opacity:.85;letter-spacing:.5px;margin-top:-2px;}
  #rotBtn{left:16px;width:64px;height:64px;font-size:26px;background:linear-gradient(180deg,#6ff0ff,#12b7e6);}
  #dropBtn{right:16px;width:74px;height:74px;font-size:28px;color:#3a0629;background:linear-gradient(180deg,#ff8fe3,#e01fae);
    box-shadow:0 0 18px rgba(255,79,216,.45),0 6px 14px rgba(0,0,0,.5),inset 0 0 0 2px rgba(255,255,255,.4);}

  /* tutorial bubble */
  #tut{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(118px + env(safe-area-inset-bottom));z-index:21;
    background:var(--panel);border:var(--panel-bd);box-shadow:var(--panel-glow);backdrop-filter:blur(6px);border-radius:16px;padding:9px 18px;
    font-family:var(--body);font-size:15px;font-weight:600;color:var(--txt);white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;}
  #tut.on{opacity:1;}
  #tut:after{content:'';position:absolute;left:50%;bottom:-8px;margin-left:-8px;border:8px solid transparent;border-bottom:none;border-top:8px solid #34e1ff;}

  /* overlays */
  .overlay{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;background:radial-gradient(95% 70% at 50% 34%, rgba(8,26,52,.72), rgba(4,14,34,.92));
    backdrop-filter:blur(4px);transition:opacity .25s;padding:20px;}
  .overlay.hide{opacity:0;pointer-events:none;}
  .overlay.hide *{pointer-events:none;}
  .card{max-width:340px;width:100%;}
  .card h1{font-size:36px;font-weight:900;line-height:1.1;letter-spacing:1px;color:var(--title);}
  .card h1 .mk{color:#fff;text-shadow:var(--gold-glow);} .card h1 .st{color:#fff;text-shadow:var(--title-glow);}
  .card h1.crash{color:var(--crash);text-shadow:var(--crash-glow);}
  .card h1.gold{color:var(--gold);text-shadow:var(--gold-glow);}
  .card .sub{font-family:var(--body);font-size:14px;font-weight:500;color:var(--dim);margin-top:8px;}
  .bigscore{font-size:46px;font-weight:900;color:var(--gold);margin:12px 0 2px;line-height:1;text-shadow:var(--gold-glow);}
  .lostscore{font-size:38px;font-weight:900;color:var(--red);margin:12px 0 2px;line-height:1;text-decoration:line-through;text-shadow:var(--crash-glow);}
  .btn{border:none;cursor:pointer;font-family:var(--display);font-weight:800;color:var(--btn-ink);background:var(--btn);
    border-radius:999px;box-shadow:var(--btn-glow);padding:16px 30px;font-size:20px;letter-spacing:2px;width:100%;max-width:300px;margin-top:20px;transition:transform .06s;}
  .btn:active{transform:scale(.97);}
  .mini{margin-top:16px;font-size:12px;font-weight:600;color:var(--dim);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:var(--body);}
  .howto{display:flex;gap:16px;justify-content:center;margin-top:18px;font-family:var(--body);font-size:11px;font-weight:600;color:var(--dim);}
  .howto span{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .howto b{font-size:20px;}

  /* debug panel */
  #dbg{position:absolute;left:8px;top:64px;z-index:60;background:rgba(30,20,10,.92);color:#ffe9d2;border:1px solid #ffb628;
    border-radius:10px;padding:8px;font-size:10px;font-family:var(--display);display:none;flex-direction:column;gap:5px;
    max-width:230px;max-height:70vh;overflow-y:auto;}
  #dbg.on{display:flex;}
  #dbg .row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
  #dbg button{font-family:var(--display);font-size:9px;padding:3px 6px;border-radius:6px;border:1px solid #ffb628;background:transparent;color:#ffe9d2;cursor:pointer;}
  #dbg button.sel{background:#ffb628;color:#3a2508;font-weight:700;}
  #dbg input[type=range]{flex:1;height:14px;}
  #dbg label{display:flex;gap:4px;align-items:center;}
  #dbg .val{width:38px;text-align:right;}

  .brand{position:absolute;bottom:calc(2px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:21;
    color:rgba(255,255,255,.6);font-size:9px;font-weight:600;letter-spacing:1px;pointer-events:auto;text-shadow:0 1px 4px rgba(0,0,0,.4);}
</style>
</head>
<body>
<div id="app">
  <canvas id="cv"></canvas>
  <div class="ui">
    <a id="backArcade" href="../index.html" title="Arcade">‹</a>
    <button id="muteBtn" title="Mute">🔊</button>
    <button id="cashBtn"><span id="bankVal">0</span><small>CASH</small></button>

    <div id="hud">
      <div id="scoreBox"><small>SCORE</small><div id="scoreVal">0</div></div>
      <div id="multBox"><div id="multVal">×1.00</div><div id="streakVal">no streak</div></div>
      <div id="lvlBox"><div id="lvlTrack"><div id="lvlBub"></div></div></div>
    </div>

    <button id="rotBtn" class="cbtn">⟳<small>ROTATE</small></button>
    <button id="dropBtn" class="cbtn">⬇<small>SLAM</small></button>

    <div id="tut"></div>

    <div id="menu" class="overlay">
      <div class="card">
        <h1><span class="mk">STACK</span> <span class="st">MONKEY</span></h1>
        <div class="sub">Stack the bricks. Keep the balance.<br>Cash out before it all comes down!</div>
        <div class="howto">
          <span><b>↔️</b>drag to steer</span>
          <span><b>🔄</b>button rotates</span>
          <span><b>👆👆</b>double-tap to drop</span>
        </div>
        <button class="btn" id="playBtn">PLAY</button>
      </div>
    </div>

    <div id="overCrash" class="overlay hide">
      <div class="card">
        <h1 class="crash">CRASHED!</h1>
        <div class="sub" id="crashWhy">The tower toppled…</div>
        <div class="lostscore" id="crashLost">0</div>
        <div class="sub">unbanked score lost</div>
        <button class="btn" id="retryBtn">TRY AGAIN</button>
      </div>
      <button class="mini" onclick="location.href='../index.html'">back to arcade</button>
    </div>

    <div id="overBank" class="overlay hide">
      <div class="card">
        <h1 class="gold">CASHED OUT!</h1>
        <div class="bigscore" id="bankScore">0</div>
        <div class="sub" id="bankDetail"></div>
        <button class="btn" id="againBtn">PLAY AGAIN</button>
      </div>
      <button class="mini" onclick="location.href='../index.html'">back to arcade</button>
    </div>

    <div id="dbg"></div>
    <div class="brand" id="brand">CRASHARCADE · STACK MONKEY v0.5.3</div>
  </div>
  <audio id="unlockAudio" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQQAAACAgICA"></audio>
</div>
<script>
(()=>{ 'use strict';
/* ================================================================= helpers */
const TAU=Math.PI*2, PI=Math.PI, HPI=Math.PI/2;
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a=1,b)=>b===undefined?Math.random()*a:a+Math.random()*(b-a);
const normAng=a=>{ while(a>PI)a-=TAU; while(a<-PI)a+=TAU; return a; };
const vAdd=(a,b)=>({x:a.x+b.x,y:a.y+b.y});
const vSub=(a,b)=>({x:a.x-b.x,y:a.y-b.y});
const vRot=(v,a)=>{ const c=Math.cos(a),s=Math.sin(a); return {x:v.x*c-v.y*s, y:v.x*s+v.y*c}; };
const fmt=n=>Math.round(n).toLocaleString('en-US');
const store={ get:k=>{try{return localStorage.getItem(k);}catch(e){return null;}}, set:(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}} };

/* ================================================================= CFG — every balance number lives here */
const CFG={
  // world
  timeScale:1,
  U:36, platCols:9, platRows:30, gridOverhang:5,       // grid extends 5 columns past each tray edge
  trayY:640, trayH:22, floorY:856,
  // board sim — the tray is a driven pendulum: gravity torque from the grid's mass map vs the
  // monkey's angular spring. No physics engine; the whole model is these numbers.
  boardG:1500,                    // gravity, px/s² per unit cell mass
  boardK:9e6, boardC:9e5,         // strong monkey: centered mountains are safe, overhangs are the risk
  boardI0:175000,                 // empty-tray rotational inertia
  heightDestab:0.15,              // how much tower height amplifies tilt (he actively balances the rest)
  springSoftenPerPlace:0.008, springSoftenMin:0.8,
  maxTilt:0.46, critTilt:0.30, critGrace:1.1,
  impactKick:0.045,               // landing dip: fraction of the brick's own torque as an angV kick
  // flow
  crashBelow:150,
  spawnGap:300, spawnGapGrow:4, spawnGapMax:430,       // bricks enter from high above the tower
  descentStart:40, descentStartGrow:2.5, descentStartMax:90,
  descentAccel:110, descentCap:460,                    // falls accelerate as they go
  dblTap:0.35,                                         // two quick taps = drop (slam)
  slamSpeed:900, snapLerp:0.09, tumbleG:1800,
  // scoring
  baseCell:12, heightPts:6, fullClickPts:45, extraPegPts:12, weakClickPts:18,
  savePts:55, saveAngle:0.03, dangerPts:65, dangerFrac:0.5, streakBonus:0.3,
  // multiplier
  multBase:0.10, multPerPlace:0.015, multWeak:0.05,
  multOffset:0.06, multHeight:0.012, multDanger:0.18, multHard:0.03,
  // camera
  camMinZoom:0.42, camEase:2.2, camTopPad:150, camPerRow:0.02,
};

/* ================================================================= brick shapes
   cells: grid coords (x right, y up), (0,0)=bottom-left of the shape.
   pegs: cells whose TOP face is studded. Sockets are universal: any smooth
   downward face can accept a peg (a downward-pointing stud blocks it). */
const SHAPES={
  cube:  {name:'Cube',   cells:[[0,0]],                               pegs:[[0,0]],               hard:0,bonus:0, weight:1,   tier:0},
  duo:   {name:'Duo',    cells:[[0,0],[1,0]],                         pegs:[[0,0],[1,0]],         hard:0,bonus:0, weight:1,   tier:0},
  quad:  {name:'Beam',   cells:[[0,0],[1,0],[2,0],[3,0]],             pegs:[[0,0],[3,0]],         hard:0,bonus:6, weight:1,   tier:0},
  square:{name:'Square', cells:[[0,0],[1,0],[0,1],[1,1]],             pegs:[[0,1],[1,1]],         hard:0,bonus:4, weight:1,   tier:0},
  slab:  {name:'Slab',   cells:[[0,0],[1,0],[2,0],[0,1],[1,1],[2,1]], pegs:[[0,1],[1,1],[2,1]],   hard:0,bonus:8, weight:1.1, tier:1},
  lshape:{name:'L-Block',cells:[[0,0],[1,0],[2,0],[0,1]],             pegs:[[1,0],[2,0],[0,1]],   hard:1,bonus:10,weight:1,   tier:1},
  tshape:{name:'T-Block',cells:[[0,0],[1,0],[2,0],[1,1]],             pegs:[[0,0],[2,0],[1,1]],   hard:1,bonus:10,weight:1,   tier:1},
  stair: {name:'Stair',  cells:[[0,0],[1,0],[1,1]],                   pegs:[[0,0],[1,1]],         hard:1,bonus:8, weight:1,   tier:1},
  wedge: {name:'Roof',   cells:[[0,0],[1,0]],                         pegs:[],  wedge:true,       hard:1,bonus:12,weight:0.8, tier:2},
  pillar:{name:'Pillar', cells:[[0,0],[0,1],[0,2]],                   pegs:[[0,2]],               hard:1,bonus:12,weight:1.25,tier:2},
};
const COLORS=[  // [base, rim/glow, seam/dark] — house neon plastic
  ['#22b8e6','#7df0ff','#0c5c86'], ['#e034b8','#ff8ae4','#79135f'],
  ['#e6a91f','#ffd76a','#8a5f0b'], ['#27c96e','#7dffb4','#0e6e3a'],
  ['#7b52e8','#b99cff','#3b2585'], ['#e8445c','#ff8fa0','#821f30'],
  ['#e87422','#ffb066','#87400f'], ['#1fc9ad','#7ceede','#0e6e5c'],
];

/* ================================================================= DOM */
const app=document.getElementById('app'), cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const $=id=>document.getElementById(id);
const hudEl=$('hud'), scoreEl=$('scoreVal'), multEl=$('multVal'), multBox=$('multBox'), streakEl=$('streakVal');
const lvlBox=$('lvlBox'), lvlBub=$('lvlBub');
const rotBtn=$('rotBtn'), dropBtn=$('dropBtn'), cashBtn=$('cashBtn'), bankValEl=$('bankVal');
const tutEl=$('tut'), menuEl=$('menu'), overCrash=$('overCrash'), overBank=$('overBank'), dbgEl=$('dbg');

/* ================================================================= audio — synthesized toy-plastic SFX */
let AC=null, master=null, muted=store.get('ms_mute')==='1';
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); master=AC.createGain(); master.gain.value=muted?0:0.8; master.connect(AC.destination);}catch(e){} } return AC; }
function unlockAudio(){
  const c=ac(); if(c&&c.state==='suspended') c.resume();
  try{ if(navigator.audioSession) navigator.audioSession.type='playback'; }catch(e){}
  const ua=$('unlockAudio'); if(ua&&ua.paused) ua.play().catch(()=>{});   // iOS Silent-Mode workaround
}
function tone(f0,f1,dur,type,vol,when=0){
  const c=ac(); if(!c||muted) return; const t0=c.currentTime+when;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.setValueAtTime(f0,t0); if(f1!==f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t0+dur);
  g.gain.setValueAtTime(vol,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur+0.02);
}
function noise(dur,vol,freq,q=1.2,when=0){
  const c=ac(); if(!c||muted) return; const t0=c.currentTime+when;
  const n=Math.floor(c.sampleRate*dur), buf=c.createBuffer(1,n,c.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const src=c.createBufferSource(); src.buffer=buf;
  const f=c.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; f.Q.value=q;
  const g=c.createGain(); g.gain.value=vol;
  src.connect(f); f.connect(g); g.connect(master); src.start(t0);
}
let lastCreak=0, lastWarn=0, lastUh=0;
const sfx={
  click(){ noise(0.04,0.9,3200,2); tone(1900,2600,0.05,'square',0.16); tone(950,700,0.08,'triangle',0.2,0.01); },
  weak(){ noise(0.03,0.6,2600,2); tone(1400,1700,0.05,'square',0.1); },
  clack(v=1){ noise(0.05,0.55*v,900,0.9); tone(320,180,0.06,'triangle',0.14*v); },
  rotate(){ tone(1800,2200,0.04,'square',0.07); },
  drop(){ tone(500,300,0.08,'sine',0.1); },
  creak(v){ const n=performance.now(); if(n-lastCreak<300) return; lastCreak=n; tone(110,80,0.22,'sawtooth',0.05*v); },
  warn(d){ const n=performance.now(); if(n-lastWarn<(1-d)*550+180) return; lastWarn=n; tone(620+d*260,620+d*260,0.07,'square',0.08); },
  uh(){ const n=performance.now(); if(n-lastUh<900) return; lastUh=n; tone(190,120,0.13,'sawtooth',0.1); },
  pop(){ tone(480,900,0.09,'sine',0.16); },
  confirm(){ tone(720,1080,0.1,'sine',0.12); },
  crash(){ noise(0.5,0.9,500,0.7); tone(280,50,0.7,'sawtooth',0.22);
    for(let i=0;i<6;i++) noise(0.06,0.5,700+Math.random()*900,1,0.08+i*0.09); },
  bank(){ [523,659,784,1047].forEach((f,i)=>{ tone(f,f,0.16,'triangle',0.16,i*0.09); tone(f*2,f*2,0.1,'sine',0.05,i*0.09); }); },
};
const muteBtn=$('muteBtn');
function applyMute(){ muteBtn.textContent=muted?'🔇':'🔊'; if(master) master.gain.value=muted?0:0.8; }
muteBtn.addEventListener('click',e=>{ e.stopPropagation(); muted=!muted; store.set('ms_mute',muted?'1':'0'); applyMute(); });
applyMute();
/* ================================================================= board sim */
const W=430, H=932, U=CFG.U, HALF=(CFG.platCols-1)/2;      // tray columns -HALF..HALF
const GRID_HALF=HALF+CFG.gridOverhang;                      // stackable columns reach past the tray edges
const TRAY_W=CFG.platCols*U+14;
const PIVOT={x:W/2, y:CFG.trayY+CFG.trayH/2};              // where the monkey's hands hold the tray
const board={angle:0, angV:0};
let sumM=0, sumMx=0, sumMh=0, sumMr2=0;                    // mass-map moments in tray frame (x right, h up)
function boardReset(){ board.angle=0; board.angV=0; sumM=0; sumMx=0; sumMh=0; sumMr2=0; }
function addCellMass(i,j,m){
  const x=i*U, h=(j+0.5)*U+CFG.trayH/2;
  sumM+=m; sumMx+=m*x; sumMh+=m*h; sumMr2+=m*(x*x+h*h);
}
function springNow(){ return CFG.boardK*Math.max(CFG.springSoftenMin, 1-placements*CFG.springSoftenPerPlace); }
function boardEq(dMx=0,dMh=0){ // small-angle equilibrium tilt for the (optionally hypothetical) mass map
  const den=springNow()-CFG.boardG*(sumMh+dMh)*CFG.heightDestab;
  return den>1e4 ? CFG.boardG*(sumMx+dMx)/den : Math.sign(sumMx+dMx)*CFG.maxTilt;
}
function boardStep(dt){
  const c=Math.cos(board.angle), s=Math.sin(board.angle);
  const grav=CFG.boardG*(sumMx*c + sumMh*s*CFG.heightDestab);   // θ>0 = right side dips; height amplifies
  if(state==='crashing'){                                  // keel over freely, no monkey resistance
    board.angV+=grav/(CFG.boardI0+sumMr2)*dt + Math.sign(board.angle||1)*0.6*dt;
    board.angle=clamp(board.angle+board.angV*dt,-2.2,2.2);
    return;
  }
  const I=CFG.boardI0+sumMr2;
  const acc=(grav - springNow()*board.angle - CFG.boardC*board.angV)/I;
  board.angV+=acc*dt;
  board.angle+=board.angV*dt;
  if(board.angle>CFG.maxTilt){ board.angle=CFG.maxTilt; if(board.angV>0) board.angV=0; }
  if(board.angle<-CFG.maxTilt){ board.angle=-CFG.maxTilt; if(board.angV<0) board.angV=0; }
}

/* ================================================================= grid (tray-local, y up) */
let occ=new Map();        // "i,j" -> {rec, pegUp}
let placed=[];            // clicked bricks: {shapeKey, color, cells:[{i,j,pegUp}], wedge, squash}
let rubble=[];            // canned crash debris: {x,y,ang,vx,vy,vr,geom,color,rest,bounced}
let maxRow=0;
function gridFrame(){ const a=board.angle; return {o:vAdd(PIVOT, vRot({x:0,y:-CFG.trayH/2},a)), a}; }
function gridToWorld(i,j,f=gridFrame()){ return vAdd(f.o, vRot({x:i*U, y:-(j+0.5)*U}, f.a)); }
function worldToGrid(p,f=gridFrame()){ const d=vRot(vSub(p,f.o), -f.a); return {gx:d.x/U, gy:-d.y/U-0.5}; }
function pegAt(i,j){ const e=occ.get(i+','+j); return !!(e&&e.pegUp&&!occ.has(i+','+(j+1))); }
function stackH(i){ let h=0; for(let j=0;j<CFG.platRows;j++) if(occ.has(i+','+j)) h=j+1; return h; }

/* ================================================================= brick geometry */
const geomCache={};
function buildGeom(key,r){
  const ck=key+r; if(geomCache[ck]) return geomCache[ck];
  const sh=SHAPES[key];
  // rotate cells CW r times: (x,y) -> (y,-x), then normalize to min 0
  let cells=sh.cells.map(c=>({x:c[0],y:c[1],peg:sh.pegs.some(p=>p[0]===c[0]&&p[1]===c[1])}));
  let dir={x:0,y:1};                                   // peg direction in grid coords (y up)
  for(let k=0;k<r;k++){ cells=cells.map(c=>({x:c.y,y:-c.x,peg:c.peg})); dir=vRot(dir,-HPI); }
  const mx=Math.min(...cells.map(c=>c.x)), my=Math.min(...cells.map(c=>c.y));
  cells.forEach(c=>{c.x-=mx;c.y-=my;});
  // design coords (canvas y down): cell centres, COM at average (uniform density)
  const com={x:0,y:0};
  cells.forEach(c=>{ com.x+=c.x*U; com.y+=-c.y*U; }); com.x/=cells.length; com.y/=cells.length;
  const out={ shape:sh, rot:r,
    cells:cells.map(c=>({ off:{x:c.x*U-com.x, y:-c.y*U-com.y},
      peg:c.peg?{x:dir.x, y:-dir.y}:null })),          // peg dir in body-local canvas coords
    wedge:!!sh.wedge };
  if(sh.wedge){ // isosceles roof triangle spanning both cells; body position = triangle centroid
    let v=[{x:-U/2,y:U/2},{x:1.5*U,y:U/2},{x:U/2,y:-U/2}].map(p=>vRot(p, r*HPI));  // CW grid rot = +90° canvas
    v=v.map(p=>({x:p.x-mx*U, y:p.y+my*U}));                                        // same normalize shift as cells
    const c={x:(v[0].x+v[1].x+v[2].x)/3, y:(v[0].y+v[1].y+v[2].y)/3};
    out.wedgeVerts=v.map(p=>({x:p.x-c.x, y:p.y-c.y}));
    out.cells=cells.map(cc=>({off:{x:cc.x*U-c.x, y:-cc.y*U-c.y}, peg:null}));
  }
  geomCache[ck]=out; return out;
}
// a rec's cells as render offsets around the brick's centre — used for crash rubble
function recGeom(rec){
  const ci=rec.cells.reduce((s,c)=>s+c.i,0)/rec.cells.length;
  const cj=rec.cells.reduce((s,c)=>s+c.j,0)/rec.cells.length;
  return { cells:rec.cells.map(c=>({off:{x:(c.i-ci)*U, y:-(c.j-cj)*U}, peg:c.pegUp?{x:0,y:-1}:null})),
    wedge:false, centre:{ci,cj} };
}

/* ================================================================= run state */
let state='menu';       // menu | descend | snapping | tumbling | crashing | banked
let t=0, score=0, mult=1, bank=0, streak=0, placements=0;
let active=null;        // {key, rot, color, geom, x, y, slam, snapT, tumble:{vx,vy,vr}}
let seq=[], bag=[], forceKey=null, lastColor=-1;
let critT=0, danger=0, dangerSide=0, camZ=1, camZT=1, camShake=0;
let crashReason='', crashLostScore=0, monkeyMood='play', crashT=0, bankT=0;
let aimCand=null;       // ghost/landing prediction while descending
const particles=[];

function towerTopY(){ return CFG.trayY - maxRow*U; }
function spawnYNow(){ return (vy0-CAM_AY)/camZ+CAM_AY - 30; }   // just above the visible screen top

/* controlled bag: tier pool by progress, never 3 awkward shapes in a row */
let hardRun=0;
function drawShape(){
  if(forceKey){ const k=forceKey; forceKey=null; return k; }
  if(seq.length) return seq.shift();
  if(!bag.length){
    const keys=Object.keys(SHAPES).filter(k=>SHAPES[k].tier===0 || (SHAPES[k].tier===1&&placements>=3) || (SHAPES[k].tier===2&&placements>=7));
    bag=keys.concat(placements>=7?keys.filter(k=>SHAPES[k].hard):[]);   // late run: awkward shapes twice as likely
    for(let i=bag.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [bag[i],bag[j]]=[bag[j],bag[i]]; }
  }
  let k=bag.shift();
  if(SHAPES[k].hard&&hardRun>=2){ const e=bag.findIndex(x=>!SHAPES[x].hard); if(e>=0){ bag.push(k); k=bag.splice(e,1)[0]; } }
  hardRun=SHAPES[k].hard?hardRun+1:0;
  return k;
}
function descentStart(){ return Math.min(CFG.descentStart+placements*CFG.descentStartGrow, CFG.descentStartMax); }
function spawnBrick(){
  const key=drawShape();
  let ci; do{ ci=Math.floor(Math.random()*COLORS.length); }while(ci===lastColor); lastColor=ci;
  active={ key, rot:0, color:ci, geom:buildGeom(key,0), x:W/2, y:spawnYNow(), vy:descentStart(), vyB:descentStart(),
    slam:false, snapT:0, tumble:null };
  state='descend';
  setCtl();
  tutShow('move');
}
function rotateActive(){
  if(!active||state!=='descend') return;
  const oldRot=active.rot, oldGeom=active.geom;
  active.rot=(active.rot+1)%4; active.geom=buildGeom(active.key,active.rot);
  active.x=clampAim(active.x);
  if(!xAllowed(active.x)){ active.rot=oldRot; active.geom=oldGeom; return; }   // no rotating into a wall
  sfx.rotate(); tutDone('move'); tutDone('rotate');
}
function activeHalfW(){ const xs=active.geom.cells.map(c=>c.off.x); return (Math.max(...xs)-Math.min(...xs))/2+U/2; }
function activeHalfH(){ return Math.max(...active.geom.cells.map(c=>c.off.y))+U/2; }
function clampAim(x){ const hw=activeHalfW(); return clamp(x, W/2-(GRID_HALF+0.5)*U+hw, W/2+(GRID_HALF+0.5)*U-hw); }
/* walls: once the brick has sunk below a neighbouring stack's top, it can't steer into it —
   without this, a brick descending between two pieces could clip sideways through them */
function xAllowed(nx){
  if(!active) return true;
  const gp=worldToGrid({x:nx,y:CFG.trayY});
  const cis=[...new Set(active.geom.cells.map(c=>Math.round(gp.gx+c.off.x/U)))];
  if(cis.some(i=>i<-GRID_HALF||i>GRID_HALF)) return false;
  const rest=Math.max(...cis.map(stackH));
  return CFG.trayY-rest*U >= active.y+activeHalfH()-6;
}
function steerTo(nx){ nx=clampAim(nx); if(xAllowed(nx)) active.x=nx; }
function dropActive(){                      // SLAM = fast-forward the descent; the click itself is the landing
  if(!active||state!=='descend'||active.slam) return;
  active.slam=true; active.vy=CFG.slamSpeed;
  tutDone('move'); tutDone('rotate'); tutDone('drop');
  sfx.drop();
}

/* ================================================================= landing resolution (pure grid) */
function beginSnap(cand){
  active.cand=cand; active.snapT=0;
  state='snapping'; setCtl();
}
function beginTumble(){
  const side=active.x>=W/2?1:-1;
  active.tumble={vx:side*rnd(50,110), vy:Math.max(120,active.vy*(active.slam?0.4:1)), vr:side*rnd(1.5,3.5)};
  active.ang=board.angle;
  state='tumbling'; setCtl();
  popTxt(active.x,active.y-U,'no pegs!','#ff8fa0');
  sfx.clack(1);
}
function place(cand){
  const br=active, sh=SHAPES[br.key], pegN=cand.matches.length;
  const rec={shapeKey:br.key, color:br.color, squash:0,
    cells:cand.cellsG.map(c=>({i:c.i,j:c.j,pegUp:c.pegUp})),
    wedge:sh.wedge?{i0:Math.min(...cand.cellsG.map(c=>c.i)), j:cand.cellsG[0].j}:null};
  const eqBefore=boardEq();                 // equilibrium tilt before/after → save & danger bonuses
  placed.push(rec);
  let offSum=0;
  for(const c of rec.cells){ occ.set(c.i+','+c.j,{rec,pegUp:c.pegUp}); maxRow=Math.max(maxRow,c.j+1);
    addCellMass(c.i,c.j, sh.weight); offSum+=c.i; }
  const eqAfter=boardEq();
  const offX=offSum/rec.cells.length*U;
  // landing dip toward the brick's side
  board.angV += CFG.boardG*sh.weight*rec.cells.length*offX/(CFG.boardI0+sumMr2)*CFG.impactKick*4;
  const f=gridFrame();
  for(const m of cand.matches){ const p=vAdd(f.o,vRot({x:m.i*U,y:-m.j*U},f.a)); burst(p.x,p.y,'spark',COLORS[br.color][1],6); }
  if(sh.cells.length>=4) camShake=Math.max(camShake,0.18);
  if(pegN>=2) sfx.click(); else sfx.weak();
  sfx.uh();
  scorePlacement(rec, pegN, eqBefore, eqAfter, offX);
  tutDone('move'); tutDone('rotate'); tutDone('drop');   // first landing retires the control prompts
  active=null;
  spawnBrick();                             // continuous flow: the next brick starts falling immediately
}

/* ================================================================= scoring + flow */
function scorePlacement(rec,pegN,eqBefore,eqAfter,offX){
  const sh=SHAPES[rec.shapeKey];
  placements++;
  const gy=Math.max(...rec.cells.map(c=>c.j));
  let pts=sh.cells.length*CFG.baseCell + sh.bonus + gy*CFG.heightPts;
  const prevStreak=streak;
  let label='', col='#fff';
  if(pegN>=2){ pts+=(CFG.fullClickPts+(pegN-2)*CFG.extraPegPts)*(1+CFG.streakBonus*prevStreak);
    streak++; label='CLICK!'; col=COLORS[rec.color][1];
    tutDoneShow('click','Clicked! Multi-peg landings grow your streak.'); }
  else{ pts+=CFG.weakClickPts*(1+CFG.streakBonus*prevStreak);
    label='one peg'; col='#ffd76a';                        // streak holds but does not grow
    tutDoneShow('weak','One peg only — find two or more for the big bonus.'); }
  if(Math.abs(eqAfter)<Math.abs(eqBefore)-CFG.saveAngle){ pts+=CFG.savePts; popTxt(W/2,CFG.trayY-40,'BALANCE SAVE +'+CFG.savePts,'#7dffb4'); }
  if(Math.abs(board.angle)>CFG.critTilt*CFG.dangerFrac){ pts+=CFG.dangerPts; popTxt(W/2,CFG.trayY-70,'DANGER +'+CFG.dangerPts,'#ff8fa0'); }
  score+=Math.round(pts);
  let gain=CFG.multBase + placements*CFG.multPerPlace + Math.abs(offX)/(HALF*U)*CFG.multOffset
         + gy*CFG.multHeight + danger*CFG.multDanger + sh.hard*CFG.multHard;
  if(pegN<2) gain+=CFG.multWeak;
  mult+=gain;
  bank=Math.floor(score*mult);
  const p=gridToWorld(rec.cells[0].i, rec.cells[0].j);
  popTxt(p.x,p.y-U,'+'+Math.round(pts)+' '+label,col);
  sfx.confirm();
  tutDoneShow('bank','Cash out any time — or keep stacking!');
}
function bankNow(){
  if(state!=='descend'&&state!=='snapping') return;
  if(bank<=0) return;
  bankT=t; monkeyMood='bank'; state='banked'; setCtl();
  sfx.bank();
  const top=towerTopY();
  for(let i=0;i<26;i++) burst(W/2+rnd(-100,100), top+rnd(-20,60),'confetti',COLORS[Math.floor(rnd(COLORS.length))][0],1);
  $('bankScore').textContent=fmt(bank);
  $('bankDetail').textContent=placements+' bricks · ×'+mult.toFixed(2)+' multiplier';
  setTimeout(()=>{ if(state==='banked') overBank.classList.remove('hide'); }, 900);
}
function doCrash(reason){
  if(state==='crashing'||state==='banked'||state==='menu') return;
  crashReason=reason; crashLostScore=bank||Math.floor(score*mult);
  state='crashing'; crashT=t; monkeyMood='crash'; camShake=1; setCtl();
  sfx.crash();
  // canned tumble: every placed brick becomes kinematic debris, the tray keels over freely
  const f=gridFrame(), side=Math.sign(board.angle)||1;
  for(const rec of placed){
    const g=recGeom(rec);
    const c=gridToWorld(g.centre.ci, g.centre.cj, f);
    rubble.push({x:c.x,y:c.y,ang:f.a,vx:rnd(-60,60)+side*rnd(30,120),vy:rnd(-320,-60),vr:rnd(-4,4),
      geom:{cells:g.cells,wedge:false}, color:rec.color, rest:false, bounced:false});
  }
  if(active){
    rubble.push({x:active.x,y:active.y,ang:active.ang||board.angle,
      vx:active.tumble?active.tumble.vx:rnd(-60,60), vy:active.tumble?active.tumble.vy:0,
      vr:active.tumble?active.tumble.vr:rnd(-3,3), geom:active.geom, color:active.color, rest:false, bounced:false});
    active=null;
  }
  placed=[]; occ=new Map(); maxRow=0;
  sumM=0; sumMx=0; sumMh=0; sumMr2=0;
  board.angV=side*0.9;
  $('crashWhy').textContent=reason;
  $('crashLost').textContent=fmt(crashLostScore);
  setTimeout(()=>{ if(state==='crashing') overCrash.classList.remove('hide'); }, 1600);
}
function resetRun(){
  boardReset();
  occ=new Map(); placed=[]; rubble=[]; maxRow=0;
  active=null; particles.length=0; aimCand=null;
  score=0; mult=1; bank=0; streak=0; placements=0; critT=0; danger=0; camZ=1; camZT=1;
  monkeyMood='play'; crashT=0; bankT=0; hardRun=0; bag=[]; crashReason='';
  overCrash.classList.add('hide'); overBank.classList.add('hide'); menuEl.classList.add('hide');
  hudEl.classList.add('on');
  updateHud(true);
  spawnBrick();
}
function toMenu(){ state='menu'; hudEl.classList.remove('on'); setCtl(); menuEl.classList.remove('hide'); }

/* ================================================================= per-frame update */
function tick(dt){
  t+=dt;
  if(state==='menu'){ camShake=Math.max(0,camShake-dt*2); return; }
  const sdt=dt*CFG.timeScale;
  boardStep(sdt);

  const a=board.angle;
  danger=clamp(Math.abs(a)/CFG.critTilt + Math.abs(board.angV)*0.15, 0, 1.35);
  dangerSide=Math.sign(a);
  if(danger>0.75&&state!=='crashing'&&state!=='banked') sfx.warn(clamp(danger-0.6,0,1));
  if(Math.abs(board.angV)>0.5) sfx.creak(clamp(Math.abs(board.angV)*0.5,0,1));
  if(danger>0.62&&state!=='crashing'&&state!=='banked') sfx.uh();
  if(danger>0.5) tutDoneShow('balance','Keep the platform balanced!');

  if(state==='descend'&&active){
    aimCand=aimCandidate(active.x,active.rot);
    if(aimCand&&!aimCand.matches.length) tutDoneShow('miss','No pegs there — it would fall!');
    active.vyB=Math.min(active.vyB+CFG.descentAccel*sdt, CFG.descentCap);                  // gravity feel
    active.vy=active.slam?CFG.slamSpeed:active.vyB;
    active.y+=active.vy*sdt;
    if(aimCand){
      // contact: cell 0 reaches its target cell centre (brick rides the tray tilt, so one cell suffices)
      const f=gridFrame();
      const tgt=gridToWorld(aimCand.cellsG[0].i, aimCand.cellsG[0].j, f);
      const cur=vAdd({x:active.x,y:active.y}, vRot(active.geom.cells[0].off, f.a));
      if(cur.y>=tgt.y-2){ if(aimCand.matches.length) beginSnap(aimCand); else beginTumble(); }
    } else if(active.y>CFG.trayY+40) beginTumble();
  }
  else if(state==='snapping'&&active){
    active.snapT+=sdt;
    const k=Math.min(1,active.snapT/CFG.snapLerp);
    const f=gridFrame(), cand=active.cand;
    const tgt=gridToWorld(cand.cellsG[0].i,cand.cellsG[0].j,f);
    const tgtC=vSub(tgt, vRot(active.geom.cells[0].off, f.a));
    active.x=lerp(active.x,tgtC.x,k); active.y=lerp(active.y,tgtC.y,k);
    if(k>=1) place(cand);
  }
  else if(state==='tumbling'&&active){
    const tb=active.tumble;
    tb.vy+=CFG.tumbleG*sdt;
    active.x+=tb.vx*sdt; active.y+=tb.vy*sdt; active.ang=(active.ang||0)+tb.vr*sdt;
    if(active.y>CFG.trayY+CFG.crashBelow) doCrash('No pegs — the brick tumbled off!');
  }

  if(state!=='crashing'&&state!=='banked'){
    if(Math.abs(a)>CFG.critTilt){ critT+=dt; if(critT>CFG.critGrace) doCrash('The monkey lost his grip!'); }
    else critT=Math.max(0,critT-dt*2);
  }
  if(state==='crashing'&&t-crashT>2.6&&overCrash.classList.contains('hide')) overCrash.classList.remove('hide');

  // crash debris — canned kinematics, one clack per brick on first floor hit
  for(const r of rubble){
    if(r.rest) continue;
    r.vy+=CFG.tumbleG*sdt; r.x+=r.vx*sdt; r.y+=r.vy*sdt; r.ang+=r.vr*sdt;
    if(r.y>CFG.floorY-10&&r.vy>0){
      r.y=CFG.floorY-10; r.vy*=-0.25; r.vx*=0.7; r.vr*=0.6;
      if(!r.bounced){ r.bounced=true; sfx.clack(0.6); }
      if(Math.abs(r.vy)<50){ r.rest=true; r.vy=0; }
    }
  }

  // camera: a gentle notch out per stacked row, and never tighter than what frames the tower top
  const reqTop=towerTopY()-2.5*U, ax=900;
  camZT=clamp(Math.min((ax-CFG.camTopPad)/Math.max(1,ax-reqTop), 1-maxRow*CFG.camPerRow), CFG.camMinZoom, 1);
  camZ+=(camZT-camZ)*Math.min(1,dt*CFG.camEase);
  camShake=Math.max(0,camShake-dt*1.6);

  // particles
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i];
    p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
    if(p.type==='confetti'){ p.vy+=300*dt; p.vx*=0.99; p.rot+=p.vr*dt; }
    else if(p.type==='spark'||p.type==='dust'){ p.vy+=p.type==='dust'?-20*dt:160*dt; }
    else if(p.type==='sweat'){ p.vy+=700*dt; }
    else if(p.type==='txt'){ p.vy*=0.92; }
    if(p.life<=0) particles.splice(i,1);
  }
  // squash spring on freshly clicked bricks
  for(const r of placed) if(r.squash<1) r.squash=Math.min(1,r.squash+dt*5);

  updateHud();
}

/* straight-drop grid prediction for the aiming ghost (a hint — never guarantees the physics) */
function aimCandidate(x,rot){
  const g=buildGeom(active.key,rot), f=gridFrame();
  const gp=worldToGrid({x, y:CFG.trayY},f);
  const frac=gp.gx+g.cells[0].off.x/U;
  const fracErr=frac-Math.round(frac);                       // signed column misalignment, in cells
  const maxOffY=Math.max(...g.cells.map(c=>c.off.y));        // bottom row of the shape
  const cis=[...new Set(g.cells.map(c=>Math.round(gp.gx+c.off.x/U)))];
  if(cis.some(i=>i<-GRID_HALF||i>GRID_HALF)) return null;
  const rest=Math.max(...cis.map(stackH));                   // row the bottom of the shape lands on
  const cellsG=g.cells.map(c=>({ i:Math.round(gp.gx+c.off.x/U), j:rest+Math.round((maxOffY-c.off.y)/U),
    pegUp:c.peg?c.peg.y<-0.7:false, pegDown:c.peg?c.peg.y>0.7:false }));
  if(cellsG.some(c=>c.j>=CFG.platRows||occ.has(c.i+','+c.j))) return null;
  const set=new Set(cellsG.map(c=>c.i+','+c.j));
  const matches=[];
  if(!(SHAPES[active.key].wedge&&rot!==0)){
    for(const c of cellsG){
      if(set.has(c.i+','+(c.j-1))) continue;
      if(c.pegDown) continue;
      if(c.j===0&&Math.abs(c.i)<=HALF) matches.push(c);      // tray studs stop at the tray edge
      else if(c.j>0&&pegAt(c.i,c.j-1)) matches.push(c);
    }
  }
  return {cellsG, matches, fracErr, restY:CFG.trayY-rest*U};
}

function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* neon plastic tiles are pre-baked to offscreen sprites — per-frame shadowBlur on dozens of
   cells would tank mobile Safari */
const tileCache={}, pegCache={}, TILE_M=9;
function cellSprite(cols){
  const key=cols[0];
  if(tileCache[key]) return tileCache[key];
  const s=U+TILE_M*2, cvs=document.createElement('canvas'); cvs.width=cvs.height=s*2;
  const g=cvs.getContext('2d'); g.scale(2,2); g.translate(TILE_M,TILE_M);
  g.fillStyle=cols[0]; g.fillRect(0,0,U,U);
  const lg=g.createLinearGradient(0,0,0,U);
  lg.addColorStop(0,'rgba(255,255,255,.30)'); lg.addColorStop(0.35,'rgba(255,255,255,.05)'); lg.addColorStop(1,'rgba(0,0,0,.30)');
  g.fillStyle=lg; g.fillRect(0,0,U,U);
  g.strokeStyle=cols[2]; g.lineWidth=1.6; g.strokeRect(0.8,0.8,U-1.6,U-1.6);      // molded seam
  g.strokeStyle=cols[1]; g.lineWidth=1.5; g.shadowColor=cols[1]; g.shadowBlur=7;
  g.strokeRect(1.4,1.4,U-2.8,U-2.8);                                              // neon rim
  tileCache[key]=cvs; return cvs;
}
function drawCellRect(x,y,cols){
  ctx.drawImage(cellSprite(cols), x-U/2-TILE_M, y-U/2-TILE_M, U+TILE_M*2, U+TILE_M*2);
}
function pegSprite(cols){
  const key=cols[0]+cols[1];
  if(pegCache[key]) return pegCache[key];
  const pw=U*0.42, ph=U*0.2, m=7, w=pw+m*2, h=ph+m*2+3;
  const cvs=document.createElement('canvas'); cvs.width=w*2; cvs.height=h*2;
  const g=cvs.getContext('2d'); g.scale(2,2); g.translate(m,m);
  g.fillStyle=cols[2]; g.fillRect(0,0,pw,ph+3);
  g.shadowColor=cols[1]; g.shadowBlur=6;
  g.fillStyle=cols[1]; g.beginPath(); g.ellipse(pw/2,0,pw/2,pw*0.22,0,0,TAU); g.fill();
  g.shadowBlur=0;
  g.fillStyle='rgba(255,255,255,.4)'; g.beginPath(); g.ellipse(pw/2-pw*0.12,-1,pw*0.2,pw*0.09,0,0,TAU); g.fill();
  const spr={cvs,pw,ph,m,w,h}; pegCache[key]=spr; return spr;
}
function drawPeg(cx,cy,dir,cols,glow){
  // toy stud on a cell face; dir = outward normal in the CURRENT ctx frame
  const a=Math.atan2(dir.y,dir.x)+HPI;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(a);
  if(glow){ ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,-U/2-U*0.1,U*0.42,0,TAU); ctx.fill(); }
  const s=pegSprite(cols);
  ctx.drawImage(s.cvs, -s.pw/2-s.m, -U/2-s.ph-s.m, s.w, s.h);
  ctx.restore();
}
/* tiny cactus needles along the wedge's slopes — reads as "nothing stacks on me" */
function drawWedgeNeedles(v,cols){
  const cx=(v[0].x+v[1].x+v[2].x)/3, cy=(v[0].y+v[1].y+v[2].y)/3;
  ctx.strokeStyle=cols[1]; ctx.lineWidth=1.8; ctx.lineCap='round';
  for(const [a,b] of [[v[0],v[2]],[v[1],v[2]]]){
    const dx=b.x-a.x, dy=b.y-a.y, L=Math.hypot(dx,dy);
    let nx=-dy/L, ny=dx/L;
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    if(nx*(mx-cx)+ny*(my-cy)<0){ nx=-nx; ny=-ny; }               // point outward
    for(let k=0;k<4;k++){
      const tt=0.18+k*0.21, px=a.x+dx*tt, py=a.y+dy*tt;
      ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+nx*7,py+ny*7); ctx.stroke();
    }
  }
}
function drawBrickBody(body,brick,alpha=1){
  const g=brick.geom, cols=COLORS[brick.color];
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.translate(body.position.x,body.position.y); ctx.rotate(body.angle);
  if(g.wedge){
    ctx.fillStyle=cols[0]; ctx.beginPath();
    ctx.moveTo(g.wedgeVerts[0].x,g.wedgeVerts[0].y);
    for(let i=1;i<3;i++) ctx.lineTo(g.wedgeVerts[i].x,g.wedgeVerts[i].y);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=cols[2]; ctx.lineWidth=1.6; ctx.stroke();
    ctx.strokeStyle=cols[1]; ctx.lineWidth=1.5; ctx.shadowColor=cols[1]; ctx.shadowBlur=7; ctx.stroke(); ctx.shadowBlur=0;
    drawWedgeNeedles(g.wedgeVerts,cols);
    ctx.fillStyle='rgba(255,255,255,.25)'; ctx.beginPath();
    ctx.moveTo(g.wedgeVerts[2].x,g.wedgeVerts[2].y+3);
    ctx.lineTo(g.wedgeVerts[0].x+6,g.wedgeVerts[0].y-2); ctx.lineTo(g.wedgeVerts[0].x+12,g.wedgeVerts[0].y-2);
    ctx.closePath(); ctx.fill();
  }else{
    for(const c of g.cells) drawCellRect(c.off.x,c.off.y,cols);
    for(const c of g.cells) if(c.peg) drawPeg(c.off.x,c.off.y,c.peg,cols);
  }
  ctx.restore();
}
function drawGhostBrick(x,y){
  const b={position:{x,y},angle:board.angle};   // descending bricks ride the tray's tilt
  drawBrickBody(b,{geom:active.geom,color:active.color},0.96);
}
function drawPlatform(){
  const cols=['#233266','#6fd8ff','#0d1330'];
  ctx.save(); ctx.translate(PIVOT.x,PIVOT.y); ctx.rotate(board.angle);
  // padded underside

  // pegs on free columns (base rect sits U/2 above the pass-in point, so anchor them to the tray top)
  for(let i=-HALF;i<=HALF;i++) if(!occ.has(i+',0')) drawPeg(i*U,U/2-CFG.trayH/2,{x:0,y:-1},cols);
  // monkey hands gripping the tray (gone the moment he lets go in a crash)
  if(monkeyMood!=='crash'){

    ctx.beginPath(); ctx.arc(26,CFG.trayH/2+7,10,0,TAU); ctx.fill();
    ctx.strokeStyle='#c68a4a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(-26,CFG.trayH/2+7,10,0,TAU); ctx.stroke();
    ctx.beginPath(); ctx.arc(26,CFG.trayH/2+7,10,0,TAU); ctx.stroke();
  }
  ctx.restore();
}
function drawPlaced(){
  const f=gridFrame();
  for(const rec of placed){
    const cols=COLORS[rec.color];
    ctx.save(); ctx.translate(f.o.x,f.o.y); ctx.rotate(f.a);
    // squash-and-rebound around the brick's bottom edge on fresh clicks
    if(rec.squash<1){
      const k=1-rec.squash, sy=1-0.16*k*Math.cos(rec.squash*9), sx=1+(1-sy)*0.7;
      const bx=rec.cells.reduce((s,c)=>s+c.i,0)/rec.cells.length*U, by=-Math.min(...rec.cells.map(c=>c.j))*U;
      ctx.translate(bx,by); ctx.scale(sx,sy); ctx.translate(-bx,-by);
    }
    if(rec.wedge){
      const bx=rec.wedge.i0*U, by=-(rec.wedge.j)*U-U/2;
      ctx.fillStyle=cols[0]; ctx.beginPath();
      ctx.moveTo(bx-U/2,by+U/2); ctx.lineTo(bx+1.5*U,by+U/2); ctx.lineTo(bx+U/2,by-U/2); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=cols[2]; ctx.lineWidth=1.6; ctx.stroke();
      ctx.strokeStyle=cols[1]; ctx.lineWidth=1.5; ctx.shadowColor=cols[1]; ctx.shadowBlur=7; ctx.stroke(); ctx.shadowBlur=0;
      drawWedgeNeedles([{x:bx-U/2,y:by+U/2},{x:bx+1.5*U,y:by+U/2},{x:bx+U/2,y:by-U/2}],cols);
    }else{
      for(const c of rec.cells) drawCellRect(c.i*U,-(c.j+0.5)*U,cols);
      for(const c of rec.cells) if(c.pegUp&&!occ.has(c.i+','+(c.j+1))) drawPeg(c.i*U,-(c.j+0.5)*U,{x:0,y:-1},cols);
    }
    ctx.restore();
  }
}
function drawAim(){
  if(!active) return;
  const y=active.y;
  const halfH=activeHalfH();
  const ok=aimCand&&aimCand.matches.length;
  // drop guide — red when this spot has no pegs (the brick would tumble off)
  const endY=aimCand?aimCand.restY:CFG.trayY;
  ctx.strokeStyle=ok?'rgba(52,225,255,.35)':'rgba(255,90,110,.55)'; ctx.lineWidth=2; ctx.setLineDash([6,9]);
  ctx.beginPath(); ctx.moveTo(active.x,y+halfH+6); ctx.lineTo(active.x,endY-4); ctx.stroke(); ctx.setLineDash([]);
  // contact shadow at predicted rest height
  ctx.fillStyle='rgba(0,0,0,.45)';
  const wHalf=Math.max(...active.geom.cells.map(c=>Math.abs(c.off.x)))+U/2;
  ctx.beginPath(); ctx.ellipse(active.x,endY,wHalf*0.9,5,0,0,TAU); ctx.fill();
  if(!ok){ // no-connection warning at the landing point
    const pul=0.6+0.3*Math.sin(t*9);
    ctx.strokeStyle='rgba(255,90,110,'+pul+')'; ctx.lineWidth=3.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(active.x-9,endY-24); ctx.lineTo(active.x+9,endY-6);
    ctx.moveTo(active.x+9,endY-24); ctx.lineTo(active.x-9,endY-6); ctx.stroke();
  }
  // compatible peg highlight (pulsing)
  if(aimCand&&aimCand.matches.length){

      const p=vAdd(f.o,vRot({x:m.i*U,y:-m.j*U},f.a));
      ctx.strokeStyle=`rgba(255,214,64,${pul})`; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(p.x,p.y-4,U*0.34,0,TAU); ctx.stroke();

function drawDangerGlow(){
  if(danger<0.45||state==='crashing'||state==='banked') return;
  const f=gridFrame(), side=dangerSide||1;
  const p=vAdd(f.o,vRot({x:side*(HALF+0.5)*U,y:0},f.a));
  const a=clamp((danger-0.45)*0.9,0,0.55)*(0.7+0.3*Math.sin(t*10));
  const g=ctx.createRadialGradient(p.x,p.y,4,p.x,p.y,90);
  g.addColorStop(0,`rgba(255,80,70,${a})`); g.addColorStop(1,'rgba(255,80,70,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,90,0,TAU); ctx.fill();
}

/* ---------------- the monkey ---------------- */
const FUR='#c68a4a', FURD='#9a6633', CREAM='#f4dcb8';
function drawMonkey(){
  const d=clamp(danger,0,1), a=board.angle, side=Math.sign(a)||1;
  const e=monkeyMood==='crash'?t-crashT:0;
  let mx=W/2, my=0, mrot=0, hidden=false;
  const tremble=(d>0.65&&monkeyMood==='play')?Math.sin(t*70)*(d-0.65)*5:0;
  mx+=tremble - a*46*(1+d*0.6);          // lean opposite the weight
  if(monkeyMood==='crash'){
    if(e<0.95){ mrot=side*e*e*3.4; my=e*e*180; mx+=side*e*70; }
    else hidden=true;
  }
  if(monkeyMood==='bank') my=-Math.abs(Math.sin((t-bankT)*6))*22;

  // block pile + popping head (crash finale)
  if(monkeyMood==='crash'&&e>0.55){
    const grow=clamp((e-0.55)/0.5,0,1);
    ctx.save(); ctx.translate(W/2,CFG.floorY);
    for(let i=0;i<14;i++){
      const px=(seeded(i)-0.5)*170, ph=(14+seeded(i+9)*26)*grow, pw=26+seeded(i+30)*26;
      const py=-Math.abs(Math.cos(px*0.05))*34*grow;
      ctx.fillStyle=COLORS[i%COLORS.length][0];
      roundRect(px-pw/2,py-ph,pw,ph,5); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.15)'; ctx.lineWidth=1.5; ctx.stroke();
    }
    if(e>1.5){ // head pops out
      const pop=Math.min(1,(e-1.5)*3), hy=-30-pop*30+Math.sin(t*3)*2;
      drawMonkeyHead(0,hy,0,0.25,true,e);
    }
    ctx.restore();
    if(hidden) return;
  }

  ctx.save(); ctx.translate(mx,CFG.floorY+my); ctx.rotate(mrot);
  const bodyY=-78, hipY=-52, shY=-104;
  const lean=-a*0.55-(monkeyMood==='play'?side*d*0.12:0);

  // tail — the counterbalance performer
  const tw=Math.sin(t*(2+d*9))*(10+d*26);
  ctx.strokeStyle=FUR; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(14,hipY);
  ctx.bezierCurveTo(46,hipY+8, 60-side*d*30, hipY-30-d*36, 34-side*d*70+tw, hipY-58-d*40);
  ctx.stroke();
  ctx.strokeStyle=CREAM; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(34-side*d*70+tw,hipY-58-d*40,4,0,TAU); ctx.stroke();

  // legs + sneakers (shaky knees, sliding foot on the heavy side)
  const shake=(d>0.5&&monkeyMood==='play')?Math.sin(t*34)*(d-0.5)*8:0;
  for(const s of [-1,1]){
    const heavy=s===side&&d>0.55&&monkeyMood==='play';
    const slide=heavy?(d-0.55)*66:0, lift=heavy&&d>0.85?(d-0.85)*90:0;
    const fx=s*20+slide*s, fy=-6-lift;
    ctx.strokeStyle=FUR; ctx.lineWidth=11;
    ctx.beginPath(); ctx.moveTo(s*12,hipY);
    ctx.quadraticCurveTo(s*24+shake,hipY+26,fx,fy-4); ctx.stroke();
    ctx.fillStyle='#fff'; roundRect(fx-14,fy-10,28,12,6); ctx.fill();
    ctx.fillStyle='#ff4fd8'; ctx.fillRect(fx-14,fy-4,28,3);
    ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=1.5; roundRect(fx-14,fy-10,28,12,6); ctx.stroke();
  }

  ctx.save(); ctx.translate(0,bodyY); ctx.rotate(lean);
  // neon backpack
  ctx.fillStyle='#12b7e6'; roundRect(-40,-20,22,40,9); ctx.fill();
  ctx.strokeStyle='#7df0ff'; ctx.lineWidth=1.5; ctx.shadowColor='#34e1ff'; ctx.shadowBlur=6;
  roundRect(-40,-20,22,40,9); ctx.stroke(); ctx.shadowBlur=0;
  // body + belly
  ctx.fillStyle=FUR; ctx.beginPath(); ctx.ellipse(0,0,30,40,0,0,TAU); ctx.fill();
  ctx.fillStyle=CREAM; ctx.beginPath(); ctx.ellipse(2,8,19,26,0,0,TAU); ctx.fill();
  // utility belt
  ctx.fillStyle='#ffc233'; ctx.fillRect(-30,18,60,8);
  ctx.fillStyle='#1c2952'; ctx.fillRect(-6,17,12,10);
  drawMonkeyHead(4+lean*10,-52,lean*0.4,d,false,0);
  ctx.restore();

  // crash: he lets go — arms flail WITH the tumbling body so the little guy stays in one piece
  if(monkeyMood==='crash'){
    const wv=Math.sin(t*22)*10;
    ctx.strokeStyle=FUR; ctx.lineWidth=12; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-18,shY+6); ctx.quadraticCurveTo(-44,shY-24+wv,-34,shY-52-wv); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(18,shY+6); ctx.quadraticCurveTo(44,shY-24-wv,34,shY-52+wv); ctx.stroke();
    ctx.fillStyle=CREAM;
    ctx.beginPath(); ctx.arc(-34,shY-56-wv,9,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(34,shY-56+wv,9,0,TAU); ctx.fill();
  }

  // arms up to the tray grips (drawn in world space so hands land exactly on the platform)
  ctx.restore();
  if(!hidden&&monkeyMood!=='crash'){
    const gripL=vAdd(PIVOT,vRot({x:-26,y:CFG.trayH/2+7},board.angle));
    const gripR=vAdd(PIVOT,vRot({x:26,y:CFG.trayH/2+7},board.angle));
    ctx.strokeStyle=FUR; ctx.lineWidth=12; ctx.lineCap='round';
    const shLx=mx-22, shRx=mx+22, shy=CFG.floorY+my+shY;
    const bendL=8+Math.max(0,-a)*90*(0.4+d), bendR=8+Math.max(0,a)*90*(0.4+d);
    ctx.beginPath(); ctx.moveTo(shLx,shy); ctx.quadraticCurveTo(shLx-16-bendL*0.4,shy-40,gripL.x,gripL.y+6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(shRx,shy); ctx.quadraticCurveTo(shRx+16+bendR*0.4,shy-40,gripR.x,gripR.y+6); ctx.stroke();
  }
}
function drawMonkeyHead(hx,hy,hr,d,popped,e){
  ctx.save(); ctx.translate(hx,hy); ctx.rotate(hr);
  // ears
  for(const s of [-1,1]){ ctx.fillStyle=FUR; ctx.beginPath(); ctx.arc(s*26,-2,11,0,TAU); ctx.fill();
    ctx.fillStyle=CREAM; ctx.beginPath(); ctx.arc(s*26,-2,5.5,0,TAU); ctx.fill(); }
  // head + face
  ctx.fillStyle=FUR; ctx.beginPath(); ctx.arc(0,0,27,0,TAU); ctx.fill();
  ctx.fillStyle=CREAM; ctx.beginPath(); ctx.ellipse(0,7,19,15,0,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,-6,15,11,0,0,TAU); ctx.fill();
  // eyes: follow the active brick, widen with danger
  let lx=0, ly=0;
  if(active&&(state==='descend'||state==='snapping')){ const p={x:active.x,y:active.y};
    lx=clamp((p.x-W/2)/70,-2.6,2.6); ly=clamp((p.y-500)/160,-2.4,1.2); }
  else if(d>0.4){ lx=(dangerSide||1)*2.2; }
  if(d>0.9&&Math.sin(t*4)>0.4){ lx=0; ly=1.8; }               // panicked glance at the player
  const blink=popped?(Math.sin(e*5)>0.7?0.15:1):(Math.sin(t*0.7)>0.98?0.15:1);
  const er=4.6+d*2.6;
  for(const s of [-1,1]){
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(s*8,-7,er+1.6,(er+1.6)*blink,0,0,TAU); ctx.fill();
    ctx.fillStyle='#3a2313'; ctx.beginPath(); ctx.ellipse(s*8+lx,-7+ly,2.6,2.6*blink,0,0,TAU); ctx.fill();
  }
  // brows
  if(d>0.35){ ctx.strokeStyle=FURD; ctx.lineWidth=2.5; ctx.lineCap='round';
    for(const s of [-1,1]){ ctx.beginPath(); ctx.moveTo(s*13,-15+d*3); ctx.lineTo(s*4,-16-d*2); ctx.stroke(); } }
  // mouth states: smile → worry → clenched teeth → panic O
  ctx.strokeStyle='#6b4423'; ctx.lineWidth=2.4; ctx.lineCap='round';
  if(popped){ ctx.beginPath(); ctx.arc(0,9,7,0.15*PI,0.85*PI); ctx.stroke(); ctx.fillStyle='#d97'; }
  else if(d<0.35){ ctx.beginPath(); ctx.arc(0,8,7,0.15*PI,0.85*PI); ctx.stroke(); }
  else if(d<0.6){ ctx.beginPath(); ctx.moveTo(-6,12); ctx.quadraticCurveTo(0,10+Math.sin(t*20)*1,6,12); ctx.stroke(); }
  else if(d<0.85){ ctx.fillStyle='#fff'; roundRect(-8,8,16,7,2); ctx.fill();
    ctx.strokeStyle='#b98'; ctx.lineWidth=1; for(let i=-4;i<=4;i+=4){ ctx.beginPath(); ctx.moveTo(i,8); ctx.lineTo(i,15); ctx.stroke(); } }
  else{ ctx.fillStyle='#6b3a20'; ctx.beginPath(); ctx.ellipse(0,11,5,6.5,0,0,TAU); ctx.fill(); }
  // sweat
  if(d>0.6&&monkeyMood==='play'&&Math.random()<0.06)
    particles.push({type:'sweat',x:W/2-board.angle*46+rnd(-16,16),y:CFG.floorY-186,vx:rnd(-30,30),vy:-60,life:0.7,max:0.7,color:'#7ec8ff',sz:3});
  ctx.restore();
}

function drawParticles(){
  for(const p of particles){
    const k=clamp(p.life/p.max,0,1);
    ctx.globalAlpha=k;
    if(p.type==='txt'){
      ctx.font='700 '+p.sz+'px Fredoka'; ctx.textAlign='center';
      ctx.lineWidth=4; ctx.strokeStyle='rgba(4,10,30,.8)'; ctx.strokeText(p.txt,p.x,p.y);
      ctx.fillStyle=p.color; ctx.fillText(p.txt,p.x,p.y);
    }else if(p.type==='spark'){
      ctx.fillStyle=p.color; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot+t*4);
      ctx.beginPath(); for(let i=0;i<4;i++){ const a=i*HPI; ctx.lineTo(Math.cos(a)*p.sz*2,Math.sin(a)*p.sz*2);
        ctx.lineTo(Math.cos(a+HPI/2)*p.sz*0.7,Math.sin(a+HPI/2)*p.sz*0.7); }
      ctx.closePath(); ctx.fill(); ctx.restore();
    }else if(p.type==='confetti'){
      ctx.fillStyle=p.color; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2); ctx.restore();
    }else{ ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*(p.type==='dust'?2-k:1),0,TAU); ctx.fill(); }
  }
  ctx.globalAlpha=1;
}
function drawDebugOverlay(){
  const f=gridFrame();
  if(dbg.pegs){
    ctx.fillStyle='#3ecb6c';
    for(let i=-HALF;i<=HALF;i++) if(!occ.has(i+',0')){ const p=gridToWorld(i,-0.5,f); ctx.fillRect(p.x-2,p.y-2,4,4); }
    for(const [k,e] of occ){ const [i,j]=k.split(',').map(Number);
      if(e.pegUp&&!occ.has(i+','+(j+1))){ const p=gridToWorld(i,j+0.5,f); ctx.fillRect(p.x-2,p.y-2,4,4); } }
  }
  if(dbg.com&&sumM>0){
    const com=vAdd(PIVOT, vRot({x:sumMx/sumM, y:-sumMh/sumM}, board.angle));
    ctx.strokeStyle='#ff5a5a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(com.x-8,com.y); ctx.lineTo(com.x+8,com.y);
    ctx.moveTo(com.x,com.y-8); ctx.lineTo(com.x,com.y+8); ctx.stroke();
  }
  if(dbg.cand&&aimCand){
    ctx.strokeStyle='#ffd84d'; ctx.lineWidth=2;
    for(const cc of aimCand.cellsG){ const p=gridToWorld(cc.i,cc.j,f); ctx.strokeRect(p.x-U/2,p.y-U/2,U,U); }
  }
}
function torqueLR(){
  let L=0,R=0;
  for(const [k,e] of occ){
    const i=+k.split(',')[0], d=i*U*SHAPES[e.rec.shapeKey].weight;
    if(d<0) L-=d; else R+=d;
  }
  return {L:Math.round(L),R:Math.round(R)};
}

function render(){
  drawBackground();
  ctx.save();
  const shx=camShake>0?Math.sin(t*55)*camShake*7:0, shy=camShake>0?Math.cos(t*47)*camShake*5:0;
  ctx.translate(CAM_AX,CAM_AY); ctx.scale(camZ,camZ); ctx.translate(-CAM_AX+shx,-CAM_AY+shy);
  const wx0=(vx0-CAM_AX)/camZ+CAM_AX, wx1=(vx1-CAM_AX)/camZ+CAM_AX, wy1=(vy1-CAM_AY)/camZ+CAM_AY;
  drawFloor(wx0,wx1,wy1);
  if(state!=='menu'){
    drawDangerGlow();
    drawMonkey();
    drawPlatform(); drawPlaced();
    for(const r of rubble) drawBrickBody({position:{x:r.x,y:r.y},angle:r.ang},{geom:r.geom,color:r.color});
    if(active&&state==='descend') drawAim();
    if(active&&(state==='snapping'||state==='tumbling'))
      drawBrickBody({position:{x:active.x,y:active.y},angle:state==='tumbling'?(active.ang||0):board.angle},{geom:active.geom,color:active.color});
    drawParticles();
    if(dbg.pegs||dbg.com||dbg.cand) drawDebugOverlay();
  }else{ drawMonkey(); drawPlatform(); }
  ctx.restore();
  if(dbg.torque){ const tq=torqueLR();
    ctx.font='600 12px Fredoka'; ctx.textAlign='center'; ctx.fillStyle='#8fb8dc';
    ctx.fillText('⟲ '+tq.L+'   tilt '+(board.angle*57.3).toFixed(1)+'°   '+tq.R+' ⟳',W/2,112); }
}

/* ================================================================= input */
let dragging=false, downX=0, downY=0, downT=0, brickX0=0, moved=0, lastTapT=-1;
function evXY(e){ const r=app.getBoundingClientRect(); return {x:(e.clientX-r.left-offX)/scale, y:(e.clientY-r.top-offY)/scale}; }
app.addEventListener('pointerdown',e=>{
  unlockAudio();
  if(e.target.closest('button,a,#dbg')) return;
  const p=evXY(e);
  if(state==='descend'){ dragging=true; downX=p.x; downY=p.y; downT=t; brickX0=active.x; moved=0; }
});
app.addEventListener('pointermove',e=>{
  if(!dragging||state!=='descend') return;
  const p=evXY(e), dx=(p.x-downX)/camZ;
  moved=Math.max(moved,Math.abs(p.x-downX),Math.abs(p.y-downY));
  steerTo(brickX0+dx*1.15);
});
app.addEventListener('pointerup',e=>{
  const was=dragging; dragging=false;
  if(!was||state!=='descend') return;
  const p=evXY(e);
  if(p.y-downY>60&&t-downT<0.45){ dropActive(); return; }        // quick downward swipe = slam
  if(moved<8&&t-downT<0.3){                                      // a clean tap…
    if(t-lastTapT<CFG.dblTap){ lastTapT=-1; dropActive(); }      // …twice quickly = drop
    else lastTapT=t;
  }
});
app.addEventListener('pointercancel',()=>{ dragging=false; });
rotBtn.addEventListener('pointerdown',e=>e.stopPropagation());
dropBtn.addEventListener('pointerdown',e=>e.stopPropagation());
cashBtn.addEventListener('pointerdown',e=>e.stopPropagation());
rotBtn.addEventListener('click',e=>{ e.stopPropagation(); rotateActive(); });
dropBtn.addEventListener('click',e=>{ e.stopPropagation(); dropActive(); });
cashBtn.addEventListener('click',e=>{ e.stopPropagation(); bankNow(); });
$('playBtn').addEventListener('click',()=>{ unlockAudio(); resetRun(); });
$('retryBtn').addEventListener('click',()=>resetRun());
$('againBtn').addEventListener('click',()=>resetRun());
window.addEventListener('keydown',e=>{
  if(e.repeat) return;
  if(state==='descend'){
    if(e.key==='ArrowLeft'||e.key==='a') steerTo(active.x-U/2);
    if(e.key==='ArrowRight'||e.key==='d') steerTo(active.x+U/2);
    if(e.key==='ArrowUp'||e.key==='r'||e.key==='w') rotateActive();
    if(e.key===' '||e.key==='ArrowDown'||e.key==='s') dropActive();
  }
  if(e.key==='b') bankNow();
  if(state==='menu'&&(e.key===' '||e.key==='Enter')) resetRun();
});

/* ================================================================= debug panel */
const dbg={pegs:false, com:false, torque:false, cand:false};
function buildDbg(){
  dbgEl.innerHTML='';
  const row=cls=>{ const d=document.createElement('div'); d.className='row'; dbgEl.appendChild(d); return d; };
  const info=row(); info.id='dbgInfo';
  const shapes=row();
  Object.keys(SHAPES).forEach(k=>{ const b=document.createElement('button'); b.textContent=k;
    b.onclick=()=>{ forceKey=k; }; shapes.appendChild(b); });
  const toggles=row();
  [['pegs','pegs'],['com','COM'],['torque','torque'],['cand','candidates']].forEach(([k,lb])=>{
    const b=document.createElement('button'); b.textContent=lb; b.className=dbg[k]?'sel':'';
    b.onclick=()=>{ dbg[k]=!dbg[k]; b.className=dbg[k]?'sel':''; }; toggles.appendChild(b); });
  [['boardK',1e6,9e6,1e5],['boardC',1e5,2e6,25000],['boardG',500,3000,50],['timeScale',0.1,1,0.05]].forEach(([k,mn,mx,st])=>{
    const r=row(); r.innerHTML='<span style="width:66px">'+k+'</span>';
    const inp=document.createElement('input'); inp.type='range'; inp.min=mn; inp.max=mx; inp.step=st;
    inp.value=CFG[k];
    const val=document.createElement('span'); val.className='val'; val.textContent=inp.value;
    inp.oninput=()=>{ const v=+inp.value; val.textContent=v; CFG[k]=v; };
    r.appendChild(inp); r.appendChild(val); });
  const acts=row();
  [['force crash',()=>doCrash('debug crash')],['reset tower',()=>resetRun()],['bank',()=>bankNow()]].forEach(([lb,fn])=>{
    const b=document.createElement('button'); b.textContent=lb; b.onclick=fn; acts.appendChild(b); });
  setInterval(()=>{ if(!dbgEl.classList.contains('on')) return;
    info.textContent=state+' · tilt '+(board.angle*57.3).toFixed(1)+'° · danger '+danger.toFixed(2)
      +(danger>1?' CRITICAL':danger>0.75?' dangerous':danger>0.4?' wobbly':' stable')
      +' · placed '+placements+' · streak '+streak; },200);
}
let brandTaps=0, brandT0=0;
$('brand').addEventListener('click',()=>{ const n=performance.now();
  if(n-brandT0>2000){ brandTaps=0; brandT0=n; }
  if(++brandTaps>=5){ brandTaps=0; dbgEl.classList.toggle('on'); if(!dbgEl.children.length) buildDbg(); } });
if(/[?&]debug/.test(location.search)){ dbgEl.classList.add('on'); buildDbg(); }

/* ================================================================= sizing / loop */
let dpr=1, scale=1, offX=0, offY=0;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  const cw=app.clientWidth, ch=app.clientHeight;
  cv.width=cw*dpr; cv.height=ch*dpr; cv.style.width=cw+'px'; cv.style.height=ch+'px';
  scale=Math.min(cw/W,ch/H); offX=(cw-W*scale)/2; offY=(ch-H*scale)/2;
  vx0=-offX/scale; vy0=-offY/scale; vx1=W+offX/scale; vy1=H+offY/scale;
}
window.addEventListener('resize',resize); resize();

let last=performance.now();
function frame(nw){
  requestAnimationFrame(frame);
  const dt=Math.min((nw-last)/1000,1/30); last=nw;
  try{ tick(dt); }catch(err){ console.error('tick',err); }
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle='#0c0a20'; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.setTransform(scale*dpr,0,0,scale*dpr,offX*dpr,offY*dpr);
  try{ render(); }catch(err){ console.error('render',err); }
}
boardReset();
requestAnimationFrame(frame);

/* ================================================================= debug hook */
window.__game={
  get s(){ return { state, score, mult:+mult.toFixed(3), bank, streak, placements,
    tilt:+(board.angle*57.3).toFixed(2), angV:+board.angV.toFixed(3),
    danger:+danger.toFixed(2), critT:+critT.toFixed(2),
    placedSnap:placed.length, rubble:rubble.length, maxRow,
    occ:occ.size, camZ:+camZ.toFixed(2), t:+t.toFixed(2), crashReason,
    eq:+(boardEq()*57.3).toFixed(2),
    active:active?{key:active.key,rot:active.rot,x:Math.round(active.x),y:Math.round(active.y),
      vy:Math.round(active.vy),slam:active.slam}:null }; },
  step:d=>{ try{tick(d);}catch(e){console.error(e);} },
  startRun:resetRun, restart:resetRun, toMenu,
  bankNow, crashNow:()=>doCrash('debug'),
  spawn:k=>{ forceKey=k; if(state==='menu') resetRun(); },
  setSeq:a=>{ seq=a.slice(); },
  setX:x=>{ if(active&&state==='descend') steerTo(x); },
  rot:rotateActive, drop:dropActive,
  cand:()=>aimCand,
  torque:torqueLR, board:()=>board, occMap:()=>[...occ.keys()], cfg:CFG, dbg,
  tut:()=>{ tutFlags={}; store.set('ms_tut','{}'); },
};
toMenu();
})();
</script>
