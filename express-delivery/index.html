<!DOCTYPE html>
<html lang="en">
<head>
<script src="../auth.js"></script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Express Delivery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --display:'Orbitron',sans-serif; --body:'Fredoka','Arial Rounded MT Bold',sans-serif;
    --red:#ff3b30; --yellow:#ffc233; --cream:#fff6e8; --sky:#6ec1ff;
    --good:#3affa4; --combo:#ffe14d; --ink:#241206; --panel:rgba(24,14,6,.86);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{height:100%;overflow:hidden;background:#6ec1ff;touch-action:none;}
  body{font-family:var(--body);color:#fff;}
  #app{position:fixed;inset:0;width:100%;height:100%;overflow:hidden;}
  canvas{display:block;position:absolute;inset:0;}
  #gl{z-index:0;}
  .ui{position:fixed;inset:0;z-index:10;pointer-events:none;}
  .ui *{pointer-events:auto;}
  /* decorative layers must stay click-through (id specificity beats .ui *) */
  #wheel,#wheel *,#marker,#marker *{pointer-events:none;}

  /* ---------- score popups (world-anchored) ---------- */
  #pops{position:fixed;inset:0;z-index:8;pointer-events:none;overflow:hidden;}
  .pop{position:absolute;transform:translate(-50%,-50%);font-family:var(--display);font-weight:900;
    font-size:17px;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.55),0 0 12px rgba(255,255,255,.25);
    white-space:nowrap;opacity:0;will-change:transform,opacity;}
  .pop.big{font-size:24px;}
  .pop.dmg{text-align:center;}
  .pop .plbl{font-size:14px;letter-spacing:2px;margin-bottom:1px;text-shadow:0 2px 5px rgba(0,0,0,.6);}
  .pop .pnum{line-height:1;-webkit-text-stroke:1.2px rgba(0,0,0,.45);}
  .pop .pnum span{display:inline-block;will-change:transform,opacity;opacity:0;}

  /* ---------- top HUD ---------- */
  #hudTL{position:absolute;left:12px;top:max(10px,env(safe-area-inset-top));display:flex;flex-direction:column;gap:5px;pointer-events:none;max-width:56vw;}
  #miniRow{display:flex;gap:8px;pointer-events:none;}
  .mini{pointer-events:auto;width:34px;height:34px;border-radius:10px;border:1.5px solid rgba(255,255,255,.45);
    background:rgba(24,14,6,.55);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  #scoreVal{font-family:var(--display);font-weight:900;font-size:clamp(26px,8vw,40px);line-height:1;color:#fff;
    text-shadow:0 2px 8px rgba(0,0,0,.45),0 0 16px rgba(255,194,51,.5);}
  #comboRow{display:flex;align-items:center;gap:7px;}
  #comboBadge{font-family:var(--display);font-weight:900;font-size:19px;color:var(--combo);text-shadow:0 0 12px rgba(255,225,77,.7),0 2px 4px rgba(0,0,0,.5);min-width:40px;transition:transform .12s;}
  #comboBadge.pump{transform:scale(1.35);}
  #comboBar{position:relative;width:min(30vw,130px);height:8px;border-radius:5px;background:rgba(10,6,2,.5);border:1px solid rgba(255,255,255,.3);overflow:hidden;}
  #comboFill{position:absolute;inset:0;transform-origin:left;background:linear-gradient(90deg,#ffc233,#ffe89a);}
  #bonusBanner{font-family:var(--display);font-weight:900;font-size:clamp(13px,4vw,17px);letter-spacing:1px;color:var(--combo);
    text-shadow:0 0 14px rgba(255,225,77,.8),0 2px 5px rgba(0,0,0,.6);opacity:0;transform:translateY(6px);transition:all .18s;}
  #bonusBanner.show{opacity:1;transform:translateY(0);}

  #hudTR{position:absolute;right:12px;top:max(10px,env(safe-area-inset-top));display:flex;flex-direction:column;align-items:flex-end;gap:7px;pointer-events:none;}
  .chip{pointer-events:none;font-family:var(--display);font-weight:700;font-size:11.5px;letter-spacing:.6px;
    background:rgba(24,14,6,.6);border:1.5px solid rgba(255,255,255,.35);border-radius:999px;padding:6px 12px;color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,.5);}
  #tierChip{border-color:rgba(255,194,51,.65);color:var(--yellow);}
  #cashBtn{pointer-events:auto;border:none;cursor:pointer;border-radius:999px;padding:11px 18px;
    font-family:var(--display);font-weight:900;font-size:clamp(12px,3.4vw,15px);letter-spacing:1px;color:#06231a;
    background:radial-gradient(120% 140% at 50% 20%,#8affc4,#2fd67a 58%,#16ad5e);
    box-shadow:0 4px 14px rgba(0,0,0,.4),0 0 18px rgba(94,255,168,.5),inset 0 0 0 2px rgba(255,255,255,.4);
    animation:cashpulse 1.7s ease-in-out infinite;transition:transform .08s,opacity .2s;}
  #cashBtn:active{transform:scale(.95);}
  #cashBtn.hide{opacity:0;pointer-events:none;}
  @keyframes cashpulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.16)}}

  /* ---------- delivery marker ---------- */
  #marker{position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none;transition:opacity .2s;}
  #markerVal{font-family:var(--display);font-weight:900;font-size:13px;color:#fff;background:rgba(255,59,48,.92);
    border:1.5px solid rgba(255,255,255,.7);border-radius:999px;padding:4px 10px;box-shadow:0 3px 10px rgba(0,0,0,.35);}
  #markerArr{width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-top:12px solid #ff3b30;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.35));animation:bob .7s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}

  /* ---------- steering wheel ---------- */
  #wheelZone{position:absolute;inset:0;pointer-events:auto;touch-action:none;}  /* whole screen steers; buttons sit on top */
  #wheel{position:absolute;left:clamp(10px,3.4vw,26px);bottom:calc(clamp(14px,3.5vw,30px) + env(safe-area-inset-bottom));
    width:clamp(108px,30vw,148px);height:clamp(108px,30vw,148px);pointer-events:none;filter:drop-shadow(0 6px 14px rgba(0,0,0,.4));}
  #wheel svg{width:100%;height:100%;will-change:transform;}

  /* ---------- throw button ---------- */
  #throwBtn{position:absolute;right:clamp(12px,3.6vw,28px);bottom:calc(clamp(14px,3.5vw,30px) + env(safe-area-inset-bottom));touch-action:none;
    width:clamp(96px,26vw,132px);height:clamp(96px,26vw,132px);border-radius:50%;border:none;cursor:pointer;pointer-events:auto;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    font-family:var(--display);font-weight:900;letter-spacing:1px;color:#fff;
    background:radial-gradient(120% 130% at 50% 24%,#ff8a7a,#ff3b30 58%,#c81f14);
    box-shadow:0 6px 18px rgba(0,0,0,.45),0 0 22px rgba(255,80,60,.5),inset 0 0 0 3px rgba(255,255,255,.35);
    transition:transform .07s,filter .15s;}
  #throwBtn:active{transform:scale(.93);}
  #throwBtn .ic{font-size:clamp(30px,9vw,42px);line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3));}
  #throwBtn .tl{font-size:clamp(11px,3vw,14px);text-shadow:0 1px 3px rgba(0,0,0,.5);}
  #throwBtn.cooling{filter:saturate(.45) brightness(.8);}
  /* next-up preview: the actual 3D object spins like a statue in this window */
  #nextUp{position:absolute;right:clamp(12px,3.6vw,28px);
    bottom:calc(clamp(14px,3.5vw,30px) + clamp(96px,26vw,132px) + 10px + env(safe-area-inset-bottom));
    max-width:44vw;pointer-events:none;display:flex;align-items:center;gap:6px;
    font-family:var(--display);font-weight:700;font-size:clamp(10px,2.9vw,12.5px);letter-spacing:.6px;color:#fff;
    background:rgba(24,14,6,.68);border:1.5px solid rgba(255,194,51,.55);border-radius:999px;padding:6px 12px;
    text-shadow:0 1px 3px rgba(0,0,0,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #nextUp .nu{font-size:15px;line-height:1;}
  #nextUp.empty{border-color:rgba(255,110,90,.7);color:#ffb0a0;}
  #prev3d{position:absolute;right:clamp(18px,4.5vw,36px);
    bottom:calc(clamp(14px,3.5vw,30px) + clamp(96px,26vw,132px) + 48px + env(safe-area-inset-bottom));
    width:clamp(72px,20vw,100px);height:clamp(72px,20vw,100px);pointer-events:none;
    border:2px solid rgba(255,194,51,.65);border-radius:16px;
    box-shadow:0 4px 14px rgba(0,0,0,.35),inset 0 0 18px rgba(0,0,0,.25);}
  #cdRing{position:absolute;inset:-5px;border-radius:50%;pointer-events:none;
    background:conic-gradient(rgba(255,255,255,.95) calc(var(--cd,1)*360deg), rgba(0,0,0,.38) 0);
    -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 6px),#000 calc(100% - 5px));
    mask:radial-gradient(farthest-side,transparent calc(100% - 6px),#000 calc(100% - 5px));}

  /* ---------- menu ---------- */
  #menu{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:radial-gradient(120% 90% at 50% 12%, rgba(20,40,80,0) 40%, rgba(8,10,26,.55) 100%);}
  #menu .logo1{font-family:var(--display);font-weight:900;font-size:clamp(34px,11vw,58px);letter-spacing:2px;color:#fff;line-height:.95;
    text-shadow:0 4px 0 #b8221a,0 8px 18px rgba(0,0,0,.5),0 0 30px rgba(255,90,60,.55);font-style:italic;}
  #menu .logo2{font-family:var(--display);font-weight:900;font-size:clamp(38px,12.5vw,66px);letter-spacing:2px;color:var(--yellow);line-height:.95;
    text-shadow:0 4px 0 #a3510a,0 8px 18px rgba(0,0,0,.5),0 0 30px rgba(255,194,51,.6);font-style:italic;margin-top:-4px;}
  #menu .tag{font-family:var(--body);font-weight:600;font-size:clamp(13px,3.8vw,16px);color:var(--cream);text-shadow:0 2px 6px rgba(0,0,0,.6);
    background:rgba(24,14,6,.55);border-radius:999px;padding:7px 16px;border:1px solid rgba(255,255,255,.25);}
  #startBtn{margin-top:8px;border:none;cursor:pointer;border-radius:999px;padding:17px 44px;
    font-family:var(--display);font-weight:900;font-size:clamp(17px,5vw,22px);letter-spacing:2px;color:#3a1602;
    background:radial-gradient(120% 150% at 50% 15%,#ffe9a8,#ffc233 55%,#e89b12);
    box-shadow:0 6px 20px rgba(0,0,0,.45),0 0 26px rgba(255,194,51,.55),inset 0 0 0 3px rgba(255,255,255,.45);
    animation:cashpulse 1.6s ease-in-out infinite;transition:transform .08s;}
  #startBtn:active{transform:scale(.95);}
  #menuBest{font-family:var(--display);font-weight:700;font-size:13px;color:var(--combo);text-shadow:0 2px 5px rgba(0,0,0,.6);letter-spacing:1px;}
  .brand{position:absolute;bottom:calc(10px + env(safe-area-inset-bottom));left:0;right:0;text-align:center;
    font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:1.5px;color:rgba(255,255,255,.75);text-shadow:0 1px 3px rgba(0,0,0,.5);}
  #menuRow{position:absolute;top:max(12px,env(safe-area-inset-top));left:12px;display:flex;gap:8px;}

  /* ---------- results ---------- */
  #over{position:fixed;inset:0;z-index:22;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    background:rgba(8,6,14,.62);backdrop-filter:blur(3px);}
  #over.show{display:flex;}
  #overTitle{font-family:var(--display);font-weight:900;font-size:clamp(26px,9vw,44px);letter-spacing:2px;font-style:italic;
    text-shadow:0 4px 0 rgba(0,0,0,.35),0 0 28px rgba(255,90,60,.6);}
  #overTitle.crash{color:#ff6a5a;} #overTitle.cash{color:var(--good);text-shadow:0 4px 0 rgba(0,0,0,.35),0 0 28px rgba(58,255,164,.6);}
  #overBank{font-family:var(--display);font-weight:900;font-size:clamp(30px,10vw,50px);color:#fff;text-shadow:0 0 22px rgba(255,225,77,.75),0 3px 8px rgba(0,0,0,.6);}
  #overSub{font-family:var(--body);font-weight:600;font-size:14px;color:var(--cream);margin-top:-6px;text-shadow:0 2px 5px rgba(0,0,0,.6);}
  #statGrid{display:grid;grid-template-columns:auto auto;gap:7px 18px;background:var(--panel);border:1.5px solid rgba(255,194,51,.45);
    border-radius:16px;padding:16px 22px;box-shadow:0 10px 30px rgba(0,0,0,.5);}
  #statGrid .k{font-family:var(--body);font-weight:600;font-size:13.5px;color:#e8d9c2;text-align:left;}
  #statGrid .v{font-family:var(--display);font-weight:900;font-size:14px;color:#fff;text-align:right;}
  #restartBtn{border:none;cursor:pointer;border-radius:999px;padding:15px 42px;margin-top:6px;
    font-family:var(--display);font-weight:900;font-size:clamp(15px,4.6vw,20px);letter-spacing:2px;color:#3a1602;
    background:radial-gradient(120% 150% at 50% 15%,#ffe9a8,#ffc233 55%,#e89b12);
    box-shadow:0 6px 20px rgba(0,0,0,.45),0 0 26px rgba(255,194,51,.55),inset 0 0 0 3px rgba(255,255,255,.45);transition:transform .08s;}
  #restartBtn:active{transform:scale(.95);}
  #menuBtn2{border:none;cursor:pointer;background:none;font-family:var(--display);font-weight:700;font-size:12px;letter-spacing:1.5px;
    color:rgba(255,255,255,.8);text-decoration:underline;padding:8px;}
</style>
</head>
<body>
<div id="app">
  <canvas id="gl"></canvas>
  <div id="pops"></div>

  <div class="ui" id="hud" style="display:none;">
    <div id="hudTL">
      <div id="miniRow">
        <div class="mini" id="homeBtn" title="Hub">⌂</div>
        <div class="mini" id="muteBtn" title="Sound">🔊</div>
      </div>
      <div id="scoreVal">0</div>
      <div id="comboRow" style="visibility:hidden;">
        <span id="comboBadge">×2</span>
        <div id="comboBar"><div id="comboFill"></div></div>
      </div>
      <div id="bonusBanner"></div>
    </div>
    <div id="hudTR">
      <span class="chip" id="tierChip">📦 ENVELOPE ×1</span>
      <span class="chip" id="distChip">0m</span>
      <button id="cashBtn" class="hide">💰 CASH OUT</button>
    </div>
    <div id="marker" style="opacity:0;"><div id="markerVal">UP TO 1,000</div><div id="markerArr"></div></div>
    <div id="wheelZone"></div>
    <div id="wheel">
      <svg viewBox="0 0 100 100" id="wheelSvg">
        <circle cx="50" cy="50" r="45" fill="rgba(24,14,6,.55)" stroke="#fff" stroke-width="8" stroke-opacity=".9"/>
        <circle cx="50" cy="50" r="45" fill="none" stroke="#ff3b30" stroke-width="3.5"/>
        <line x1="50" y1="50" x2="50" y2="9" stroke="#ffd9a8" stroke-width="7" stroke-linecap="round"/>
        <line x1="50" y1="50" x2="15" y2="70" stroke="#ffd9a8" stroke-width="7" stroke-linecap="round"/>
        <line x1="50" y1="50" x2="85" y2="70" stroke="#ffd9a8" stroke-width="7" stroke-linecap="round"/>
        <circle cx="50" cy="50" r="13" fill="#ff3b30" stroke="#fff" stroke-width="3"/>
        <circle cx="50" cy="14" r="5.5" fill="#ffc233"/>
      </svg>
    </div>
    <div id="prev3d"></div>
    <div id="nextUp"><span class="nu">📦</span><span id="nextUpTxt">ENVELOPE · 5 LEFT</span></div>
    <button id="throwBtn"><span class="ic">📦</span><span class="tl">THROW</span><div id="cdRing"></div></button>
  </div>

  <div id="menu">
    <div id="menuRow">
      <div class="mini" id="homeBtn2" title="Hub">⌂</div>
      <div class="mini" id="muteBtn2" title="Sound">🔊</div>
    </div>
    <div class="logo1">EXPRESS</div>
    <div class="logo2">DELIVERY</div>
    <div class="tag">Drag anywhere to steer 🛞 &nbsp;Double-tap to throw 📦 &nbsp;Cash out 💰</div>
    <button id="startBtn">START ROUTE</button>
    <div id="menuBest"></div>
    <div class="brand" id="brand">EXPRESS DELIVERY v0.3.8 · BIG RUN STUDIOS</div>
  </div>

  <div id="over">
    <div id="overTitle" class="crash">TOTALED!</div>
    <div id="overBank">$0</div>
    <div id="overSub"></div>
    <div id="statGrid"></div>
    <button id="restartBtn">🚚 RESTART ROUTE</button>
    <button id="menuBtn2">MENU</button>
  </div>
</div>

<script type="module">
import * as THREE from './lib/three.module.js';

/* ================================================================== CFG */
const CFG = {
  ver:'0.3.8',
  // --- vehicle
  baseSpeed:8.5,          // forward m/s at run start
  speedGrowth:0.09,       // m/s gained per second
  maxSpeed:32,            // with wall boosts the ceiling is lethal — runs can't realistically pass ~3 min
  wallBoost:5,            // extra m/s permanently gained each time you thread a stunt wall
  steerMax:6.8,           // max lateral m/s at full wheel lock
  steerAccel:7.5,         // how fast lateral velocity chases the wheel (1/s)
  steerReturn:5.5,        // wheel spring back to center (1/s)
  airSteer:0.28,          // steering strength multiplier while airborne
  gravity:15,             // vehicle gravity
  laneMin:-5.5, laneMax:5.6,   // drivable x range (road + both sidewalks)
  crashSpeed:6.5,         // hitting a SOLID above this speed = run over
  stuckTime:2.6,          // immobilized this long = run over
  minorSlow:0.55,         // speed multiplier on a minor solid bump
  // --- throwing
  startBoxes:5,           // boxed packages per run — after that, throws come from what you pick up
  cooldown:1.0,
  inherit:0.62,           // fraction of vehicle velocity a package inherits
  throwFwd:1.0,           // small fixed forward push
  throwYawDeg:22.5,       // throw is angled this far forward of pure-right — landings resolve in view
  pkgGravity:12,
  airPts:100,             // points per second of airtime
  // --- ramps
  rampBoost:1.45,         // vy = speed * slope * boost
  rampEveryChunks:5,      // one ramp roughly every N chunks (after rampStartChunk)
  rampStartChunk:8,
  rampHopAt:0.72,         // auto-hop this far up the ramp — clears the car/truck parked past the lip
  rampHopBoost:1.8,
  // --- sidewalk pits (taped-off dug-outs; driving in = crash, filling one = points)
  pitStart:120, pitChance:0.3,
  windowPenalty:2500,     // breaking a house window costs this
  // --- delivery zone base points: ANY touch in the door prism = full score; porch = half door
  zonePts:{ property:250, walkway:500, porch:1000, door:2000 },
  tierUpAt:1000,          // deliveries scoring >= this base advance the package tier
  // --- destruction base points
  propPts:{ gnome:750, flamingo:750, birdbath:750, can:500, bin:500, mailbox:1000, cone:250,
            hedge:200, bike:400, news:150, toy:100, sprinkler:500, barrier:2500, fence:200, sign:250,
            bench:400, doghouse:400 },
  pedPts:1500, dogPts:2000,
  // --- affinity: every throwable connects with ~3 receptors for bonus points.
  //     Discovering these odd couples is the run-to-run scoring metagame.
  affinity:{
    package: { mailbox:['POSTED!',5000],      ped:['WRONG ADDRESS',2500],  dog:['CHEW TOY',1000] },
    ped:     { bench:['TAKE A SEAT',7500],    porch:['SENT HOME',5000],    hedge:['SOFT LANDING',2500] },
    dog:     { doghouse:['IN THE HOUSE!',7500], bench:['PARK PUP',5000],   ped:['PUPPY LOVE',2500] },
    can:     { pit:['HOLE FILLED',5000],      bin:['SORTED',2500],         mailbox:['JUNK MAIL',2500] },
    bin:     { pit:['HOLE FILLED',5000],      can:['SORTED',2500],         hedge:['COMPOST',2500] },
    gnome:   { porch:['GNOME HOME',5000],     birdbath:['GNOME BATH',5000], bench:['LITTLE GUY',2500] },
    flamingo:{ birdbath:['FLOCKED',5000],     hedge:['NESTED',2500],       porch:['LAWN ART',2500] },
    birdbath:{ pit:['PLANTED',5000],          hedge:['GARDEN SET',2500],   porch:['FANCY',2500] },
    cone:    { pit:['CONED OFF',5000],        car:['TOWED',5000],          barrier:['SAFETY FIRST',2500] },
    news:    { mailbox:['HEADLINE',5000],     ped:['EXTRA! EXTRA!',2500],  dog:['FETCHED',2500] },
    toy:     { dog:['FETCH!',5000],           ped:['PLAYTIME',2500],       bench:['LOST TOY',2500] },
    bike:    { car:['BIKE RACK',5000],        ped:['FREE BIKE',2500],      hedge:['DITCHED',1000] },
  },
  // --- combo
  comboDur:3.2,           // seconds without a scoring event before combo drops
  comboSteps:[[10,5],[7,4],[4,3],[2,2]],  // [actions, multiplier]
  bonusPts:5000,          // named-bonus flat award
  // --- damage-number feel (ported from Titan Guard): font scales with the hit, digits drop in one at a time
  dmgFontMax:20000, dmgStagger:0.055, dmgReveal:0.16, dmgBasePx:26,
  // --- pacing / density (by distance m)
  pedStart:60, dogStart:300, joggerStart:450,
  densityRamp:900,        // distance where density reaches max
  // --- characters
  pedSpeed:1.3, jogSpeed:3.2, dogSpeed:7.5, dogBark:0.8, dogRange:15,
  // --- package tiers: lat/up = throw velocity, fwd extra, bounce, chaos(bounce randomness), impact(smash power)
  tiers:[

function auTone(f0,f1,dur,type='sine',vol=0.3,delay=0){
  if(!AU.ctx||AU.muted) return;
  const t=AU.ctx.currentTime+delay, o=AU.ctx.createOscillator(), g=AU.ctx.createGain();
  o.type=type; o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),t+dur);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g); g.connect(AU.master); o.start(t); o.stop(t+dur+0.02);
}
function auNoise(dur,f,q,vol=0.35,delay=0){
  if(!AU.ctx||AU.muted) return;
  const t=AU.ctx.currentTime+delay, n=AU.ctx.sampleRate*dur, buf=AU.ctx.createBuffer(1,n,AU.ctx.sampleRate), ch=buf.getChannelData(0);
  for(let i=0;i<n;i++) ch[i]=(Math.random()*2-1)*(1-i/n);
  const src=AU.ctx.createBufferSource(); src.buffer=buf;
  const flt=AU.ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=f; flt.Q.value=q;
  const g=AU.ctx.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(flt); flt.connect(g); g.connect(AU.master); src.start(t);
}

const starMat=new THREE.MeshLambertMaterial({color:0xffd82e,emissive:0xcc9a00,emissiveIntensity:0.85});
function spawnSpecial(forceName){
  if(world.specials.length>=CFG.specialMax&&!forceName) return null;
  const spec=forceName?SPECIALS.find(s=>s.name===forceName.toUpperCase())||pick(SPECIALS):pick(SPECIALS);
  const z=veh.z-rnd(42,62), idx=Math.max(0,Math.floor(-z/CFG.CH));
  const rec=world.chunks.get(idx); if(!rec) return null;
  let x=(Math.random()<0.5?-1:1)*rnd(4.5,7.5)+roadX(z);
  if(onRamp(x,z,2)) x=(x>roadX(z)?1:-1)*8.5+roadX(z);      // legends step aside from ramps
  const grp=spec.build();
  grp.position.set(x,roadY(z),z);
  grp.rotation.y=rnd(0,Math.PI*2);
  grp.traverse(o=>{o.castShadow=true;});
  const marker=new THREE.Mesh(new THREE.OctahedronGeometry(0.34),starMat);
  marker.position.set(0,spec.h+0.8,0); grp.add(marker);
  rec.grp.add(grp);
  const sp={grp,marker,x,z,name:spec.name,h:spec.h,rad:spec.rad,dead:false};
  rec.specials.push(sp); world.specials.push(sp);
  return sp;
}
function updateSpecials(dt){
  for(const sp of world.specials){
    if(sp.dead) continue;
    sp.marker.rotation.y+=3.5*dt;
    sp.marker.position.y=sp.h+0.8+Math.sin(S.t*2.6)*0.16;
  }
}
function pickupSpecial(sp){
  const pts=award(CFG.specialPts,'destroy');
  popupPts(pts,'★ '+sp.name+' ★','#ffd82e');
  comboAction(); SFX.bonus(); S.lastDestroyT=S.t; S.legends++;
  sp.dead=true;
  world.specials=world.specials.filter(x=>x!==sp);
  sp.grp.remove(sp.marker);
  const mesh=sp.grp, wp=new THREE.Vector3(); mesh.getWorldPosition(wp);
  if(mesh.parent) mesh.parent.remove(mesh);
  const scl=Math.min(1,0.6/sp.h);
  mesh.scale.setScalar(scl); mesh.rotation.set(0,rnd(-0.4,0.4),0);
  stackGrp.add(mesh);
  stackGrp.updateWorldMatrix(true,false);
  const start=stackGrp.worldToLocal(wp.clone());
  pickups.push({kind:'special',specialName:sp.name,h:sp.h,scl,sfx:'wood',mesh,pos:start.clone(),start:start.clone(),target:slotPos(pickups.length),t:0});
}

function buildHouse(hz,side,isLot){
  // side=+1 right (deliverable), -1 left (scenery). Front wall faces the street at x=side*CFG.houseX.

  const roof=new THREE.MeshLambertMaterial({color:pick(HOUSE_ROOFS)});
  const W=rnd(7.5,9.5), D=6.2, H=rnd(3.0,3.6);
  const cx=CFG.houseX+D/2;                     // local +x = away from street
  g.add(bx(wall,D,H,W,cx,H/2,0));
  const rf=prism(roof,D+1.1,rnd(1.8,2.4),W+1.1,cx,H,0); rf.rotation.y=0; g.add(rf);
  // door + windows on street face
  g.add(bx(new THREE.MeshLambertMaterial({color:pick([0xb84a2e,0x2e6a9a,0x5a7a3a,0x8a4a8a])}),0.1,1.7,1.0,CFG.houseX-0.02,0.85+0.45,0));
  const win1=bx(M.window,0.1,0.9,1.1,CFG.houseX-0.02,1.9,-W*0.28,false);
  const win2=bx(M.window,0.1,0.9,1.1,CFG.houseX-0.02,1.9,W*0.28,false);
  g.add(win1); g.add(win2);
  g.userData.wins=[{mesh:win1,dz:-W*0.28},{mesh:win2,dz:W*0.28}];
  // porch: open slab + step — no columns, no awning, so the door prism reads clean
  const porch=bx(M.porch,2.0,0.45,3.6,CFG.houseX-1.0,0.225,0);
  porch.receiveShadow=true; g.add(porch);
  g.add(bx(M.porch,0.7,0.15,2.2,CFG.houseX-2.3,0.075,0));         // step
  // doormat (glows when this is the target)
  const mat=bx(M.mat,0.9,0.51,1.3,CFG.houseX-1.15,0.225,0,false);
  g.add(mat); g.userData.mat=mat;
  // walkway strip lawn->porch
  const wkw=bx(M.walkway,CFG.houseX-2.0-CFG.walkOut,0.06,1.4,(CFG.walkOut+CFG.houseX-2.0)/2,0.03,0,false);
  wkw.receiveShadow=true; g.add(wkw);
  if(side<0) g.rotation.y=Math.PI;            // rotate (not negative-scale) — keeps roof normals right-side-out
  g.position.z=hz;
  return g;
}
/* white picket fence line along a lot's street edge, with a gate at the walkway */
let picketTex=null;
function picketMat(){
  if(!picketTex){
    const c=document.createElement('canvas'); c.width=128; c.height=64;
    const x2=c.getContext('2d');
    x2.fillStyle='#f4f1e6';
    for(let i=0;i<8;i++){
      x2.fillRect(i*16+4,12,8,52);
      x2.beginPath(); x2.moveTo(i*16+4,12); x2.lineTo(i*16+8,2); x2.lineTo(i*16+12,12); x2.fill();  // picket tips
    }
    x2.fillRect(0,22,128,6); x2.fillRect(0,44,128,6);                                              // rails
    picketTex=new THREE.CanvasTexture(c);
    picketTex.wrapS=THREE.RepeatWrapping;
  }
  const m=new THREE.MeshLambertMaterial({map:picketTex,transparent:true,alphaTest:0.4,side:THREE.DoubleSide});
  return m;
}
const gateMat=new THREE.MeshLambertMaterial({color:0xe0c890,side:THREE.DoubleSide});
function buildFence(fx,elev,hz,z0,z1){
  const g=new THREE.Group();
  const seg=(za,zb)=>{
    const len=zb-za; if(len<=0.2) return;
    const m=picketMat(); m.map=picketTex.clone(); m.map.wrapS=THREE.RepeatWrapping; m.map.repeat.set(len/1.3,1); m.map.needsUpdate=true;
    const p=new THREE.Mesh(new THREE.PlaneGeometry(len,0.62),m);
    p.rotation.y=Math.PI/2; p.position.set(fx,elev+0.34,(za+zb)/2);
    g.add(p);
  };
  seg(z0,hz-0.75); seg(hz+0.75,z1);
  const gate=new THREE.Mesh(new THREE.PlaneGeometry(1.5,0.56),gateMat);      // gate where the walkway meets the sidewalk
  gate.rotation.y=Math.PI/2; gate.position.set(fx,elev+0.3,hz);
  g.add(gate);
  const post1=bx(M.white,0.1,0.7,0.1,fx,elev+0.35,hz-0.8), post2=bx(M.white,0.1,0.7,0.1,fx,elev+0.35,hz+0.8);
  g.add(post1); g.add(post2);
  return g;
}
/* nested scoring zones for a right-side target house at hz (world coords, shifted by the road curve) */
function houseZones(hz,off=0){
  const hx=CFG.houseX+off, w0=CFG.walkOut+off;
  return {
    doormat:{x0:hx-1.6,x1:hx-0.7,z0:hz-0.65,z1:hz+0.65},
    doorstep:{x0:hx-2.0,x1:hx,z0:hz-1.2,z1:hz+1.2},
    porch:{x0:hx-2.0,x1:hx,z0:hz-1.8,z1:hz+1.8},
    walkway:{x0:w0,x1:hx-2.0,z0:hz-0.7,z1:hz+0.7},
    property:{x0:w0,x1:hx+6.5,z0:hz-6.5,z1:hz+6.5},
    porchRect:{x0:hx-2.0,x1:hx,z0:hz-1.8,z1:hz+1.8,h:0.45},
    wall:{x:hx,z0:hz-5.2,z1:hz+5.2,h:3.4},
  };
}

/* ==================================================== sidewalk pits */
function buildPit(x,z){
  const g=new THREE.Group();
  const W=2.2,D=2.6;
  g.add(bx(new THREE.MeshLambertMaterial({color:0x17120c}),W,0.02,D,0,0.075,0,false));       // the hole
  g.add(bx(M.soil,W+0.5,0.05,D+0.5,0,0.055,0,false));                                        // dug-up rim
  const tapeM=new THREE.MeshLambertMaterial({color:0xffd82e});
  const tape=new THREE.Group();
  for(const [px,pz] of [[-W/2,-D/2],[W/2,-D/2],[-W/2,D/2],[W/2,D/2]])
    tape.add(bx(M.tire,0.07,0.62,0.07,px,0.31,pz));                                          // corner posts
  tape.add(bx(tapeM,W,0.09,0.04,0,0.5,-D/2)); tape.add(bx(tapeM,W,0.09,0.04,0,0.5,D/2));
  tape.add(bx(tapeM,0.04,0.09,D,-W/2,0.5,0)); tape.add(bx(tapeM,0.04,0.09,D,W/2,0.5,0));
  g.add(tape);
  g.position.set(x,0,z);
  return {grp:g,tape,x,z,w:W,d:D,filled:false};
}

/* nothing spawns INSIDE a ramp — in front of or behind is fine */
function onRamp(x,z,m=1.4){
  for(const r of world.ramps){
    if(Math.abs(x-r.x)<r.wid/2+m && z<r.z0+m && z>r.z0-r.len-m) return true;
  }
  return false;
}

/* ==================================================== ramps */
function buildRamp(x,z){
  // wedge rising toward -Z (direction of travel). Low edge at z0=z, top at z-len.
  const len=4.6,wid=3.4,h=1.15;
  const g=new THREE.Group();
  const geo=new THREE.BufferGeometry();
  const v=new Float32Array([
    // top slope (two tris)
    -wid/2,0,0,  wid/2,0,0,  wid/2,h,-len,   -wid/2,0,0,  wid/2,h,-len,  -wid/2,h,-len,
    // back face
    -wid/2,0,-len, -wid/2,h,-len, wid/2,h,-len,  -wid/2,0,-len, wid/2,h,-len, wid/2,0,-len,
    // sides
    -wid/2,0,0, -wid/2,h,-len, -wid/2,0,-len,
     wid/2,0,0,  wid/2,0,-len,  wid/2,h,-len,
  ]);
  geo.setAttribute('position',new THREE.BufferAttribute(v,3)); geo.computeVertexNormals();
  const mesh=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:0xc89858}));
  mesh.castShadow=true; mesh.receiveShadow=true; g.add(mesh);
  // caution stripes on the low lip
  g.add(bx(new THREE.MeshLambertMaterial({color:0xffd82e}),wid,0.06,0.3,0,0.05,-0.1,false));
  g.position.set(x,0,z);
  return {grp:g,x,z0:z,len,wid,h,slope:h/len};
}

/* ==================================================== world state */
const world={
  grp:new THREE.Group(),        // everything streamed (chunks)
  chunks:new Map(),             // idx -> {grp, props:[], solids:[], peds:[], dogs:[], ramps:[], house}
  houses:[],                    // right-side houses: {hz, zones, grp, scored, isTarget, chunkIdx}
  lhouses:[],                   // left-side house z centers (wall bounce only)
  targetQueue:[], curTarget:null,
  props:[], solids:[], peds:[], dogs:[], ramps:[], pits:[], flying:[], packages:[],
  specials:[], tboards:[], walls:[],
};
scene.add(world.grp);
let houseCounter=0, rampCounter=0;

function densityT(dist){ return clamp(dist/CFG.densityRamp,0,1); }

function genChunk(idx){
  if(world.chunks.has(idx)) return;
  const grp=new THREE.Group();
  const zc=-(idx+0.5)*CFG.CH;                 // chunk center (travel is -Z)
  const CH=CFG.CH;
  const rec={grp,props:[],solids:[],peds:[],dogs:[],ramps:[],pits:[],specials:[],tboards:[],walls:[],house:null};
  const cyc=CFG.hoodChunks+CFG.stuntChunks+1, cpos=((idx%cyc)+cyc)%cyc;
  const section=idx<CFG.hoodChunks?'hood':(cpos<CFG.hoodChunks?'hood':(cpos<CFG.hoodChunks+CFG.stuntChunks?'stunt':'wall'));
  rec.section=section;

  // --- ground slabs in 4 sub-segments so the road can wander (yaw) and roll (pitch)
  const SEG=4, SL=CH/SEG;
  for(let si=0;si<SEG;si++){
    const sz=zc-CH/2+SL*(si+0.5), ox=roadX(sz), oy=roadY(sz);
    if(section==='hood'){
      const road=bx(M.asphalt,CFG.roadHalf*2+0.7,0.05,SL+0.7,ox,oy-0.02,sz,false); road.receiveShadow=true; grp.add(road);
      for(let s of [-1,1]){
        const curb=bx(M.curb,0.25,0.14,SL+0.7,ox+s*(CFG.roadHalf+0.1),oy+0.05,sz,false); curb.receiveShadow=true; grp.add(curb);
        const walk=bx(M.walk,CFG.walkOut-CFG.walkIn+0.3,0.08,SL+0.7,ox+s*(CFG.walkIn+CFG.walkOut)/2,oy+0.02,sz,false); walk.receiveShadow=true; grp.add(walk);
        const lawn=bx(idx%2?M.grass:M.grass2,14.6,0.06,SL+0.7,ox+s*(CFG.walkOut+7),oy-0.01,sz,false); lawn.receiveShadow=true; grp.add(lawn);
      }
    } else {
      // stunt park: one wide concrete apron, asphalt strip down the middle
      const apron=bx(M.walkway,26,0.05,SL+0.7,ox,oy-0.03,sz,false); apron.receiveShadow=true; grp.add(apron);
      const strip=bx(M.asphalt,CFG.roadHalf*2+0.7,0.06,SL+0.7,ox,oy-0.02,sz,false); strip.receiveShadow=true; grp.add(strip);
      const dirt=bx(M.soil,44,0.04,SL+0.7,ox,oy-0.05,sz,false); dirt.receiveShadow=true; grp.add(dirt);
    }
  }
  for(let i=0;i<4;i++){ const dz=zc-CH/2+3+i*7; grp.add(bx(M.stripe,0.18,0.02,2.2,roadX(dz),roadY(dz)+0.02,dz,false)); }

  const dist=idx*CH, dT=densityT(dist);

  const addProp=(kind,x,z)=>{
    const ox=x+roadX(z);
    if(onRamp(ox,z)) return null;                    // never spawn inside a ramp
    const p=buildProp(kind); p.position.set(ox,roadY(z),z); grp.add(p);
    const pr={kind,grp:p,x:ox,z,rad:p.userData.rad,h:p.userData.h,sfx:p.userData.sfx,dead:false,
      pts:CFG.propPts[kind]||25,decor:(kind==='gnome'||kind==='flamingo'||kind==='birdbath')};
    rec.props.push(pr); world.props.push(pr);
    return pr;
  };
  const addTarget=(mult,x,z)=>{                    // stunt bullseye: hit it with anything thrown
    const ox=x+roadX(z), oy=roadY(z);
    if(onRamp(ox,z)) return null;
    const g2=new THREE.Group();
    g2.add(cyl(M.trunk,0.09,1.5,0,0.75,0));
    const board=new THREE.Group();
    board.add(cyl(M.red,0.8,0.12)); board.add(cyl(M.white,0.55,0.16)); board.add(cyl(M.red,0.3,0.2));
    board.rotation.x=Math.PI/2; board.position.y=2.0;
    g2.add(board);
    const cv=document.createElement('canvas'); cv.width=128; cv.height=64;
    const c3=cv.getContext('2d'); c3.font='900 46px Orbitron,sans-serif'; c3.textAlign='center'; c3.textBaseline='middle';
    c3.strokeStyle='rgba(0,0,0,.75)'; c3.lineWidth=8; c3.strokeText('×'+mult,64,32);
    c3.fillStyle='#ffe14d'; c3.fillText('×'+mult,64,32);
    const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true}));
    spr.scale.set(1.7,0.85,1); spr.position.y=3.2; g2.add(spr);
    g2.position.set(ox,oy,z);
    grp.add(g2);
    const tb={grp:g2,x:ox,z,y:oy+2.0,mult,dead:false};
    rec.tboards.push(tb); world.tboards.push(tb);
  };

  // --- ramps FIRST, so nothing else can spawn inside them
  if(section==='hood' && idx>=CFG.rampStartChunk && idx%CFG.rampEveryChunks===2){
    rampCounter++;
    const rz=zc+6;
    const rx=(rampCounter%2===0?rnd(1.4,2.4):rnd(-2.2,-0.5))+roadX(rz);
    const ramp=buildRamp(rx,rz);
    ramp.grp.position.y=roadY(rz); ramp.elev=roadY(rz);
    grp.add(ramp.grp); rec.ramps.push(ramp); world.ramps.push(ramp);
    const truck=rampCounter%2===1;                          // a car/truck parked just past the lip — the hop clears it
    const car=buildCar(truck);
    const cz=ramp.z0-ramp.len-(truck?rnd(5.5,6.5):rnd(2.5,4));
    car.position.set(ramp.x,roadY(cz),cz); car.rotation.y=truck?Math.PI:0;
    grp.add(car);
    addSolid(rec,{kind:truck?'truck':'car',x:ramp.x,z:cz,rad:truck?1.6:1.3,halfX:truck?1.05:0.95,halfZ:truck?2.9:2.1,grp:car});
  }
  if(section==='stunt'){
    for(let i=0;i<2;i++){
      const rz2=zc+CH/2-5-i*13;
      const rx2=pick([-3.4,-1.4,1.2,3.2])+roadX(rz2);
      const ramp=buildRamp(rx2,rz2);
      ramp.grp.position.y=roadY(rz2); ramp.elev=roadY(rz2);
      grp.add(ramp.grp); rec.ramps.push(ramp); world.ramps.push(ramp);
    }
  }

  if(section==='hood'){
  // --- houses (right = deliverable, left = scenery)
  const hzR=zc+rnd(-3,3), offR=roadX(hzR), elevR=roadY(hzR);
  const houseR=buildHouse(hzR,1,true); houseR.position.x=offR; houseR.position.y=elevR; grp.add(houseR);
  houseCounter++;
  const isTarget=idx>=0 && ((houseCounter%2===0) || dist>700);   // every other house early, every house late; never behind the start
  const hrec={hz:hzR,off:offR,elev:elevR,zones:houseZones(hzR,offR),grp:houseR,scored:false,missed:false,isTarget,chunkIdx:idx,tier:0,
    wins:houseR.userData.wins.map(w=>({mesh:w.mesh,z:hzR+w.dz,broken:false})),
    fence:{x:CFG.walkOut+offR+0.15,z0:hzR-6.5,z1:hzR+6.5,h:0.62}};
  grp.add(buildFence(hrec.fence.x,elevR,hzR,hrec.fence.z0,hrec.fence.z1));     // picket fence + gate: throws go up and over
  world.houses.push(hrec); rec.house=hrec;
  if(isTarget) world.targetQueue.push(hrec);
  if(idx%3!==2){ const hzL=zc+rnd(-3,3); const houseL=buildHouse(hzL,-1,false);
    houseL.position.x=roadX(hzL); houseL.position.y=roadY(hzL); grp.add(houseL);
    rec.lhz=hzL; world.lhouses.push(rec.lhz); }

  // --- trees between lots (SOLID, on lawn edges — outside the drivable lane)
  if(idx%2===0){
    const tz=zc-CH/2+rnd(1,3);
    const t=buildTree(); t.position.set(rnd(8,10)+roadX(tz),roadY(tz),tz); grp.add(t);
    addSolid(rec,{kind:'tree',x:t.position.x,z:t.position.z,rad:0.5,grp:t});
    const tz2=zc+rnd(-4,4);
    const t2=buildTree(); t2.position.set(-rnd(8,11)+roadX(tz2),roadY(tz2),tz2); grp.add(t2);
  }

  // --- parked cars / delivery trucks on the left lane edge (SOLID, in play)
  if(idx>2 && Math.random()<0.35+dT*0.3){
    const truck=dist>500 && Math.random()<0.3;
    const cz=zc+rnd(-6,6);
    const cx2=(truck?rnd(1.6,2.2):-rnd(2.2,2.7))+roadX(cz);   // trucks park on the RIGHT lane to block sight lines
    if(!onRamp(cx2,cz,3.5)){
      const car=buildCar(truck);
      car.position.set(cx2,roadY(cz),cz); car.rotation.y=truck?Math.PI:0;
      grp.add(car);
      addSolid(rec,{kind:truck?'truck':'car',x:cx2,z:cz,rad:truck?1.6:1.3,halfX:truck?1.05:0.95,halfZ:truck?2.9:2.1,grp:car});
    }
  }

  // --- destructible props
  // RIGHT side: delivery land — receptors, sparse pickups (throw from here)
  addProp('mailbox',rnd(6.2,6.6),hzR+rnd(2.5,4));                     // by the curb at every house
  if(Math.random()<0.4) addProp(pick(['can','bin']),rnd(4.2,5.4),hzR+rnd(-7,-5));
  const nDecor=rndi(0,1+Math.round(dT*1.5));
  for(let i=0;i<nDecor;i++) addProp(pick(['gnome','flamingo','birdbath','toy']),rnd(6.5,10.5),hzR+rnd(-6,6));
  if(Math.random()<0.4) addProp('hedge',rnd(7,8),hzR+rnd(-8,-6.5));
  if(Math.random()<0.3) addProp('fence',rnd(6.8,7.4),hzR+rnd(6.5,8.5));
  if(Math.random()<0.35) addProp('bench',rnd(4.6,5.2),hzR+rnd(6,9));
  if(Math.random()<0.35) addProp('doghouse',rnd(8,10),hzR+rnd(-6,-3));
  if(dist>150 && Math.random()<0.25+dT*0.35) addProp('cone',rnd(-2.5,3),zc+rnd(-9,9));
  if(dist>250 && Math.random()<0.2+dT*0.3) addProp('barrier',rnd(-1.5,2.5),zc+rnd(-9,9));
  if(dist>180 && Math.random()<0.3){ const s=addProp('sprinkler',rnd(6.6,9),hzR+rnd(-5,5)); if(s) s.sprk={t:rnd(0,4)}; }
  // LEFT side: pickup land — lots of ammo, so you weave left to load up, right to throw
  const nLeft=rndi(2,3+Math.round(dT*2));
  for(let i=0;i<nLeft;i++) addProp(pick(['can','bin','news','toy','cone','gnome','bike','flamingo']),-rnd(4.2,5.6),zc+rnd(-11,11));
  if(Math.random()<0.35) addProp('bench',-rnd(4.6,5.2),zc+rnd(-9,9));
  if(Math.random()<0.3) addProp('sign',rnd(-5.2,-4.4),zc+rnd(-8,8));
  // taped-off dug-out sidewalk sections (crash if you drive in — or fill them for points)
  if(dist>CFG.pitStart && Math.random()<CFG.pitChance){
    const side=Math.random()<0.6?1:-1;
    const pz=zc+rnd(-8,8);
    const px2=side*rnd(4.4,5.3)+roadX(pz);
    if(!onRamp(px2,pz,2.5)){
      const pit=buildPit(px2,pz);
      pit.grp.position.y=roadY(pz);
      grp.add(pit.grp); rec.pits.push(pit); world.pits.push(pit);
      addSolid(rec,{kind:'pit',pit,x:pit.x,z:pit.z,halfX:pit.w/2+0.1,halfZ:pit.d/2+0.1,rad:1});   // invisible crash geometry
    }
  }

  // --- pedestrians & dogs
  const nPed=dist<CFG.pedStart?0:rndi(0,1+Math.round(dT*1.6));
  for(let i=0;i<nPed;i++){
    const jog=dist>CFG.joggerStart && Math.random()<0.35;
    const m=buildPed(jog); const side=Math.random()<0.65?1:-1;
    const z=zc+rnd(-10,10), x=side*rnd(4.3,5.6)+roadX(z);
    m.position.set(x,roadY(z),z); grp.add(m);
    const ped={grp:m,x,z,side,dir:Math.random()<0.5?1:-1,speed:jog?CFG.jogSpeed:CFG.pedSpeed,jog,
      state:'walk',t:rnd(0,2),vel:new THREE.Vector3(),ang:new THREE.Vector3(),spin:0,rad:0.36,h:1.5,dead:false};
    rec.peds.push(ped); world.peds.push(ped);
  }
  if(dist>CFG.dogStart && Math.random()<0.25+dT*0.3){
    const m=buildDog(); const z=zc+rnd(-8,8), x=rnd(6.5,8.5)+roadX(z);
    m.position.set(x,roadY(z),z); m.rotation.y=-Math.PI/2; grp.add(m);
    const dog={grp:m,x,z,homeX:x,homeZ:z,state:'idle',t:0,vel:new THREE.Vector3(),ang:new THREE.Vector3(),
      rad:0.4,h:0.8,dead:false,vx:0,vz:0};
    rec.dogs.push(dog); world.dogs.push(dog);
  }

  } // end hood

  if(section==='stunt'){
    // STUNT PARK: loop arches, bullseyes, loose ammo (ramps were placed first, up top)
    if(Math.random()<0.45){                               // loop-the-loop arch over the route
      const loop=new THREE.Mesh(new THREE.TorusGeometry(3.6,0.42,8,24),M.red);
      loop.position.set(roadX(zc),roadY(zc)+3.4,zc); loop.castShadow=true;
      grp.add(loop);
    }
    const nT=rndi(1,2);
    for(let i=0;i<nT;i++) addTarget(pick([2,3,5]),rnd(5.5,8),zc+rnd(-9,9));   // right side only — that's where throws go
    for(let i=0;i<3;i++) addProp(pick(['can','cone','toy','news','bin']),pick([-1,1])*rnd(3.5,6.5),zc+rnd(-10,10));
  }

  if(section==='wall'){
    // THE WALL: solid concrete across the route with a 3-scooter gap — thread it or total it
    const wz=zc, wy=roadY(wz), wx=roadX(wz);
    const gapX=wx+rnd(-2.2,2.2);
    const conc=new THREE.MeshLambertMaterial({color:0x8a8d94});
    const mkWall=(x0,x1)=>{
      if(x1-x0<0.5) return;
      const w=bx(conc,x1-x0,4.2,1.2,(x0+x1)/2,wy+2.1,wz); grp.add(w);
      addSolid(rec,{kind:'wall',x:(x0+x1)/2,z:wz,halfX:(x1-x0)/2,halfZ:0.7,rad:1});
    };
    mkWall(wx-11,gapX-CFG.wallGapHalf);
    mkWall(gapX+CFG.wallGapHalf,wx+11);
    const st=new THREE.MeshLambertMaterial({color:0xffd82e});
    grp.add(bx(st,0.25,4.2,1.26,gapX-CFG.wallGapHalf+0.1,wy+2.1,wz,false));
    grp.add(bx(st,0.25,4.2,1.26,gapX+CFG.wallGapHalf-0.1,wy+2.1,wz,false));
    const arr=cone(st,0.55,1.0,gapX,wy+5.2,wz); arr.rotation.x=Math.PI; grp.add(arr);
    const wallRec={z:wz,passed:false};
    rec.walls.push(wallRec); world.walls.push(wallRec);
    addTarget(5,rnd(6,8),zc+9);
  }

  world.grp.add(grp);
  world.chunks.set(idx,rec);
}
function addSolid(rec,s){ rec.solids.push(s); world.solids.push(s); }
function groundYStatic(x,z,hrec){                     // porch height for props placed on porches (none for now)
  return 0;
}
function dropChunk(idx){
  const rec=world.chunks.get(idx); if(!rec) return;
  world.grp.remove(rec.grp);
  rec.grp.traverse(o=>{ if(o.geometry&&o.geometry!==G.box&&o.geometry!==G.cyl&&o.geometry!==G.sph&&o.geometry!==G.cone&&o.geometry!==G.prism) o.geometry.dispose(); });
  if(rec.lhz!==undefined) world.lhouses=world.lhouses.filter(z=>z!==rec.lhz);
  world.props=world.props.filter(p=>!rec.props.includes(p));
  world.solids=world.solids.filter(s=>!rec.solids.includes(s));
  world.peds=world.peds.filter(p=>!rec.peds.includes(p));
  world.dogs=world.dogs.filter(d=>!rec.dogs.includes(d));
  world.ramps=world.ramps.filter(r=>!rec.ramps.includes(r));
  world.pits=world.pits.filter(p=>!rec.pits.includes(p));
  world.specials=world.specials.filter(s=>!rec.specials.includes(s));
  world.tboards=world.tboards.filter(t=>!rec.tboards.includes(t));
  world.walls=world.walls.filter(w=>!rec.walls.includes(w));
  if(rec.house){ world.houses=world.houses.filter(h=>h!==rec.house); world.targetQueue=world.targetQueue.filter(h=>h!==rec.house); }
  world.chunks.delete(idx);
}
function ensureChunks(){
  const cur=Math.floor(-veh.z/CFG.CH);
  for(let i=cur-1;i<cur+8;i++) genChunk(i);   // one chunk behind too — the angled camera sees past the start line
  for(const idx of [...world.chunks.keys()]) if(idx<cur-2) dropChunk(idx);
}
function clearWorld(){
  for(const idx of [...world.chunks.keys()]) dropChunk(idx);
  world.packages.forEach(p=>scene.remove(p.grp)); world.packages.length=0;
  world.flying.length=0; world.targetQueue.length=0; world.curTarget=null; world.houses.length=0; world.lhouses.length=0; world.pits.length=0;
  world.specials.length=0; world.tboards.length=0; world.walls.length=0;
  houseCounter=0; rampCounter=0;
}

  const wr=cyl(M.tire,0.3,0.22); wr.rotation.z=Math.PI/2; wr.position.set(0,0.3,-0.8); g.add(wr);
  g.add(bx(M.metal,0.56,0.06,0.5,0,0.62,-0.95));                   // rear rack

  g.add(bx(new THREE.MeshLambertMaterial({color:0xff3020,emissive:0xff2010,emissiveIntensity:0.6}),0.3,0.1,0.05,0,0.6,-1.18,false));
  // driver: red hoodie + cap (icon kid)

  g.add(bx(hood,0.3,0.04,0.18,0,1.6,0.1));                         // cap brim
  const armR=bx(hood,0.12,0.4,0.12,0.28,1.15,0.1); armR.rotation.x=-0.9; g.add(armR);
  const armL=bx(hood,0.12,0.4,0.12,-0.28,1.15,0.1); armL.rotation.x=-0.9; g.add(armL);

  const rack=new THREE.Group(); rack.position.set(0,0.75,-0.95); g.add(rack);

function buildPackageMesh(tier){
  const t=CFG.tiers[tier], g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:t.c});
  const box=bx(mat,t.w,t.h,t.d,0,0,0); g.add(box);
  const tape=new THREE.MeshLambertMaterial({color:0xd8b878});
  switch(t.name){
    case 'ENVELOPE': g.add(bx(new THREE.MeshLambertMaterial({color:0xd84a3a}),t.w*0.3,t.h+0.012,t.d*0.3,t.w*0.25,0,t.d*0.25,false)); break;
    case 'SHOEBOX': g.add(bx(M.white,t.w+0.02,t.h*0.3,t.d+0.02,0,t.h*0.36,0,false)); break;
    case 'HOUSEPLANT': g.add(sph(M.leaf,0.3,0,t.h*0.7,0)); break;
    case 'ELECTRONICS': g.add(bx(new THREE.MeshLambertMaterial({color:0x34e1ff,emissive:0x1a7080,emissiveIntensity:0.3}),t.w+0.02,0.08,t.d+0.02,0,0,0,false)); break;
    case 'TELEVISION': g.add(bx(new THREE.MeshLambertMaterial({color:0x3a4a5a,emissive:0x28405a,emissiveIntensity:0.4}),t.w*0.85,t.h*0.75,0.02,0,0,t.d/2,false)); break;
    case 'BBQ GRILL': { const dome=sph(new THREE.MeshLambertMaterial({color:0x282830}),t.w*0.45,0,t.h*0.5,0); g.add(dome); break; }
    case 'REFRIGERATOR': g.add(bx(new THREE.MeshLambertMaterial({color:0xc0c8d0}),0.05,t.h*0.8,0.1,t.w/2,0,t.d*0.2,false)); break;
    case 'GRAND PIANO': { const lid=bx(new THREE.MeshLambertMaterial({color:0x202028}),t.w*0.9,0.05,t.d*0.8,0,t.h*0.55,0,false); lid.rotation.x=-0.5; g.add(lid);

const stackGrp=new THREE.Group(); stackGrp.position.set(0,0.85,-0.95); veh.grp.add(stackGrp);
const pickups=[];   // FIFO — [0] is the oldest, thrown first
function slotPos(i){
  const r=Math.floor((Math.sqrt(8*i+1)-1)/2), p=i-r*(r+1)/2;   // row r has r+1 slots, filled left→right
  return new THREE.Vector3((p-r/2)*0.5, 0.1+r*0.42, 0);
}
function stackCapacity(){ return CFG.stackRows*(CFG.stackRows+1)/2; }
function retargetStack(){
  for(let i=0;i<pickups.length;i++){
    const it=pickups[i];
    it.start=it.pos.clone(); it.target=slotPos(i); it.t=0;
  }
}
function pickupProp(pr){
  // scored like a smash, but the prop hops onto the scooter instead of flying away
  const pts=award(pr.pts,'destroy');

function pickupChar(c,isDog){

function clearStack(){
  for(const it of pickups) stackGrp.remove(it.mesh);
  pickups.length=0;
}
function updateStack(dt){
  const dur=CFG.stackTween;
  for(const it of pickups){
    if(it.t>=1) continue;
    it.t=Math.min(1,it.t+dt/dur);
    const k=it.t*it.t*(3-2*it.t);                              // smoothstep tween
    it.pos.lerpVectors(it.start,it.target,k);
    it.mesh.position.copy(it.pos);
  }
  if(veh.rackMesh) veh.rackMesh.visible=pickups.length===0&&S.boxes>0;   // stack (or an empty rack) replaces the boxed package
}
function setRackPackage(tier){

  veh.rackMesh.scale.setScalar(0.01);
  veh.rackMesh.position.y=t.h*s*0.5+0.05;
  r.add(veh.rackMesh);
  veh.rackScale=s;

const S={

function comboMultFor(n){ for(const [a,m] of CFG.comboSteps) if(n>=a) return m; return 1; }
function comboAction(){
  if(S.state!=='run') return;
  S.combo++; S.comboT=CFG.comboDur;
  const m=comboMultFor(S.combo);
  if(m>S.comboMult){ SFX.combo(m); $('comboBadge').classList.add('pump'); setTimeout(()=>$('comboBadge').classList.remove('pump'),140); }
  S.comboMult=m; S.bestCombo=Math.max(S.bestCombo,m);
}
function comboBreak(){ S.combo=0; S.comboMult=1; S.comboT=0; S.mailboxInCombo=false; S.decorInCombo=0; }
function award(pts,kind){  // kind: 'delivery'|'destroy'
  const total=Math.round(pts*S.comboMult);

  if(kind==='delivery') S.deliveryScore+=total; else S.destroyScore+=total;

}
function namedBonus(txt){

/* ---------- score popups ---------- */
const popPool=[];
function popGrab(){
  let el=popPool.find(p=>!p.busy);
  if(!el){ el={div:document.createElement('div'),busy:false,t:0,slot:0}; el.div.className='pop'; $('pops').appendChild(el.div); popPool.push(el); }
  el.busy=true; el.t=0;
  el.slot=popPool.reduce((n,p)=>n+(p.busy&&p!==el?1:0),0);   // stack simultaneous toasts
  return el;
}
function popup(wx,wy,wz,text,cls='',color=''){
  const el=popGrab();
  el.kind='plain'; el.max=1.2;
  el.div.textContent=text; el.div.className='pop '+cls;
  el.div.style.fontSize='';
  el.div.style.color=color||'#fff'; el.div.style.opacity=1;
}
/* Titan Guard damage-number logic: size scales with the points, digits drop in one at a time,
   then the whole number floats up and fades. */
function popupPts(pts,label,color){
  const el=popGrab();
  el.kind='dmg'; el.max=1.35;
  const num=(pts<0?'-':'+')+fmt(Math.abs(pts));
  el.sizeScale=clamp(1+(Math.abs(pts)-500)/(CFG.dmgFontMax-500)*1.6,1,2.6);
  el.fs=CFG.dmgBasePx*el.sizeScale;
  el.div.className='pop dmg';
  el.div.style.fontSize='';
  el.div.innerHTML=(label?'<div class="plbl">'+label+'</div>':'')+
    '<div class="pnum" style="font-size:'+el.fs.toFixed(1)+'px">'+
    num.split('').map(c=>'<span>'+c+'</span>').join('')+'</div>';
  el.lbl=el.div.querySelector('.plbl');
  el.spans=[...el.div.querySelectorAll('.pnum span')];
  el.div.style.color=color||'#fff'; el.div.style.opacity=1;
}
function clearPopups(){ for(const p of popPool){ p.busy=false; p.div.style.opacity=0; } }
const _v=new THREE.Vector3();
function updatePopups(dt){
  for(const p of popPool){
    if(!p.busy) continue;
    p.t+=dt;
    const max=p.max||1.2;
    if(p.t>max){ p.busy=false; p.div.style.opacity=0; continue; }
    // fixed toast spot: dead center, halfway between middle and top — always obvious when you score
    p.div.style.left='50%';
    const gFade=p.t>max-0.3?clamp((max-p.t)/0.3,0,1):1;
    if(p.kind==='dmg'){
      const n=p.spans.length, STAG=CFG.dmgStagger, REV=CFG.dmgReveal;
      const revealDone=(n-1)*STAG+REV;
      const floatUp=Math.max(0,p.t-revealDone)*46;
      p.div.style.top=(innerHeight*0.25 + p.slot*40 - floatUp)+'px';
      p.div.style.opacity=1;
      for(let i=0;i<n;i++){
        const tt=p.t-i*STAG;
        const a=tt<=0?0:tt<REV?tt/REV:1;
        const yoff=(tt>0&&tt<REV)?-(1-tt/REV)*p.fs*0.55:0;
        p.spans[i].style.opacity=(a*gFade).toFixed(2);
        p.spans[i].style.transform='translateY('+yoff.toFixed(1)+'px)';
      }
      if(p.lbl) p.lbl.style.opacity=(Math.min(1,p.t/REV)*gFade).toFixed(2);
    } else {
      p.div.style.top=(innerHeight*0.25 + p.slot*34 - p.t*26)+'px';
      p.div.style.opacity=p.t<0.9?1:gFade;
    }
  }
}

/* ==================================================== destruction */
function smash(pr,vel,src){    // pr = prop rec, vel = impacting velocity vector, src='veh'|'pkg'|'chain'|'runover'
  if(pr.dead) return;
  pr.dead=true;
  if(src!=='runover'){
    const pts=award(pr.pts,'destroy');
    popupPts(pts,null,'#ffe14d');
    comboAction();
    S.lastDestroyT=S.t;
    if(pr.kind==='mailbox') S.mailboxInCombo=true;
    if(pr.decor){ S.decorInCombo++; if(S.decorInCombo===3) namedBonus('CURB APPEAL'); }
  }
  (SFX[pr.sfx]||SFX.plastic)();
  if(pr.kind==='barrier') SFX.smash();
  // launch it
  const sp=Math.max(3,Math.hypot(vel.x,vel.z)*0.8);
  const dir=Math.hypot(vel.x,vel.z)>0.5?Math.atan2(vel.x,vel.z):rnd(0,Math.PI*2);
  const fl={grp:pr.grp,x:pr.x,y:pr.grp.position.y,z:pr.z,
    vx:Math.sin(dir)*sp+rnd(-1,1), vy:rnd(3,4.5)+sp*0.25, vz:Math.cos(dir)*sp+rnd(-1,1),
    ax:rnd(-7,7),ay:rnd(-7,7),az:rnd(-7,7), t:0, rad:pr.rad, chained:src==='chain'};
  world.flying.push(fl);
  world.props=world.props.filter(p=>p!==pr);
}
function updateFlying(dt){
  for(let i=world.flying.length-1;i>=0;i--){
    const f=world.flying[i];
    f.t+=dt;
    f.vy-=CFG.pkgGravity*dt;
    f.x+=f.vx*dt; f.y+=f.vy*dt; f.z+=f.vz*dt;
    const fgy=roadY(f.z)+0.15;
    if(f.y<fgy){ f.y=fgy; f.vy*=-0.35; f.vx*=0.6; f.vz*=0.6; f.ax*=0.5; f.az*=0.5; }
    f.grp.position.set(f.x,f.y,f.z);
    f.grp.rotation.x+=f.ax*dt; f.grp.rotation.y+=f.ay*dt; f.grp.rotation.z+=f.az*dt;
    // chain reaction: a fast flying prop can smash others
    const sp=Math.hypot(f.vx,f.vz);
    if(sp>4 && !f.chained){
      for(const pr of world.props){
        if(pr.dead) continue;
        if(Math.abs(pr.z-f.z)<pr.rad+f.rad && Math.abs(pr.x-f.x)<pr.rad+f.rad && f.y<pr.h+0.4){
          smash(pr,new THREE.Vector3(f.vx,0,f.vz),'chain'); f.vx*=0.5; f.vz*=0.5; break;
        }
      }
    }
    if(f.t>2.6){
      f.grp.parent&&f.grp.parent.remove(f.grp);
      world.flying.splice(i,1);
    }
  }
}
function tumbleChar(c,vel,pts,isDog){
  if(c.dead) return;
  c.dead=true; c.state='fly'; c.t=0;
  if(pts>0){
    const p=award(pts,'destroy');
    popupPts(p,null,isDog?'#ffb0d8':'#ffe14d');
    comboAction();
  }
  isDog?SFX.yelp():SFX.oof();
  S.lastDestroyT=S.t;
  const sp=Math.max(3.5,Math.hypot(vel.x,vel.z)*0.75);
  const dir=Math.hypot(vel.x,vel.z)>0.5?Math.atan2(vel.x,vel.z):rnd(0,Math.PI*2);
  c.vel.set(Math.sin(dir)*sp,rnd(4,5.5),Math.cos(dir)*sp);
  c.ang.set(rnd(-9,9),rnd(-6,6),rnd(-9,9));
}
function updateTumbled(c,dt){
  // shared ragdoll: fly -> sit (angry) -> get up
  if(c.state==='fly'){
    c.t+=dt; c.vel.y-=CFG.pkgGravity*dt;
    c.grp.position.x+=c.vel.x*dt; c.grp.position.y+=c.vel.y*dt; c.grp.position.z+=c.vel.z*dt;
    c.grp.rotation.x+=c.ang.x*dt; c.grp.rotation.y+=c.ang.y*dt; c.grp.rotation.z+=c.ang.z*dt;
    const cgy=roadY(c.grp.position.z);
    if(c.grp.position.y<cgy && c.vel.y<0){
      c.grp.position.y=cgy; c.state='down'; c.t=0;
      c.grp.rotation.set(-Math.PI/2*Math.sign(c.ang.x||1),c.grp.rotation.y,0);
    }
    return true;
  }
  if(c.state==='down'){
    c.t+=dt;
    if(c.t>2.2){ c.state='up'; c.t=0; }
    return true;
  }
  if(c.state==='up'){
    c.t+=dt;
    const k=clamp(c.t/0.5,0,1);
    c.grp.rotation.x=lerp(c.grp.rotation.x,0,k); c.grp.rotation.z=lerp(c.grp.rotation.z,0,k);
    if(k>=1){ c.dead=false; c.state=c.homeX!==undefined?'return':'walk'; c.grp.rotation.set(0,c.grp.rotation.y,0); }
    return true;
  }
  return false;
}

/* ==================================================== peds & dogs */
function updatePeds(dt){
  for(const p of world.peds){
    if(p.dead){ updateTumbled(p,dt); continue; }
    p.t-=dt;
    if(p.state==='walk'){
      if(p.t<=0 && Math.random()<0.3){ p.state='look'; p.t=0.7; continue; }   // telegraphed pause before u-turn
      if(p.t<=0) p.t=rnd(1.5,4);
      p.z+=p.dir*p.speed*dt;
      p.grp.position.z=p.z; p.grp.position.y=roadY(p.z);
      p.grp.rotation.y=p.dir>0?0:Math.PI;
      const sw=Math.sin(S.t*(p.jog?16:9))* (p.jog?0.7:0.45);
      p.grp.userData.legs[0].rotation.x=sw; p.grp.userData.legs[1].rotation.x=-sw;
    } else if(p.state==='look'){
      p.grp.userData.head.rotation.y=Math.sin(S.t*6)*0.6;   // glance around before turning
      if(p.t<=0){ p.dir*=-1; p.state='walk'; p.t=rnd(2,5); p.grp.userData.head.rotation.y=0; }
    }
  }
}
function updateDogs(dt){
  for(const d of world.dogs){
    if(d.dead){ updateTumbled(d,dt); d.x=d.grp.position.x; d.z=d.grp.position.z; continue; }
    const dx=veh.x-d.x, dz=veh.z-d.z, dd=Math.hypot(dx,dz);
    if(d.state==='idle'){
      d.grp.userData.tail.rotation.y=Math.sin(S.t*7)*0.5;
      if(dd<CFG.dogRange && dz<0 && !veh.dead){                     // vehicle approaching from +z side
        d.state='bark'; d.t=CFG.dogBark; SFX.bark();
        popup(d.x,1.4,d.z,'!','big','#ff6a5a');
      }
    } else if(d.state==='bark'){
      d.grp.scale.y=1-Math.sin(S.t*30)*0.08;                        // crouch shiver telegraph
      d.t-=dt;
      if(d.t<=0){ d.state='charge'; d.t=2.2; d.grp.scale.y=1; }
    } else if(d.state==='charge'){
      d.t-=dt;
      const tx=veh.x, tz=veh.z-veh.speed*0.25;
      const a=Math.atan2(tx-d.x,tz-d.z);
      d.x+=Math.sin(a)*CFG.dogSpeed*dt; d.z+=Math.cos(a)*CFG.dogSpeed*dt;
      d.grp.rotation.y=a;
      const sw=Math.sin(S.t*22)*0.9; d.grp.userData.legs.forEach((l,i)=>l.rotation.x=i%2?sw:-sw);
      if(d.t<=0||dd>26) d.state='return';
    } else if(d.state==='return'){
      const a=Math.atan2(d.homeX-d.x,d.homeZ-d.z);
      d.x+=Math.sin(a)*3*dt; d.z+=Math.cos(a)*3*dt;
      d.grp.rotation.y=a;
      const sw=Math.sin(S.t*12)*0.6; d.grp.userData.legs.forEach((l,i)=>l.rotation.x=i%2?sw:-sw);
      if(Math.hypot(d.homeX-d.x,d.homeZ-d.z)<0.5) d.state='idle';
    }
    d.grp.position.set(d.x,d.dead?d.grp.position.y:roadY(d.z),d.z);
  }
}
function updateSprinklers(dt){
  for(const pr of world.props){
    if(pr.kind!=='sprinkler'||pr.dead||!pr.sprk) continue;
    pr.sprk.t=(pr.sprk.t+dt)%4;
    const arm=pr.grp.userData.arm;
    if(arm) arm.rotation.y+=dt*(pr.sprk.t<2?9:2);                  // spins up before it sprays
    if(pr.sprk.t>=2 && !pr.sprk.on){ pr.sprk.on=true; if(Math.abs(pr.z-veh.z)<25) SFX.spray(); }
    if(pr.sprk.t<2) pr.sprk.on=false;
  }
}

/* ==================================================== targets & marker */
function updateTargets(){
  // drop finished targets off the front of the queue
  while(world.targetQueue.length){
    const t=world.targetQueue[0];
    if(t.scored||t.missed){ world.targetQueue.shift(); continue; }
    if(veh.z < t.hz-10){                                   // drove past without scoring
      const inFlight=world.packages.some(p=>p.target===t&&!p.done);
      if(!inFlight){
        t.missed=true; t.grp.userData.mat.material=M.mat;
        popup(CFG.houseX-1.2,1.2,t.hz,'MISSED','', '#c8c8c8');
        world.targetQueue.shift(); continue;
      }
    }
    break;
  }
  const nt=world.targetQueue[0]||null;
  if(nt!==world.curTarget){
    if(world.curTarget&&!world.curTarget.scored) world.curTarget.grp.userData.mat.material=M.mat;
    world.curTarget=nt;
    if(nt) nt.grp.userData.mat.material=M.matGlow;
  }
  M.matGlow.emissiveIntensity=0.45+Math.sin(S.t*6)*0.3;    // doormat pulse
}
function updateMarker(){
  const m=$('marker'), t=world.curTarget;
  if(!t||S.state!=='run'){ m.style.opacity=0; return; }
  _v.set(t.zones.wall.x-1.2,t.elev+3.1,t.hz).project(camera);
  if(_v.z>1){ m.style.opacity=0; return; }
  let x=(_v.x*0.5+0.5)*innerWidth, y=(-_v.y*0.5+0.5)*innerHeight;
  y=Math.max(y,90);                                        // clamp when the house is still far ahead
  m.style.left=x+'px'; m.style.top=y+'px'; m.style.opacity=1;
  $('markerVal').textContent='UP TO '+fmt(CFG.zonePts.door*(veh.tier+1));
}

/* ==================================================== packages */
/* a thrown thing found its receptor: award, celebrate, and park it there for keeps */
function connectPkg(p,aff,x,y,z,parent){
  const pts=award(aff[1],'destroy');
  popupPts(pts,aff[0],'#8affc4');
  comboAction(); SFX.connect(); S.lastDestroyT=S.t;
  scene.remove(p.grp);
  p.grp.rotation.set(0,0,0); p.grp.position.set(x,y+roadY(z),z);
  (parent&&parent.parent?parent:scene).add(p.grp);         // chunk groups sit at the origin, so world coords carry over
  const child=p.grp.children[0];
  if(child&&child.userData&&child.userData.legs&&p.kind==='ped')
    child.userData.legs.forEach(l=>l.rotation.x=-1.5);     // people SIT where they land
  const idx=world.packages.indexOf(p);
  if(idx>=0) world.packages.splice(idx,1);
}
const CONNECT_Y={bench:0.75,doghouse:0.55,mailbox:1.3,birdbath:0.8,hedge:0.95,can:0.95,bin:0.9,
  porch:0.75,pit:0.12,barrier:1.0,ped:0.3,dog:0.3};
function groundYPkg(x,z){
  for(const h of world.houses){
    const p=h.zones.porchRect;
    if(x>=p.x0&&x<=p.x1&&z>=p.z0&&z<=p.z1) return h.elev+p.h;
  }
  return roadY(z);
}
function toss(){
  if(S.state!=='run'||veh.cd>0||veh.dead) return false;
  if(!pickups.length && S.boxes<=0){
    // out of boxes and nothing on the rack — go smash something
    popup(0,0,0,'OUT OF PACKAGES — GRAB STUFF!','','#ffb0a0');
    SFX.bump();
    veh.cd=0.35;                                           // brief lockout so the toast doesn't spam
    return false;
  }
  veh.cd=CFG.cooldown;
  const t=CFG.tiers[veh.tier];
  let grp,kind='package',itH=0.4,specialName=null;
  if(pickups.length){
    // throw the OLDEST pickup instead of a boxed package; the tower re-sorts with tweens
    const it=pickups.shift();
    stackGrp.remove(it.mesh);
    grp=new THREE.Group();
    it.mesh.position.set(0,-it.h*it.scl*0.5,0); it.mesh.rotation.set(0,0,0);
    grp.add(it.mesh);
    kind=it.kind; itH=it.h*it.scl; specialName=it.specialName||null;
    retargetStack();
  } else {
    grp=buildPackageMesh(veh.tier);
    S.boxes--;
  }
  // forward & right in world space (steering direction bends the throw)
  const fl=Math.hypot(veh.vx,veh.speed)||1;
  const fx=veh.vx/fl, fz=-veh.speed/fl;
  const rx=-fz, rz=fx;                                     // right = forward rotated -90° about Y
  // throw direction: right, rotated CFG.throwYawDeg toward forward ("north")
  const ty=CFG.throwYawDeg*Math.PI/180, tc=Math.cos(ty), ts=Math.sin(ty);
  const dx=rx*tc+fx*ts, dz=rz*tc+fz*ts;
  // launch from the RIGHT HAND, not the rack
  const px=veh.x+rx*0.35+fx*0.3, py=veh.y+1.15, pz=veh.z+rz*0.35+fz*0.3;
  grp.position.set(px,py,pz);
  scene.add(grp);
  const pkg={grp,x:px,y:py,z:pz,
    vx:veh.vx*CFG.inherit + dx*t.lat + fx*CFG.throwFwd,
    vy:t.up,
    vz:-veh.speed*CFG.inherit + dz*t.lat + fz*CFG.throwFwd,
    ax:rnd(-5,5),ay:rnd(-3,3),az:rnd(-5,5),
    tier:veh.tier,kind,itH,specialName,target:world.curTarget,thrownAir:veh.air,hits:0,settleT:0,done:false,t:0};
  world.packages.push(pkg);
  // rack empties + arm swing
  if(veh.rackMesh) veh.rackMesh.scale.setScalar(0.01);
  veh.grp.userData.armR.rotation.x=0.5;
  SFX.throw();
  S.shake=Math.min(S.shake+0.06+veh.tier*0.015,0.5);
  return true;
}
function scoreDelivery(pkg,h,zone){
  if(!h||h.scored) return;
  const base=CFG.zonePts[zone];
  const pts=award(base*(pkg.tier+1),'delivery');
  comboAction();
  h.scored=true; h.grp.userData.mat.material=M.mat;
  S.deliveries++; S.biggestTier=Math.max(S.biggestTier,pkg.tier);
  const names={property:'ON THE LOT',walkway:'WALKWAY',porch:'PORCH',door:'DOOR!'};
  popupPts(pts,names[zone], zone==='door'?'#3affa4':zone==='porch'?'#8affc4':'#ffe14d');
  if(zone==='door'){
    S.perfects++; SFX.perfect(); slowMo();
    if(S.t-S.lastDestroyT<2) namedBonus('EXPRESS COMBO');
  } else SFX.chime(['property','walkway','porch'].indexOf(zone)+1);
  if(pkg.thrownAir) namedBonus('AIR MAIL');
  if(S.mailboxInCombo){ namedBonus('SPECIAL DELIVERY'); S.mailboxInCombo=false; }
  if(base>=CFG.tierUpAt && veh.tier<CFG.tiers.length-1){
    veh.tier++;
    popup(0,0,0,'📦 '+CFG.tiers[veh.tier].name+'!','big','#ffc233');
  }
}
function resolveDelivery(pkg){
  // EVERY house's door/porch pays; walkway/lawn consolation only on the marked target
  const x=pkg.x,z=pkg.z;
  for(const h of world.houses){
    if(h.scored||Math.abs(z-h.hz)>8) continue;
    const zz=h.zones, inR=r=>x>=r.x0&&x<=r.x1&&z>=r.z0&&z<=r.z1;
    if(inR(zz.doormat)||inR(zz.doorstep)) return scoreDelivery(pkg,h,'door');
    if(inR(zz.porch)) return scoreDelivery(pkg,h,'porch');
    if(h===world.curTarget||h===pkg.target){
      if(inR(zz.walkway)) return scoreDelivery(pkg,h,'walkway');
      if(inR(zz.property)) return scoreDelivery(pkg,h,'property');
    }
  }
  popup(x,pkg.y+1,z,'✗','','#c8c8c8');
}
function updatePackages(dt){
  for(let i=world.packages.length-1;i>=0;i--){
    const p=world.packages[i], t=CFG.tiers[p.tier];
    p.t+=dt;
    if(p.done){ if(p.t>3.5){ scene.remove(p.grp); world.packages.splice(i,1);} continue; }
    p.vy-=CFG.pkgGravity*dt;
    const dr=1-0.1*dt; p.vx*=dr; p.vz*=dr;
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt;
    const gy=groundYPkg(p.x,p.z), rest=gy+t.h*0.5;
    const sp=Math.hypot(p.vx,p.vz);
    // door prism: a volume in FRONT of the target's door — any part of a package inside it scores.
    // Bank shots count too: touching down anywhere on the doorstep/doormat floor zone = door.
    if(p.kind==='package') for(const h of world.houses){
      if(h.scored||Math.abs(p.z-h.hz)>8) continue;
      const w=h.zones.wall, el=h.elev, ds=h.zones.doorstep;
      if(p.x+t.r>w.x-1.2 && p.x-t.r<w.x+0.3 && Math.abs(p.z-h.hz)<1.35+t.r && p.y-t.r<el+2.6 && p.y+t.r>el){
        scoreDelivery(p,h,'door'); break;
      } else if(p.x+t.r>ds.x0 && p.x-t.r<ds.x1 && p.z+t.r>ds.z0 && p.z-t.r<ds.z1 && p.y-t.r<el+1.05){
        scoreDelivery(p,h,'door'); break;
      }
    }
    // picket fences: low throws rattle off — get the package up and over
    for(const h of world.houses){
      const f=h.fence;
      if(f && p.vx>0 && p.x+t.r>f.x && p.x-t.r<f.x+0.35 && p.z>f.z0 && p.z<f.z1 && p.y-t.r<h.elev+f.h){
        p.x=f.x-t.r; p.vx=-Math.abs(p.vx)*0.3; SFX.wood();
        popup(p.x,p.y+0.5,p.z,'FENCED','','#e8dcc8');
      }
    }
    // house wall — windows break (costly!), the rest BONK
    for(const h of world.houses){
      const w=h.zones.wall;
      if(Math.abs(p.z-h.hz)<5.4 && p.x>w.x-t.r && p.y<h.elev+w.h && p.vx>0){
        let win=null;
        for(const wn of h.wins) if(!wn.broken && Math.abs(p.z-wn.z)<0.8 && p.y>h.elev+1.3 && p.y<h.elev+2.5) win=wn;
        if(win){
          win.broken=true; win.mesh.material=M.winBroken;
          S.pot=Math.max(0,S.pot-CFG.windowPenalty);
          popupPts(-CFG.windowPenalty,'WINDOW!','#ff6a5a');
          SFX.glass(); S.shake=Math.min(S.shake+0.25,0.7);
        } else if(p.kind==='package' && !h.scored && Math.abs(p.z-h.hz)<1.35+t.r && p.y<h.elev+2.7){
          scoreDelivery(p,h,'door');                       // wall contact at the door frame = door, never BONK
        } else {
          SFX.card();
          popup(p.x,p.y+0.5,p.z,'BONK','','#ffd0a8');
        }
        p.x=w.x-t.r; p.vx=-Math.abs(p.vx)*0.35;
      }
    }
    for(const lz of world.lhouses){                        // left houses: wall bounce only (no delivery zones)
      const wx=-CFG.houseX+roadX(lz);
      if(Math.abs(p.z-lz)<5.4 && p.x<wx+t.r && p.y<roadY(lz)+3.4 && p.vx<0){
        p.x=wx+t.r; p.vx=Math.abs(p.vx)*0.35; SFX.card();
        popup(p.x,p.y+0.5,p.z,'BONK','','#ffd0a8');
      }
    }
    // bounce
    if(p.y<rest && p.vy<0){
      p.y=rest;
      if(Math.abs(p.vy)>1.8){
        p.vy=-p.vy*t.bounce;
        p.vx=p.vx*0.55+rnd(-1,1)*t.chaos*sp; p.vz=p.vz*0.55+rnd(-1,1)*t.chaos*sp;
        p.ax=rnd(-6,6); p.az=rnd(-6,6);
        (p.tier>6?SFX.smash:SFX.card)();
        S.shake=Math.min(S.shake+p.tier*0.01,0.4);
      } else { p.vy=0; }
    }
    const grounded=p.y<=rest+0.01;
    // stunt bullseyes: anything thrown can ring them
    for(const tb of world.tboards){
      if(tb.dead) continue;
      if(Math.abs(tb.z-p.z)<0.7+t.r && Math.abs(tb.x-p.x)<0.9+t.r && Math.abs(p.y-tb.y)<0.9+t.r){
        tb.dead=true;
        const pts=award(CFG.targetPts*tb.mult,'destroy');
        popupPts(pts,'BULLSEYE ×'+tb.mult,'#ff8af0');
        comboAction(); SFX.connect(); slowMo(); S.lastDestroyT=S.t;
        world.flying.push({grp:tb.grp,x:tb.x,y:tb.grp.position.y,z:tb.z,vx:p.vx*0.4,vy:4.5,vz:p.vz*0.4,
          ax:rnd(-6,6),ay:rnd(-6,6),az:rnd(-6,6),t:0,rad:0.8,chained:true});
        world.tboards=world.tboards.filter(x=>x!==tb);
        p.vx*=0.6; p.vz*=0.6; p.hits++;
        break;
      }
    }
    // hit things — affinity connections first, smashes otherwise (legends connect with EVERYTHING)
    if(sp>2 || Math.abs(p.vy)>2){
      const AFF=CFG.affinity[p.kind]||{};
      const affOf=k=>p.kind==='special'?[(p.specialName||'LEGEND')+'!',CFG.specialConnectPts]:AFF[k];
      let connected=false;
      for(const pr of world.props){
        if(pr.dead) continue;
        if(Math.abs(pr.z-p.z)<pr.rad+t.r && Math.abs(pr.x-p.x)<pr.rad+t.r && p.y-t.r<pr.h){
          const aff=affOf(pr.kind);
          if(aff){ connectPkg(p,aff,pr.x,CONNECT_Y[pr.kind]||pr.h+0.2,pr.z,pr.grp.parent); connected=true; break; }
          smash(pr,new THREE.Vector3(p.vx*t.impact,0,p.vz*t.impact),'pkg');
          p.vx*=0.7; p.vz*=0.7; p.hits++;
          if(p.hits===3){ slowMo(); popup(p.x,p.y+1,p.z,'MULTI-HIT!','big','#ff8af0'); namedBonus('CHAOS COURIER'); }
          break;
        }
      }
      if(connected) continue;
      for(const pit of world.pits){
        if(pit.filled) continue;
        if(Math.abs(pit.z-p.z)<pit.d/2 && Math.abs(pit.x-p.x)<pit.w/2 && p.y<roadY(pit.z)+0.8){
          const aff=affOf('pit');
          if(aff){ pit.filled=true; pit.tape.visible=false; connectPkg(p,aff,pit.x,CONNECT_Y.pit,pit.z,pit.grp.parent); connected=true; }
          break;
        }
      }
      if(connected) continue;
      for(const s of world.solids){
        if(s.kind!=='car'&&s.kind!=='truck') continue;
        const aff=affOf('car');
        if(!aff) break;
        const hz=s.halfZ||s.rad;
        if(Math.abs(s.z-p.z)<hz && Math.abs(s.x-p.x)<s.rad+t.r && p.y<(s.kind==='truck'?2.6:1.5)){
          connectPkg(p,aff,s.x,s.kind==='truck'?2.65:1.5,s.z,s.grp.parent); connected=true; break;
        }
      }
      if(connected) continue;
      for(const c of world.peds){
        if(c.dead) continue;
        if(Math.hypot(c.grp.position.x-p.x,c.grp.position.z-p.z)<c.rad+t.r && p.y<c.h+t.r){
          const aff=affOf('ped');
          tumbleChar(c,new THREE.Vector3(p.vx,0,p.vz),aff?0:CFG.pedPts,false);
          if(aff){ connectPkg(p,aff,c.grp.position.x+0.4,CONNECT_Y.ped,c.grp.position.z,c.grp.parent); connected=true; break; }
          p.vx*=0.6; p.vz*=0.6; p.hits++;
        }
      }
      if(connected) continue;
      for(const c of world.dogs){
        if(c.dead) continue;
        if(Math.hypot(c.x-p.x,c.z-p.z)<c.rad+t.r && p.y<c.h+t.r){
          const aff=affOf('dog');
          tumbleChar(c,new THREE.Vector3(p.vx,0,p.vz),aff?0:CFG.dogPts,true);
          if(aff){ connectPkg(p,aff,c.x+0.4,CONNECT_Y.dog,c.z,c.grp.parent); connected=true; break; }
          p.vx*=0.6; p.vz*=0.6; p.hits++;
        }
      }
      if(connected) continue;
    }
    p.grp.position.set(p.x,p.y,p.z);
    p.grp.rotation.x+=p.ax*dt; p.grp.rotation.y+=p.ay*dt; p.grp.rotation.z+=p.az*dt;
    // settle -> score lock
    if(grounded && sp<0.7 && Math.abs(p.vy)<0.5){
      p.settleT+=dt;
      if(p.settleT>0.35){
        p.done=true; p.t=0;
        p.grp.rotation.x=Math.round(p.grp.rotation.x/(Math.PI/2))*(Math.PI/2);
        p.grp.rotation.z=Math.round(p.grp.rotation.z/(Math.PI/2))*(Math.PI/2);
        if(p.kind==='package'){ resolveDelivery(p); }
        else {
          // settling on any porch can be a connection too (people get SENT HOME, gnomes find HOMES…)
          const aff=p.kind==='special'?[(p.specialName||'LEGEND')+'!',CFG.specialConnectPts]:(CFG.affinity[p.kind]&&CFG.affinity[p.kind].porch);
          if(aff) for(const h of world.houses){
            const r=h.zones.porchRect;
            if(p.x>=r.x0&&p.x<=r.x1&&p.z>=r.z0&&p.z<=r.z1){ connectPkg(p,aff,p.x,CONNECT_Y.porch,p.z,h.grp.parent); break; }
          }
        }
      }
    } else p.settleT=0;
    if(p.y<-5||p.t>8){ p.done=true; p.t=3; }               // safety net
  }
}

/* ==================================================== vehicle physics */
function rampGroundY(x,z){
  const base=roadY(z);
  for(const r of world.ramps){
    if(Math.abs(x-r.x)>r.wid/2) continue;
    const p=(r.z0-z)/r.len;                                 // 0 at the lip, 1 at the top
    if(p>=0&&p<=1) return {y:(r.elev||0)+r.h*p,slope:r.slope,p};
  }
  return {y:base,slope:0,p:-1};
}
function doCrash(style){
  if(veh.dead) return;
  veh.dead=true; veh.crashStyle=style||'tumble';
  SFX.crash(); slowMo(); S.shake=1.2;
  veh.crashT=0;
  setTimeout(()=>endRun(false),1300);
}
function updateVehicle(dt){
  if(veh.dead){                                             // crash tumble (or sink, for pits)
    veh.crashT+=dt;
    if(veh.crashStyle==='sink'){
      veh.grp.rotation.x+=dt*2.5;
      veh.y=Math.max(roadY(veh.z)-1.4,veh.y-3.2*dt);
      veh.speed=Math.max(0,veh.speed-20*dt);
    } else {
      veh.grp.rotation.z+=dt*7; veh.grp.rotation.x+=dt*3;
      veh.y=Math.max(0.4,veh.y+ (2.5-veh.crashT*6)*dt );
      veh.speed=Math.max(0,veh.speed-8*dt);
    }
    veh.z-=veh.speed*dt;
    veh.grp.position.set(veh.x,veh.y,veh.z);
    return;
  }
  // speed: prescribed target, knocked down by impacts, recovers
  const target=Math.min(CFG.baseSpeed+CFG.speedGrowth*S.runT+CFG.wallBoost*S.boosts,CFG.maxSpeed);
  veh.speed=Math.min(target,veh.speed+(S.boosts>0?5:2.6)*dt);
  // threading a stunt wall = permanent speed boost
  for(const w of world.walls){
    if(!w.passed && veh.z<w.z-1.5){
      w.passed=true; S.boosts++;
      popup(0,0,0,'⚡ FULL THROTTLE ⚡','big','#ffd82e');
      SFX.cash(); slowMo(); S.shake=Math.min(S.shake+0.3,0.8);
    }
  }
  S.runT+=dt; S.dist+=veh.speed*dt;
  // wheel: player input or spring back
  if(input.wheelActive||input.forceWheel!==null){
    veh.wheel=input.forceWheel!==null?input.forceWheel:input.wheelVal;
  } else {
    veh.wheel=lerp(veh.wheel,0,Math.min(1,CFG.steerReturn*dt));
  }
  // lateral velocity chases wheel
  const accel=CFG.steerAccel*(veh.air?CFG.airSteer:1);
  veh.vx=lerp(veh.vx,veh.wheel*CFG.steerMax,Math.min(1,accel*dt));
  veh.x+=veh.vx*dt;
  const roff=roadX(veh.z);                                  // lane bounds ride the curve — straight lines drift off-lane
  if(veh.x<roff+CFG.laneMin){ veh.x=roff+CFG.laneMin; veh.vx=Math.abs(veh.vx)*0.3; }
  if(veh.x>roff+CFG.laneMax){ veh.x=roff+CFG.laneMax; veh.vx=-Math.abs(veh.vx)*0.3; }
  veh.z-=veh.speed*dt;
  // ramps & gravity
  const g=rampGroundY(veh.x,veh.z);
  if(veh.air){
    veh.vy-=CFG.gravity*dt; veh.y+=veh.vy*dt; veh.airT+=dt;
    S.pot+=CFG.airPts*dt; S.destroyScore+=CFG.airPts*dt;    // style points: airtime pays by the second
    if(veh.y<=g.y){
      veh.y=g.y; veh.air=false; veh.pump=false;
      if(veh.vy<-4){ SFX.land(); S.shake=Math.min(S.shake+0.35,0.8); }
      // (long-air landing slow-mo removed — it broke the flow; revisit later)
      const airPts=Math.round(veh.airT*CFG.airPts);
      if(airPts>=25) popupPts(airPts,'AIR TIME','#8ae8ff');  // already accrued mid-air; this is the receipt
      veh.vy=0;
    }
  } else {
    if(g.p>=CFG.rampHopAt){                                 // the hop: launch just before the ramp end
      veh.air=true; veh.airT=0; veh.pump=true;
      veh.vy=veh.speed*g.slope*CFG.rampBoost*CFG.rampHopBoost;
      SFX.ramp(); S.shake=Math.min(S.shake+0.15,0.6);
    } else if(veh.prevGy-g.y>0.3){                          // fallback: rolled off a ramp side/top
      veh.air=true; veh.airT=0; veh.pump=true;
      veh.vy=veh.speed*veh.prevSlope*CFG.rampBoost;
      SFX.ramp(); S.shake=Math.min(S.shake+0.15,0.6);
    } else veh.y=g.y;
  }
  veh.prevGy=g.y; veh.prevSlope=g.slope||veh.prevSlope;
  // collisions (only when near the ground)
  if(veh.y<1.2){
    for(const pr of world.props){
      if(pr.dead) continue;
      if(Math.abs(pr.z-veh.z)<pr.rad+0.8 && Math.abs(pr.x-veh.x)<pr.rad+0.6){
        if(pickups.length<stackCapacity()){
          pickupProp(pr);                                   // hops onto the rack, becomes throwable ammo
        } else {
          // stack is full — this one gets run over and COSTS points
          S.pot=Math.max(0,S.pot-pr.pts);
          popupPts(-pr.pts,'RUN OVER','#ff6a5a');
          SFX.bump();
          smash(pr,new THREE.Vector3(veh.vx*0.5,0,-veh.speed),'runover'); // flies away but scores nothing extra
        }
        veh.speed*=pr.kind==='barrier'?0.5:pr.kind==='hedge'||pr.kind==='fence'?0.75:0.93;
        S.shake=Math.min(S.shake+0.2,0.7);
      }
    }
    for(const c of world.peds){
      if(c.dead) continue;
      if(Math.hypot(c.grp.position.x-veh.x,c.grp.position.z-veh.z)<c.rad+0.7){
        pickupChar(c,false);                                // people get scooped onto the stack too
        veh.speed*=0.9; S.shake=Math.min(S.shake+0.2,0.7);
      }
    }
    for(const c of world.dogs){
      if(c.dead) continue;
      if(Math.hypot(c.x-veh.x,c.z-veh.z)<c.rad+0.7){
        pickupChar(c,true);
        veh.speed*=0.9; S.shake=Math.min(S.shake+0.2,0.7);
      }
    }
    for(const sp of world.specials){
      if(sp.dead) continue;
      if(Math.hypot(sp.x-veh.x,sp.z-veh.z)<sp.rad+0.8) pickupSpecial(sp);
    }
    // ONLY cars/trucks, walls, and open pits can crash you — tight hitboxes, no phantom clips
    if(!veh.air) for(const s of world.solids){
      const hz=(s.halfZ||s.rad)+0.45, hx=(s.halfX||s.rad)+0.35;
      if(Math.abs(s.z-veh.z)<hz && Math.abs(s.x-veh.x)<hx){
        if(s.kind==='pit'){ if(s.pit.filled) continue; doCrash('sink'); break; }
        if(s.kind==='wall'){ doCrash(); break; }
        const canCrash=s.kind==='car'||s.kind==='truck';
        if(canCrash && veh.speed>CFG.crashSpeed){ doCrash(); break; }
        // minor: shove out sideways, bleed speed, break combo
        veh.x=s.x+(veh.x>s.x?1:-1)*((s.halfX||s.rad)+0.6); veh.vx=0;
        veh.speed*=CFG.minorSlow; S.shake=Math.min(S.shake+0.3,0.8);
        SFX.bump(); comboBreak();
      }
    }
  }
  // immobilized failsafe
  if(veh.speed<1.6){ veh.stuckT+=dt; if(veh.stuckT>CFG.stuckTime) doCrash(); }
  else veh.stuckT=0;
  // throw cooldown + rack repop
  if(veh.cd>0){
    veh.cd-=dt;
    if(veh.cd<0.35&&veh.rackMesh&&veh.rackMesh.parent!==veh.grp.userData.rack) setRackPackage(veh.tier);
    if(veh.rackMesh){
      const k=clamp((0.35-veh.cd)/0.35,0,1);
      if(veh.cd<0.35) veh.rackMesh.scale.setScalar(Math.max(0.01,veh.rackScale*k));
    }
    if(veh.cd<=0){ veh.cd=0; SFX.ready(); if(veh.rackMesh) veh.rackMesh.scale.setScalar(veh.rackScale); }
  }
  if(veh.pump&&veh.air) veh.grp.userData.armR.rotation.x=-2.6+Math.sin(S.t*20)*0.35;   // fist pump!
  else veh.grp.userData.armR.rotation.x=lerp(veh.grp.userData.armR.rotation.x,-0.9,Math.min(1,8*dt));
  // pose
  veh.grp.position.set(veh.x,veh.y,veh.z);
  veh.grp.rotation.y=Math.PI-Math.atan2(veh.vx,veh.speed+0.01)*0.9;  // nose leads INTO the turn
  veh.grp.rotation.z=clamp(veh.vx*0.055,-0.35,0.35);
  veh.grp.rotation.x=veh.air?clamp(-veh.vy*0.03,-0.25,0.3):0;
  const spin=veh.speed*dt/0.3;
  veh.grp.userData.wf.rotation.x-=spin; veh.grp.userData.wr.rotation.x-=spin;
  veh.grp.userData.wf.rotation.y=-veh.wheel*0.6;                     // front wheel visibly steers
}

const input={wheelActive:false,wheelVal:0,wheelId:null,wheelX0:0,forceWheel:null};
const wz=$('wheelZone');
let lastDownT=-9e9,lastDownX=0,lastDownY=0;
wz.addEventListener('pointerdown',e=>{
  e.preventDefault(); auInit();
  // double-tap anywhere = throw (one-handed play)
  const now=performance.now();
  if(now-lastDownT<300 && Math.hypot(e.clientX-lastDownX,e.clientY-lastDownY)<48){
    if(S.state==='run') toss();
  }
  lastDownT=now; lastDownX=e.clientX; lastDownY=e.clientY;
  input.wheelActive=true; input.wheelId=e.pointerId;
  input.wheelX0=e.clientX-veh.wheel*70;                    // regrab continues from the current wheel angle
  input.wheelVal=veh.wheel;
  try{ wz.setPointerCapture(e.pointerId); }catch(_){}
});
// track move/up on window so the drag never drops, even if capture fails or the finger leaves the zone
addEventListener('pointermove',e=>{
  if(!input.wheelActive||e.pointerId!==input.wheelId) return;
  input.wheelVal=clamp((e.clientX-input.wheelX0)/70,-1,1);
});
const wheelEnd=e=>{ if(input.wheelActive&&e.pointerId===input.wheelId){ input.wheelActive=false; input.wheelVal=0; } };
addEventListener('pointerup',wheelEnd); addEventListener('pointercancel',wheelEnd);
$('throwBtn').addEventListener('pointerdown',e=>{ e.preventDefault(); auInit(); toss(); });
// keyboard (desktop testing)
const keys={};
addEventListener('keydown',e=>{
  auInit();
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.l=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.r=true;

}
