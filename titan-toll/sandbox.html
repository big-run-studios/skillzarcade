<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Titan Guard — Animation Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --disp:'Orbitron',sans-serif; --cyan:#34e1ff; --gold:#ffc233; --red:#ff5a6e; --violet:#b06bff; --green:#39ffa0; --panel:rgba(10,16,36,.88); }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{height:100%;overflow:hidden;background:#8fbfe8;font-family:var(--disp);color:#eaf2ff;touch-action:none;}
  #c{position:fixed;inset:0;display:block;}
  .panel{position:fixed;background:var(--panel);border:1.5px solid rgba(95,224,255,.25);border-radius:14px;backdrop-filter:blur(8px);box-shadow:0 8px 24px rgba(0,0,0,.45);}
  .hdr{font-weight:900;font-size:11px;letter-spacing:2px;color:#9fb2d8;padding:2px 4px 6px;}
  /* top bar */
  #top{top:10px;left:10px;right:10px;display:flex;gap:10px;align-items:center;padding:8px 10px;z-index:6;}
  #top a.back{text-decoration:none;color:#cfe6ff;font-weight:800;font-size:18px;padding:2px 10px;border:1.5px solid rgba(95,224,255,.35);border-radius:10px;}
  #top select{flex:1;font:700 13px var(--disp);background:#141a34;color:#eaf2ff;border:1.5px solid #2b3a7a;border-radius:9px;padding:8px 10px;letter-spacing:.5px;}
  #top .cnt{font-weight:700;font-size:11px;color:#9fb2d8;letter-spacing:1px;white-space:nowrap;}
  /* current clip name */
  #now{top:62px;left:50%;transform:translateX(-50%);padding:6px 16px;text-align:center;z-index:6;pointer-events:none;border-color:rgba(255,194,51,.4);}
  #now .nm{font-weight:900;font-size:clamp(14px,4vw,20px);letter-spacing:1px;color:var(--gold);text-shadow:0 0 14px rgba(255,194,51,.55);}
  #now .meta{font-weight:700;font-size:10px;color:#9fb2d8;letter-spacing:1px;margin-top:1px;}
  /* required slots (left) */
  #slots{top:112px;left:10px;bottom:92px;width:min(44vw,250px);overflow-y:auto;padding:8px;z-index:6;display:flex;flex-direction:column;gap:5px;}
  .slot{border:1.5px dashed #3a4a7a;border-radius:9px;padding:6px 8px;background:rgba(20,26,52,.6);}
  .slot .lbl{font-weight:800;font-size:11px;letter-spacing:.5px;color:#cfe6ff;}
  .slot .val{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-top:3px;font-weight:700;font-size:12px;color:var(--green);cursor:pointer;min-height:16px;}
  .slot .val.empty{color:#5c709e;font-style:italic;font-weight:600;}
  .slot .x{color:#ff6a7a;font-weight:900;font-size:14px;padding:0 4px;cursor:pointer;}
  .slot.over{border-style:solid;border-color:var(--gold);background:rgba(255,194,51,.16);}
  #export{margin-top:2px;font:800 12px var(--disp);color:#052;background:var(--green);border:none;border-radius:9px;padding:9px;cursor:pointer;letter-spacing:1px;}
  /* available clips (right) */
  #list{top:112px;right:10px;bottom:92px;width:min(44vw,250px);overflow-y:auto;padding:8px;z-index:6;display:flex;flex-direction:column;gap:5px;}
  #list .clip{display:flex;justify-content:space-between;gap:8px;align-items:center;cursor:grab;touch-action:none;
    font-weight:700;font-size:12px;letter-spacing:.3px;color:#cfe6ff;background:rgba(20,26,52,.7);border:1.5px solid transparent;border-radius:9px;padding:8px 9px;}
  #list .clip .ix{color:#7f8fc0;font-size:10px;min-width:18px;}
  #list .clip .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #list .clip .du{color:#7f8fc0;font-size:10px;}
  #list .clip.on{border-color:var(--gold);background:rgba(255,194,51,.14);color:#fff;}
  #list .clip.used{opacity:.55;}
  /* drag ghost */
  #ghost{position:fixed;z-index:99;pointer-events:none;transform:translate(-50%,-140%);background:var(--gold);color:#3a2600;font:800 12px var(--disp);padding:6px 10px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.5);display:none;white-space:nowrap;}
  /* transport */
  #ctrl{left:10px;bottom:10px;right:10px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;justify-content:center;padding:8px 10px;z-index:6;}
  #ctrl button{font:800 12px var(--disp);color:#eaf2ff;background:#1b2450;border:1.5px solid #3a4a90;border-radius:10px;padding:8px 11px;cursor:pointer;letter-spacing:.5px;}
  #ctrl button:active{transform:scale(.96);}
  #ctrl button.on{background:#2f6;border-color:#6fb;color:#052;}
  #ctrl .spd{display:flex;align-items:center;gap:5px;font-weight:700;font-size:10px;color:#9fb2d8;}
  #ctrl input[type=range]{width:80px;}
  #hint{position:fixed;left:50%;transform:translateX(-50%);bottom:66px;z-index:5;font-size:10px;color:#3f5480;letter-spacing:1px;pointer-events:none;text-align:center;}
  /* export modal */
  #modal{position:fixed;inset:0;z-index:50;background:rgba(4,7,18,.7);display:none;align-items:center;justify-content:center;padding:20px;}
  #modal .box{background:#0c1330;border:1.5px solid var(--cyan);border-radius:14px;padding:14px;width:min(92vw,460px);}
  #modal textarea{width:100%;height:240px;background:#060b1e;color:#8fe9ff;border:1px solid #334;border-radius:8px;font:12px ui-monospace,monospace;padding:8px;user-select:text;}
  #modal .row{display:flex;gap:8px;margin-top:10px;}
  #modal button{flex:1;font:800 13px var(--disp);border:none;border-radius:9px;padding:10px;cursor:pointer;letter-spacing:1px;}
  #copyBtn{background:var(--green);color:#052;} #closeBtn{background:#1b2450;color:#eaf2ff;border:1.5px solid #3a4a90;}
  #err{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9;color:#ff6a7a;font-weight:800;font-size:14px;text-align:center;display:none;}
  /* ---- mode toggle + defense-timing authoring ---- */
  #modeToggle{display:flex;gap:4px;}
  #modeToggle button{font:800 11px var(--disp);color:#9fb2d8;background:#141a34;border:1.5px solid #2b3a7a;border-radius:9px;padding:7px 8px;cursor:pointer;letter-spacing:.5px;white-space:nowrap;}
  #modeToggle button.on{background:var(--gold);color:#3a2600;border-color:var(--gold);}
  /* DEFEND mode = compact BOTTOM bar (side panels hidden) so the character is centered & fully visible */
  #defend{left:8px;right:8px;bottom:8px;z-index:7;padding:8px 10px;display:none;flex-direction:column;gap:6px;}
  #defend .drow{display:flex;gap:6px;align-items:center;}
  #defend select{flex:1;min-width:0;font:700 12px var(--disp);background:#141a34;color:#eaf2ff;border:1.5px solid #2b3a7a;border-radius:9px;padding:7px 9px;letter-spacing:.3px;}
  #defend .ddur{font-weight:700;font-size:10px;color:#9fb2d8;letter-spacing:1px;white-space:nowrap;}
  #defSpd{display:flex;align-items:center;gap:4px;font-weight:700;font-size:10px;color:#9fb2d8;white-space:nowrap;}
  #defSpd input{width:62px;}
  #scrub{width:100%;margin:0;}
  #defTimeline{position:relative;height:26px;background:#0a1130;border:1.5px solid #2b3a7a;border-radius:8px;overflow:hidden;}
  #defTimeline .mk{position:absolute;top:0;bottom:0;width:3px;background:var(--gold);box-shadow:0 0 6px var(--gold);transform:translateX(-50%);}
  #defTimeline .ph{position:absolute;top:0;bottom:0;width:2px;background:var(--cyan);box-shadow:0 0 8px var(--cyan);transform:translateX(-50%);}
  #defend .drow button{flex:1;font:800 11px var(--disp);color:#eaf2ff;background:#1b2450;border:1.5px solid #3a4a90;border-radius:9px;padding:9px 6px;cursor:pointer;letter-spacing:.5px;white-space:nowrap;}
  #defend .drow button:active{transform:scale(.96);}
  #setTap{background:var(--gold)!important;color:#3a2600!important;border-color:var(--gold)!important;}
  #defExport{background:var(--green)!important;color:#052!important;border-color:var(--green)!important;}
  #tapMeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-weight:800;font-size:10px;color:#9fb2d8;letter-spacing:.5px;}
  #tapCount{color:var(--green);}
  #tapList{display:flex;flex-wrap:wrap;gap:5px;}
  #tapList .tap{font:800 11px var(--disp);color:#cfe6ff;background:rgba(255,194,51,.14);border:1px solid rgba(255,194,51,.5);border-radius:999px;padding:3px 8px;}
  #tapList .tap b{color:#ff6a7a;cursor:pointer;margin-left:4px;}
  #tapNow{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);z-index:8;font:900 42px var(--disp);color:#eafcff;text-shadow:0 0 20px var(--cyan),0 0 44px var(--cyan);opacity:0;transition:opacity .04s;pointer-events:none;letter-spacing:2px;}
  /* per-clip facing rotation (top-centre, both modes) */
  #rotbar{top:104px;left:50%;transform:translateX(-50%);z-index:7;display:flex;gap:7px;align-items:center;padding:6px 11px;}
  #rotbar .rl{font-weight:800;font-size:10px;letter-spacing:1.5px;color:#9fb2d8;}
  #rotbar button{font:800 14px var(--disp);color:#eaf2ff;background:#1b2450;border:1.5px solid #3a4a90;border-radius:9px;padding:5px 10px;cursor:pointer;line-height:1;}
  #rotbar button:active{transform:scale(.94);}
  #rotbar input[type=range]{width:96px;}
  #rotbar b{font-weight:800;font-size:11px;color:var(--gold);min-width:34px;text-align:right;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="top" class="panel">
  <a class="back" href="index.html" title="Back to game">‹</a>
  <select id="model"></select>
  <span id="modeToggle"><button id="modeMap" class="on">🗺 MAP</button><button id="modeDef">🛡 DEFEND</button></span>
  <span class="cnt" id="cnt">—</span>
</div>
<div id="now" class="panel"><div class="nm" id="nowName">loading…</div><div class="meta" id="nowMeta"></div></div>
<div id="rotbar" class="panel"><span class="rl">FACE</span><button id="rotL" title="rotate 90° CCW">↺</button><input id="rot" type="range" min="0" max="355" step="5" value="0"><button id="rotR" title="rotate 90° CW">↻</button><b id="rotv">0°</b></div>
<div id="slots" class="panel"><div class="hdr">REQUIRED SLOTS · drop a clip here</div><div id="slotList"></div><button id="export">⬇ EXPORT JSON</button></div>
<div id="defend" class="panel">
  <div class="drow"><select id="defClipSel"></select><span class="ddur" id="defDur"></span><span id="defSpd">SPD<input id="defSpeed" type="range" min="0.25" max="1" step="0.05" value="0.6"></span></div>
  <input id="scrub" type="range" min="0" max="1" step="0.001" value="0">
  <div id="defTimeline"><div class="ph" id="defPh" style="left:0%"></div></div>
  <div class="drow"><button id="setTap">⊕ SET TAP</button><button id="preview">▶ PREVIEW</button><button id="clearTaps">✕ CLEAR</button><button id="defExport">⬇ EXPORT</button></div>
  <div id="tapMeta"><span id="scrubT">0.00s</span><span id="tapCount">0 taps</span><span id="tapList"></span></div>
</div>
<div id="list" class="panel"><div class="hdr">AVAILABLE CLIPS · drag → slot · tap = play</div><div id="clipList"></div></div>
<div id="ghost"></div>
<div id="tapNow">🛡 TAP</div>
<div id="ctrl" class="panel">
  <button id="prev">◀</button><button id="play">⏸</button><button id="next">▶</button>
  <button id="loop" class="on">🔁 Loop</button><button id="spin" class="on">↻ Spin</button><button id="mirror" class="on">🪞 Mirror</button>
  <span class="spd">SPD <input id="speed" type="range" min="0.1" max="2" step="0.1" value="1"><b id="spdv">1.0×</b></span>
</div>
<div id="hint">WASD move · Q/E down/up · SHIFT faster · drag = look · wheel/pinch = dolly · drag a clip → slot</div>
<div id="modal"><div class="box">
  <div class="hdr" style="font-size:13px;color:var(--cyan)">ANIMATION MAP — copy &amp; send</div>
  <textarea id="mapText" readonly></textarea>
  <div class="row"><button id="copyBtn">📋 Copy</button><button id="closeBtn">Close</button></div>
</div></div>
<div id="err"></div>

<script type="module">
import * as THREE from './lib/three.module.js';
import { GLTFLoader } from './lib/GLTFLoader.js';

// models to review — kind drives which slot set the game needs filled
const MODELS = [
  // `map` = the LIVE game mapping (ENEMY_ANIM / HERO_CLIP), so the slots come pre-filled — no re-adding.
  { name:'Cliffhorn Juggernaut (Obsidian Warlord)', file:'assets/boss1.glb', kind:'boss',
    map:{ idle:'Angry_Ground_Stomp', hit:'Hit_Reaction', attack1:'Punch_Combo_1', attack2:'Punch_Combo_3', attack3:'Punch_Combo_4', attack4:'Punch_Combo_5', attack5:'Punch_Combo_4', attack6:'Punch_Combo_2', attack7:'Punch_Combo', attack8:'Punch_Pose' } },
  { name:'Gale Reaper (Frostwing Archon)',          file:'assets/boss2.glb', kind:'boss',
    map:{ idle:'Checkout_Gesture', hit:'Hit_Reaction_with_Bow', attack1:'mage_soell_cast', attack2:'mage_soell_cast_2', attack3:'mage_soell_cast_4', attack4:'mage_soell_cast_6', attack5:'mage_soell_cast_2', attack6:'mage_soell_cast_4', attack7:'mage_soell_cast_6', attack8:'mage_soell_cast' } },
  { name:'Sky Titan (Golden Sentinel)',             file:'assets/boss3.glb', kind:'boss',
    map:{ idle:'Combat_Stance', hit:'Hit_Reaction_1', attack1:'Shrug', attack2:'Neck_Slashing_Gesture', attack3:'Angry_Ground_Stomp_2', attack4:'Lunge_Spin_Kick', attack5:'Sweep_Kick', attack6:'Roundhouse_Kick', attack7:'Lunge_Spin_Kick', attack8:'Kung_Fu_Punch' } },
  { name:'Hero — Nocturnal Vanguard',               file:'assets/hero.glb',  kind:'hero',
    map:{ idle:'Idle_10', strike:'Charged_Axe_Chop', shoot:'mage_soell_cast_7', cast:'mage_soell_cast_6', blitz:'360_Power_Spin_Jump', dodge:'Roll_Dodge_4', dead:'Dead', hit:'Arise', victory:'Sword_Shout', intro:'Axe_Stance' } },
];
// animation slots per character kind — must match what the game actually consumes.
// HERO -> HERO_CLIP map (index.html).  BOSS -> ENEMY_ANIM {idle, hit, attacks:[...]}.
const HERO_SLOTS = [
  ['idle','Idle'],['strike','Strike (melee)'],['shoot','Shoot (ranged)'],['cast','Cast (magic)'],
  ['blitz','Blitz (ultimate)'],['dodge','Dodge'],['hit','Hit reaction'],['dead','Death'],
  ['victory','Victory / cash-out'],['intro','Intro / enter'],
];
// boss: idle + hit + an ordered ATTACK POOL (game cycles attacks[setIdx % n]); leave unused pool slots empty
const BOSS_SLOTS = [
  ['idle','Idle / stance'],['hit','Hit reaction'],
  ['attack1','Attack 1'],['attack2','Attack 2'],['attack3','Attack 3'],['attack4','Attack 4'],
  ['attack5','Attack 5'],['attack6','Attack 6'],['attack7','Attack 7'],['attack8','Attack 8'],
];
const SLOT_SETS = { hero:HERO_SLOTS, boss:BOSS_SLOTS };
let curSlots = HERO_SLOTS, curKind = 'hero';

const el=id=>document.getElementById(id);
const canvas=el('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x8fbfe8); scene.fog=new THREE.Fog(0xbfe0f5,32,95);
const camera=new THREE.PerspectiveCamera(45,1,0.1,500);
scene.add(new THREE.HemisphereLight(0xdff0ff,0x5a7a4a,0.9));
scene.add(new THREE.AmbientLight(0xffffff,0.35));
const key=new THREE.DirectionalLight(0xfff4e0,1.5); key.position.set(6,12,8); scene.add(key);
const rim=new THREE.DirectionalLight(0x9fd0ff,0.5); rim.position.set(-8,5,-6); scene.add(rim);
const ground=new THREE.Mesh(new THREE.CircleGeometry(60,48), new THREE.MeshStandardMaterial({color:0x6fae54,roughness:1}));
ground.rotation.x=-Math.PI/2; scene.add(ground);
const grid=new THREE.GridHelper(20,20,0x2a5a2a,0x3a6a3a); grid.position.y=0.02; grid.material.opacity=0.35; grid.material.transparent=true; scene.add(grid);
const padR=new THREE.Mesh(new THREE.RingGeometry(1.4,1.6,48), new THREE.MeshBasicMaterial({color:0x34e1ff,transparent:true,opacity:.7,side:THREE.DoubleSide}));
padR.rotation.x=-Math.PI/2; padR.position.y=0.03; scene.add(padR);

// free-fly camera (demon-assault style): WASD move · Q/E down/up · drag = look · wheel/pinch = dolly
camera.rotation.order='YXZ';
const fly={ pos:new THREE.Vector3(0,1.4,6), yaw:0, pitch:-0.05, spin:false };
const _fFwd=new THREE.Vector3(), _fRgt=new THREE.Vector3(), keys=new Set();
const clampN=(v,a,b)=>Math.max(a,Math.min(b,v));
function flyLook(){ camera.rotation.set(fly.pitch,fly.yaw,0); }
function flyStep(dt){
  if(fly.spin) fly.yaw-=dt*0.35;
  flyLook();
  _fFwd.set(0,0,-1).applyQuaternion(camera.quaternion); _fFwd.y=0; if(_fFwd.lengthSq()>1e-6)_fFwd.normalize();
  _fRgt.set(1,0,0).applyQuaternion(camera.quaternion); _fRgt.y=0; if(_fRgt.lengthSq()>1e-6)_fRgt.normalize();
  const mv=(keys.has('ShiftLeft')||keys.has('ShiftRight')?9:3.6)*dt;
  if(keys.has('KeyW'))fly.pos.addScaledVector(_fFwd,mv); if(keys.has('KeyS'))fly.pos.addScaledVector(_fFwd,-mv);
  if(keys.has('KeyD'))fly.pos.addScaledVector(_fRgt,mv); if(keys.has('KeyA'))fly.pos.addScaledVector(_fRgt,-mv);
  if(keys.has('KeyE'))fly.pos.y+=mv; if(keys.has('KeyQ'))fly.pos.y-=mv;
  camera.position.copy(fly.pos);
}
function dolly(amt){ flyLook(); _fFwd.set(0,0,-1).applyQuaternion(camera.quaternion); fly.pos.addScaledVector(_fFwd,amt); }
addEventListener('keydown',e=>{ if(/INPUT|TEXTAREA|SELECT/.test((document.activeElement||{}).tagName||'')) return;
  if(['KeyW','KeyA','KeyS','KeyD','KeyQ','KeyE','ShiftLeft','ShiftRight'].includes(e.code)){ e.preventDefault(); keys.add(e.code); } });
addEventListener('keyup',e=>keys.delete(e.code));
addEventListener('blur',()=>keys.clear());
let camDrag=false,cpx=0,cpy=0,pinch=0;
canvas.addEventListener('pointerdown',e=>{camDrag=true;cpx=e.clientX;cpy=e.clientY;fly.spin=false;el('spin').classList.remove('on');});
addEventListener('pointerup',()=>camDrag=false);
addEventListener('pointermove',e=>{ if(!camDrag)return; fly.yaw-=(e.clientX-cpx)*0.005; fly.pitch=clampN(fly.pitch-(e.clientY-cpy)*0.005,-1.45,1.3); cpx=e.clientX;cpy=e.clientY; });
canvas.addEventListener('wheel',e=>{ e.preventDefault(); dolly(-e.deltaY*0.012); },{passive:false});
canvas.addEventListener('touchmove',e=>{ if(e.touches.length===2){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); if(pinch)dolly((d-pinch)*0.02); pinch=d; } },{passive:false});
canvas.addEventListener('touchend',()=>pinch=0);

// state
const loader=new GLTFLoader();
let mixer=null, clips=[], curAction=null, curIdx=0, playing=true, looping=true, speed=1, model=null, curFile='';
let mapping={};

function mapKey(){ return 'tg_map_'+curFile; }
function loadMapping(){ let saved={}; try{ saved=JSON.parse(localStorage.getItem(mapKey())||'{}'); }catch(e){}
  const def=(MODELS.find(m=>m.file===curFile)||{}).map||{};   // seed from the live game map; saved edits win per-slot
  mapping={...def, ...saved}; }
function saveMapping(){ localStorage.setItem(mapKey(),JSON.stringify(mapping)); }

// FOREARM MIRROR — mirror of the game's ENEMY_ARMS / buildLimbDuplicate (index.html). Keep in sync when
// the game's arm flips change. Duplicates everything distal to the elbow (forearm+hand+weapon), flipped
// about the elbow, rigid to the forearm bone. The sandbox's AnimationMixer(model) drives it (shared skeleton).
const ARM_CFG = {
  'assets/boss2.glb': [ { fore:'RightForeArm', hand:'RightHand', flip:[Math.PI,0,0] },
                        { fore:'LeftForeArm',  hand:'LeftHand',  flip:[Math.PI,0,0] } ],
};
function buildLimbDuplicate(mdl, cfg){
  let sm=null; mdl.traverse(o=>{ if(o.isSkinnedMesh && !sm) sm=o; });
  if(!sm) return null;
  const fi=sm.skeleton.bones.findIndex(b=>b.name===cfg.fore); if(fi<0) return null;
  const hi=sm.skeleton.bones.findIndex(b=>b.name===cfg.hand);
  const elbow=new THREE.Vector3().setFromMatrixPosition(sm.skeleton.boneInverses[fi].clone().invert());
  const g=sm.geometry, pos=g.attributes.position, nor=g.attributes.normal, uv=g.attributes.uv, si=g.attributes.skinIndex, sw=g.attributes.skinWeight, idx=g.index;
  const _v=new THREE.Vector3(), _n=new THREE.Vector3(), isW=new Uint8Array(pos.count);
  for(let i=0;i<pos.count;i++){
    let w=0; const ix=[si.getX(i),si.getY(i),si.getZ(i),si.getW(i)], wx=[sw.getX(i),sw.getY(i),sw.getZ(i),sw.getW(i)];
    for(let k=0;k<4;k++) if(ix[k]===fi || ix[k]===hi) w+=wx[k];
    if(w>0.5) isW[i]=1;
  }
  const R=new THREE.Matrix4().makeRotationFromEuler(new THREE.Euler(cfg.flip[0],cfg.flip[1],cfg.flip[2]));
  const M=new THREE.Matrix4().makeTranslation(elbow.x,elbow.y,elbow.z).multiply(R).multiply(new THREE.Matrix4().makeTranslation(-elbow.x,-elbow.y,-elbow.z));
  const nmat=new THREE.Matrix3().getNormalMatrix(M);
  const map=new Map(), P=[],N=[],U=[],SI=[],SW=[],ni=[];
  const remap=oi=>{ if(map.has(oi))return map.get(oi); const n=P.length/3; map.set(oi,n);
    _v.fromBufferAttribute(pos,oi).applyMatrix4(M); P.push(_v.x,_v.y,_v.z);
    _n.fromBufferAttribute(nor,oi).applyMatrix3(nmat).normalize(); N.push(_n.x,_n.y,_n.z);
    if(uv) U.push(uv.getX(oi),uv.getY(oi));
    SI.push(fi,0,0,0); SW.push(1,0,0,0); return n; };
  const arr=idx?idx.array:null, tc=idx?idx.count:pos.count;
  for(let t=0;t<tc;t+=3){ const a=idx?arr[t]:t,b=idx?arr[t+1]:t+1,c=idx?arr[t+2]:t+2; if(isW[a]&&isW[b]&&isW[c]) ni.push(remap(a),remap(b),remap(c)); }
  if(ni.length<3) return null;
  const wg=new THREE.BufferGeometry();
  wg.setAttribute('position',new THREE.Float32BufferAttribute(P,3));
  wg.setAttribute('normal',new THREE.Float32BufferAttribute(N,3));
  if(uv) wg.setAttribute('uv',new THREE.Float32BufferAttribute(U,2));
  wg.setAttribute('skinIndex',new THREE.Uint16BufferAttribute(SI,4));
  wg.setAttribute('skinWeight',new THREE.Float32BufferAttribute(SW,4));
  wg.setIndex(ni);
  const dup=new THREE.SkinnedMesh(wg, (Array.isArray(sm.material)?sm.material[0]:sm.material).clone());
  dup.frustumCulled=false;
  sm.parent.add(dup);
  dup.position.copy(sm.position); dup.quaternion.copy(sm.quaternion); dup.scale.copy(sm.scale);
  dup.bind(sm.skeleton, sm.bindMatrix);
  return dup;
}
let limbDups=[], mirrorOn=true;
function clearArms(){ for(const d of limbDups){ d.parent&&d.parent.remove(d); d.geometry.dispose(); } limbDups=[]; }
function applyArms(){ clearArms(); const cfg=ARM_CFG[curFile]; if(!cfg||!mirrorOn||!model) return; model.updateMatrixWorld(true);
  for(const a of cfg){ const d=buildLimbDuplicate(model,a); if(d)limbDups.push(d); } }

function loadModel(file){
  curFile=file; const m=MODELS.find(x=>x.file===file); curKind=(m&&m.kind)||'hero'; curSlots=SLOT_SETS[curKind]; loadMapping();
  clearArms();
  el('nowName').textContent='loading…'; el('nowMeta').textContent=''; el('clipList').innerHTML=''; el('err').style.display='none';
  if(model){ scene.remove(model); model=null; } mixer=null; clips=[]; curAction=null;
  loader.load(file, gltf=>{
    model=gltf.scene;
    model.scale.setScalar(1); model.rotation.set(0,0,0); model.position.set(0,0,0); model.updateMatrixWorld(true);
    let b=new THREE.Box3().setFromObject(model); const h=(b.max.y-b.min.y)||1; model.scale.setScalar(2.4/h);
    model.updateMatrixWorld(true); b=new THREE.Box3().setFromObject(model);
    model.position.set(-(b.min.x+b.max.x)/2, -b.min.y, -(b.min.z+b.max.z)/2);
    model.traverse(o=>{ if(o.isMesh) o.frustumCulled=false; });
    scene.add(model);
    // frame the model with the free-fly camera (front 3/4), then derive yaw/pitch
    const sz=(b.max.y-b.min.y);
    camera.position.set(sz*1.15, sz*0.72, sz*1.7); camera.lookAt(0, sz*0.5, 0);
    fly.yaw=camera.rotation.y; fly.pitch=camera.rotation.x; fly.pos.copy(camera.position);
    mixer=new THREE.AnimationMixer(model);
    clips=gltf.animations.slice().sort((a,b)=>a.name.localeCompare(b.name));
    el('cnt').textContent=clips.length+' CLIPS';
    buildClips(); buildSlots(); play(0); applyArms();
  }, xhr=>{ if(xhr.total)el('nowName').textContent='loading… '+Math.round(xhr.loaded/xhr.total*100)+'%'; },
     err=>{ el('err').style.display='block'; el('err').textContent='Failed to load '+file+'\n'+err; console.error(err); });
}
function buildClips(){
  const L=el('clipList'); L.innerHTML='';
  clips.forEach((c,i)=>{ const d=document.createElement('div'); d.className='clip'; d.dataset.name=c.name; d.dataset.i=i;
    d.innerHTML='<span class="ix">'+(i+1)+'</span><span class="nm">'+c.name+'</span><span class="du">'+c.duration.toFixed(1)+'s</span>';
    d.addEventListener('pointerdown',e=>clipDown(e,c.name)); L.appendChild(d); });
  refreshUsed();
}
function buildSlots(){
  const L=el('slotList'); L.innerHTML='';
  const hdr=el('slots').querySelector('.hdr'); if(hdr) hdr.textContent=(curKind==='boss'?'BOSS SLOTS · idle · hit · attack pool':'HERO SLOTS · one clip each')+' · drop a clip here';
  curSlots.forEach(([k,label])=>{ const d=document.createElement('div'); d.className='slot'; d.dataset.slot=k;
    const v=mapping[k]||''; d.innerHTML='<div class="lbl">'+label+'</div><div class="val '+(v?'':'empty')+'"><span class="vn">'+(v||'— drop clip —')+'</span>'+(v?'<span class="x" title="clear">×</span>':'')+'</div>';
    // click assigned value = preview it
    d.querySelector('.val').addEventListener('click',ev=>{ if(ev.target.classList.contains('x')){ delete mapping[k]; saveMapping(); buildSlots(); refreshUsed(); return; } if(mapping[k]) play(clips.findIndex(c=>c.name===mapping[k])); });
    L.appendChild(d); });
}
function refreshUsed(){ const used=new Set(Object.values(mapping)); [...el('clipList').children].forEach(d=>d.classList.toggle('used',used.has(d.dataset.name))); }
function assign(slot,name){ mapping[slot]=name; saveMapping(); buildSlots(); refreshUsed(); play(clips.findIndex(c=>c.name===name)); }

// custom pointer-drag: clip -> slot (works on mouse + touch)
let down=null, dragging=false, sx=0, sy=0;
function clipDown(e,name){ down={name}; sx=e.clientX; sy=e.clientY; dragging=false; e.stopPropagation(); e.preventDefault(); }
addEventListener('pointermove',e=>{ if(!down)return;
  if(!dragging && Math.hypot(e.clientX-sx,e.clientY-sy)>6){ dragging=true; const g=el('ghost'); g.textContent=down.name; g.style.display='block'; }
  if(dragging){ const g=el('ghost'); g.style.left=e.clientX+'px'; g.style.top=e.clientY+'px';
    const s=slotUnder(e.clientX,e.clientY); [...el('slotList').children].forEach(d=>d.classList.toggle('over',d===s)); } });
addEventListener('pointerup',e=>{ if(!down)return;
  if(dragging){ const s=slotUnder(e.clientX,e.clientY); if(s)assign(s.dataset.slot,down.name); el('ghost').style.display='none'; [...el('slotList').children].forEach(d=>d.classList.remove('over')); }
  else { play(clips.findIndex(c=>c.name===down.name)); }
  down=null; dragging=false; });
function slotUnder(x,y){ const e=document.elementFromPoint(x,y); return e?e.closest('.slot'):null; }

function play(i){
  if(!mixer||!clips.length||i<0) return; curIdx=(i+clips.length)%clips.length; const c=clips[curIdx];
  if(curAction) curAction.fadeOut(0.2);
  curAction=mixer.clipAction(c); curAction.reset(); curAction.setLoop(looping?THREE.LoopRepeat:THREE.LoopOnce,Infinity);
  curAction.clampWhenFinished=!looping; curAction.timeScale=speed; curAction.paused=!playing; curAction.fadeIn(0.2); curAction.play();
  el('nowName').textContent=c.name; el('nowMeta').textContent='#'+(curIdx+1)+' / '+clips.length+'  ·  '+c.duration.toFixed(2)+'s';
  [...el('clipList').children].forEach((d,j)=>d.classList.toggle('on',j===curIdx));
  const on=el('clipList').children[curIdx]; if(on)on.scrollIntoView({block:'nearest'});
}
el('prev').onclick=()=>play(curIdx-1);
el('next').onclick=()=>play(curIdx+1);
el('play').onclick=()=>{ playing=!playing; if(curAction)curAction.paused=!playing; el('play').textContent=playing?'⏸':'▶'; };
el('loop').onclick=()=>{ looping=!looping; el('loop').classList.toggle('on',looping); play(curIdx); };
el('spin').onclick=()=>{ fly.spin=!fly.spin; el('spin').classList.toggle('on',fly.spin); };
el('mirror').onclick=()=>{ mirrorOn=!mirrorOn; el('mirror').classList.toggle('on',mirrorOn); applyArms(); };
el('speed').oninput=e=>{ speed=+e.target.value; el('spdv').textContent=speed.toFixed(1)+'×'; if(curAction)curAction.timeScale=speed; };

// export — shape matches what the game consumes for this kind (paste-ready)
el('export').onclick=()=>{ const name=MODELS.find(m=>m.file===curFile)?.name||curFile; let out;
  if(curKind==='boss'){
    out={ model:name, idle:mapping.idle||null, hit:mapping.hit||null,
      attacks: curSlots.filter(([k])=>k.startsWith('attack')).map(([k])=>mapping[k]).filter(Boolean) };   // ENEMY_ANIM shape
  } else {
    out={ model:name, kind:'hero', map:{} };
    curSlots.forEach(([k])=>{ out.map[k]=mapping[k]||null; });                                             // HERO_CLIP shape
  }
  out.rotations=rotObj(); el('mapText').value=JSON.stringify(out,null,2); el('modal').style.display='flex'; };
el('closeBtn').onclick=()=>el('modal').style.display='none';
el('copyBtn').onclick=async()=>{ const t=el('mapText'); t.select(); try{ await navigator.clipboard.writeText(t.value); el('copyBtn').textContent='✓ Copied'; setTimeout(()=>el('copyBtn').textContent='📋 Copy',1200); }catch(e){ document.execCommand('copy'); } };

const sel=el('model'); MODELS.forEach((m,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=m.name; sel.appendChild(o); });
sel.onchange=()=>loadModel(MODELS[+sel.value].file);

function resize(){ const w=innerWidth,h=innerHeight; renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }
addEventListener('resize',resize); resize();
let last=performance.now();
function frame(){ requestAnimationFrame(frame); const now=performance.now(), dt=Math.min((now-last)/1000,0.05); last=now;
  if(mixer)mixer.update(dt);
  if(model) model.rotation.y=(rotations[curClipName()]||0)*Math.PI/180;   // per-clip facing fix-up
  flyStep(dt); renderer.render(scene,camera); }
// ---- DEFENSE-TIMING authoring mode: scrub an attack clip, mark tap points, preview, export ----
let mode='map', timings={}, dLastIdx=-1, dLastFile='', dLastN=-1, dPreview=false, previewSpeed=0.6;
function loadTimings(){ try{ timings=JSON.parse(localStorage.getItem('tg_taps_'+curFile)||'{}'); }catch(e){ timings={}; } }
function saveTimings(){ localStorage.setItem('tg_taps_'+curFile, JSON.stringify(timings)); }
function curClipName(){ return clips[curIdx]?clips[curIdx].name:''; }
// ---- per-clip facing rotation: rotate a clip's yaw so it faces the intended way (saved per clip, rides in the export) ----
let rotations={};
function loadRotations(){ try{ rotations=JSON.parse(localStorage.getItem('tg_rot_'+curFile)||'{}'); }catch(e){ rotations={}; } }
function saveRotations(){ localStorage.setItem('tg_rot_'+curFile, JSON.stringify(rotations)); }
function rotObj(){ const o={}; for(const k in rotations){ if(rotations[k]) o[k]=rotations[k]; } return o; }
function syncRot(){ const r=rotations[curClipName()]||0; if(el('rot'))el('rot').value=r; if(el('rotv'))el('rotv').textContent=r+'°'; }
function setRot(deg){ const n=curClipName(); if(!n)return; rotations[n]=((Math.round(deg)%360)+360)%360; saveRotations(); syncRot(); }
el('rot').oninput=e=>setRot(+e.target.value);
el('rotL').onclick=()=>setRot((rotations[curClipName()]||0)+90);   // ↺ CCW
el('rotR').onclick=()=>setRot((rotations[curClipName()]||0)-90);   // ↻ CW
function curTaps(){ const n=curClipName(); if(!n)return []; if(!timings[n])timings[n]=[]; return timings[n]; }
function forceWeight(){ if(curAction){ curAction.enabled=true; curAction.setEffectiveWeight(1); } }
// which SLOT/move label(s) a clip is mapped to in MAP mode (reverse lookup); [] if the clip isn't assigned to a move
function slotsForClip(name){ return curSlots.filter(([k])=>mapping[k]===name).map(([,label])=>label); }
function moveLabel(name){ const s=slotsForClip(name); return s.length? s.join(' / ') : '(unmapped)'; }
function fillClipSel(){ const s=el('defClipSel'); if(!s)return;
  // DEFEND edits ONLY what's live in the slots: one option per MAPPED slot clip, in slot order (idle, hit, attacks).
  // Unmapped animations are not listed here — map them in 🗺 MAP first.
  const seen=new Set(), opts=[];
  curSlots.forEach(([k,label])=>{ const nm=mapping[k]; if(!nm||seen.has(nm))return; const i=clips.findIndex(c=>c.name===nm); if(i<0)return;
    seen.add(nm); opts.push({i, label:moveLabel(nm), name:nm, dur:clips[i].duration}); });
  s.innerHTML = opts.length
    ? opts.map(o=>'<option value="'+o.i+'">'+o.label+'  —  '+o.name+'  ('+o.dur.toFixed(1)+'s)</option>').join('')
    : '<option value="-1">— no clips mapped · use 🗺 MAP first —</option>';
  const has=opts.some(o=>o.i===curIdx);
  if(has) s.value=curIdx; else if(opts.length){ s.value=opts[0].i; play(opts[0].i); }
  dLastN=clips.length; }
function setMode(m){ mode=m;
  el('slots').style.display=m==='map'?'flex':'none';        // in DEFEND, hide BOTH side panels + transport
  el('list').style.display=m==='map'?'flex':'none';         // so the character is centred & fully visible
  el('ctrl').style.display=m==='map'?'flex':'none';
  el('hint').style.display=m==='map'?'block':'none';
  el('defend').style.display=m==='defend'?'flex':'none';
  el('modeMap').classList.toggle('on',m==='map'); el('modeDef').classList.toggle('on',m==='defend');
  if(m==='defend'){ playing=false; loadTimings(); fillClipSel(); syncDefend(); }
  else { playing=true; if(curAction)curAction.paused=false; if(curAction)curAction.timeScale=speed; el('play').textContent='⏸'; dPreview=false; el('tapNow').style.opacity='0';
    if(clips[curIdx]){ el('nowName').textContent=clips[curIdx].name; el('nowMeta').textContent='#'+(curIdx+1)+' / '+clips.length+'  ·  '+clips[curIdx].duration.toFixed(2)+'s'; } }   // MAP mode: back to clip name
}
el('modeMap').onclick=()=>setMode('map'); el('modeDef').onclick=()=>setMode('defend');
el('defClipSel').onchange=e=>play(+e.target.value);
el('defSpeed').oninput=e=>{ previewSpeed=+e.target.value; };
function syncDefend(){ const c=clips[curIdx]; const s=el('defClipSel'); if(s&&clips.length)s.value=curIdx;
  if(!c){ el('defDur').textContent=''; return; }
  el('defDur').textContent=c.duration.toFixed(2)+'s';
  el('nowName').textContent=moveLabel(c.name); el('nowMeta').textContent=c.name+'  ·  '+c.duration.toFixed(2)+'s';   // big label = the MOVE (slot); sub = clip name
  el('scrub').value='0'; if(curAction){ curAction.paused=true; curAction.time=0; forceWeight(); } if(mixer)mixer.update(0);
  el('scrubT').textContent='0.00s'; buildTapList(); drawTimeline(); drawPlayhead(); }
function scrubTo(frac){ const c=clips[curIdx]; if(!c||!curAction)return; playing=false; dPreview=false; el('tapNow').style.opacity='0';
  curAction.paused=true; forceWeight(); curAction.time=frac*c.duration; if(mixer)mixer.update(0);
  el('scrubT').textContent=curAction.time.toFixed(2)+'s'; drawPlayhead(); }
el('scrub').oninput=e=>scrubTo(+e.target.value);
el('setTap').onclick=()=>{ const c=clips[curIdx]; if(!c||!curAction)return; const t=+curAction.time.toFixed(3); const a=curTaps();
  if(!a.some(x=>Math.abs(x-t)<0.03)){ a.push(t); a.sort((x,y)=>x-y); saveTimings(); buildTapList(); drawTimeline(); } };
el('clearTaps').onclick=()=>{ timings[curClipName()]=[]; saveTimings(); buildTapList(); drawTimeline(); };
el('preview').onclick=()=>{ const c=clips[curIdx]; if(!c||!curAction)return; playing=true;
  curAction.reset(); curAction.setLoop(THREE.LoopOnce,1); curAction.clampWhenFinished=true; curAction.timeScale=previewSpeed; forceWeight(); curAction.paused=false; curAction.time=0; curAction.play(); dPreview=true; };
function buildTapList(){ const a=curTaps(); el('tapCount').textContent=a.length+' tap'+(a.length===1?'':'s');
  el('tapList').innerHTML=a.map((t,i)=>'<span class="tap">'+t.toFixed(2)+'s<b data-i="'+i+'">×</b></span>').join('');
  [...el('tapList').querySelectorAll('b')].forEach(b=>b.onclick=()=>{ a.splice(+b.dataset.i,1); saveTimings(); buildTapList(); drawTimeline(); }); }
function drawTimeline(){ const c=clips[curIdx]; if(!c)return; const a=curTaps();
  el('defTimeline').innerHTML=a.map(t=>'<div class="mk" style="left:'+(t/c.duration*100).toFixed(1)+'%"></div>').join('')+'<div class="ph" id="defPh" style="left:0%"></div>'; }
function drawPlayhead(){ const c=clips[curIdx], ph=el('defPh'); if(ph&&c&&curAction)ph.style.left=(Math.min(curAction.time,c.duration)/c.duration*100).toFixed(1)+'%'; }
el('defExport').onclick=()=>{ const name=MODELS.find(m=>m.file===curFile)?.name||curFile; const attacks={};
  Object.keys(timings).forEach(k=>{ if(timings[k]&&timings[k].length){ const c=clips.find(x=>x.name===k); attacks[k]={slots:slotsForClip(k), clip:k, duration:c?+c.duration.toFixed(3):null, rot:rotations[k]||0, taps:timings[k].slice().sort((a,b)=>a-b).map(t=>+t.toFixed(3))}; } });
  el('mapText').value=JSON.stringify({model:name, rotations:rotObj(), attacks},null,2); el('modal').style.display='flex'; };
function defendLoop(){ requestAnimationFrame(defendLoop);
  if(clips.length!==dLastN && mode==='defend'){ fillClipSel(); syncDefend(); }
  if(curFile!==dLastFile){ dLastFile=curFile; loadRotations(); syncRot(); if(mode==='defend'){ loadTimings(); fillClipSel(); syncDefend(); } }
  if(curIdx!==dLastIdx){ dLastIdx=curIdx; syncRot(); if(mode==='defend') syncDefend(); }
  if(mode!=='defend'||!curAction) return;
  drawPlayhead();
  if(dPreview){ const t=curAction.time, dur=clips[curIdx]?clips[curIdx].duration:0;
    el('tapNow').style.opacity = curTaps().some(tp=>Math.abs(tp-t)<0.11) ? '1':'0';
    if(t>=dur-0.02){ dPreview=false; curAction.paused=true; el('tapNow').style.opacity='0'; } } }
requestAnimationFrame(defendLoop);

loadModel(MODELS[0].file); frame();
</script>
</body>
</html>
